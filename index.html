// ═══════════════════════════════════════════════════════════════════════════
// GAME SCENE — 3D backdrop during missions (shows avatar + NPCs + action)
// ═══════════════════════════════════════════════════════════════════════════
function GameScene({ phase, avatarCfg, playerName, actionRef }) {
  const mountRef = useRef(null);
  const refs = useRef({});

  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;
    const w = mount.clientWidth, h = mount.clientHeight;

    const scene = new THREE.Scene();
    // Deeper, atmospheric background — like looking into a digital ocean
    scene.background = new THREE.Color(0x040614);
    // Exponential fog with subtle blue-violet tint for depth atmosphere
    scene.fog = new THREE.FogExp2(0x0a1430, 0.038);

    const camera = new THREE.PerspectiveCamera(55, w / h, 0.1, 200);
    camera.position.set(0, 3, 7);
    camera.lookAt(0, 1, -1);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    // Cinematic color pipeline: linear workspace + ACES tone mapping → sRGB output
    if (THREE.SRGBColorSpace !== undefined) {
      renderer.outputColorSpace = THREE.SRGBColorSpace;
    } else if (THREE.sRGBEncoding !== undefined) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mount.appendChild(renderer.domElement);

    // ─── POST-PROCESSING PIPELINE ───────────────────────────────────────
    // RenderPass → UnrealBloom (cinematic glow on emissives) → FXAA → screen
    // Falls back to direct rendering if postprocessing modules aren't loaded.
    let composer = null;
    if (typeof THREE.EffectComposer !== "undefined" && typeof THREE.UnrealBloomPass !== "undefined") {
      try {
        composer = new THREE.EffectComposer(renderer);
        composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        composer.setSize(w, h);

        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);

        // Bloom: makes neon emissives, the password fortress glow, the laser
        // sword, the data streams all radiate beautifully. This is the single
        // biggest visual upgrade.
        // Args: (resolution, strength, radius, threshold)
        const bloomPass = new THREE.UnrealBloomPass(
          new THREE.Vector2(w, h),
          0.95,    // strength — how bright the glow gets
          0.55,    // radius — how far it spreads
          0.62     // threshold — only pixels brighter than this bloom (avoids whole scene glowing)
        );
        composer.addPass(bloomPass);

        // FXAA — anti-aliasing as the final pass since postprocessing bypasses
        // the renderer's built-in antialiasing
        if (typeof THREE.ShaderPass !== "undefined" && typeof THREE.FXAAShader !== "undefined") {
          const fxaaPass = new THREE.ShaderPass(THREE.FXAAShader);
          const pixRatio = renderer.getPixelRatio();
          fxaaPass.material.uniforms["resolution"].value.x = 1 / (w * pixRatio);
          fxaaPass.material.uniforms["resolution"].value.y = 1 / (h * pixRatio);
          composer.addPass(fxaaPass);
        }
      } catch (e) {
        // Postprocessing setup failed — fall back to direct renderer
        console.warn("Postprocessing unavailable, using direct render:", e);
        composer = null;
      }
    }

    // ─── LIGHTING — cinematic three-point setup ─────────────────────────
    // Ambient (soft fill from the digital atmosphere)
    scene.add(new THREE.AmbientLight(0x223355, 0.55));
    // Key light — cool cyan from above, casts shadows
    const key = new THREE.DirectionalLight(0x9eedff, 1.4);
    key.position.set(6, 10, 5);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.left = -8;
    key.shadow.camera.right = 8;
    key.shadow.camera.top = 8;
    key.shadow.camera.bottom = -8;
    key.shadow.camera.near = 0.5;
    key.shadow.camera.far = 25;
    key.shadow.bias = -0.0005;
    scene.add(key);
    // Rim light — magenta from behind, separates avatar from background
    const rim = new THREE.DirectionalLight(0xff6fb5, 0.9);
    rim.position.set(-5, 4, -6);
    scene.add(rim);
    // Fill bounce — warm violet from below, simulates ground reflection
    const fill = new THREE.PointLight(0xb58cff, 0.6, 15);
    fill.position.set(0, -1, 2);
    scene.add(fill);

    // Platform — dark base with brighter cyan trim for bloom
    const plat = new THREE.Mesh(
      new THREE.CylinderGeometry(5.5, 5.2, 0.4, 10),
      new THREE.MeshStandardMaterial({
        color: 0x06091e,
        emissive: 0x4de8ff,
        emissiveIntensity: 0.25,
        roughness: 0.35,
        metalness: 0.55,
      })
    );
    plat.position.y = -0.2;
    plat.receiveShadow = true;
    scene.add(plat);
    // Ring — pure emissive for bright halo bloom effect
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(4.8, 5.2, 48),
      new THREE.MeshBasicMaterial({ color: 0x9eedff, side: THREE.DoubleSide, transparent: true, opacity: 0.85 })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01;
    scene.add(ring);
    // Inner glow ring for layered halo
    const innerRing = new THREE.Mesh(
      new THREE.RingGeometry(2.8, 3.0, 36),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
    );
    innerRing.rotation.x = -Math.PI / 2;
    innerRing.position.y = 0.012;
    scene.add(innerRing);
    const grid = new THREE.GridHelper(10, 20, 0x4de8ff, 0x152244);
    grid.position.y = 0.01;
    scene.add(grid);

    // Distant towers — neon city silhouette
    const towerGroup = new THREE.Group();
    const tc = [0x4de8ff, 0xff6fb5, 0x5bffa1, 0xffd36b];
    for (let i = 0; i < 14; i++) {
      const hh = 2 + Math.random() * 5;
      const color = tc[i % tc.length];
      const t = new THREE.Mesh(
        new THREE.BoxGeometry(0.6 + Math.random() * 0.4, hh, 0.6 + Math.random() * 0.4),
        new THREE.MeshStandardMaterial({
          color: 0x05071a,
          emissive: color,
          emissiveIntensity: 0.85,
          roughness: 0.5,
          metalness: 0.3,
        })
      );
      const ang = (i / 14) * Math.PI * 2;
      const dist = 10 + Math.random() * 4;
      t.position.set(Math.cos(ang) * dist, hh / 2 - 0.5, Math.sin(ang) * dist);
      towerGroup.add(t);
      // Bright beacon tip — pure emission, blooms into a star
      const beacon = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 8, 8),
        new THREE.MeshBasicMaterial({ color: color })
      );
      beacon.position.copy(t.position);
      beacon.position.y = hh - 0.5;
      towerGroup.add(beacon);
    }
    scene.add(towerGroup);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const N = 400;
    const sp = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      sp[i * 3] = (Math.random() - 0.5) * 80;
      sp[i * 3 + 1] = Math.random() * 30 - 5;
      sp[i * 3 + 2] = (Math.random() - 0.5) * 80;
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(sp, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.8 }));
    scene.add(stars);

    // Avatar
    const avatar = buildAvatarMesh(avatarCfg);
    avatar.position.set(-1.5, 0, 1);
    scene.add(avatar);

    // NPCs
    const pixel = makePixel();
    pixel.position.set(1.5, 0, 1);
    scene.add(pixel);
    const nova = makeNova();
    nova.position.set(2, 0, -1);
    nova.visible = false;
    scene.add(nova);
    const cipher = makeCipher();
    cipher.position.set(1.8, 0, -1);
    cipher.visible = false;
    scene.add(cipher);

    // ─── CHEERING CROWD (shown only at finale/complete) ──────────────
    // Citizens arranged in a wide arc BEHIND the NPCs (negative Z), facing
    // toward the camera so their faces/jumps are visible from any camera angle.
    // Camera orbits at +Z looking toward -Z, so crowd at -Z is perfectly framed.
    const crowdGroup = new THREE.Group();
    const crowdMembers = [];
    const CROWD_COUNT = 26;
    for (let i = 0; i < CROWD_COUNT; i++) {
      const citizen = makeCitizen(i * 37 + 3);
      // Two rows in a wide semicircle behind the NPCs
      const row = i < 14 ? 0 : 1;
      const idxInRow = row === 0 ? i : i - 14;
      const countInRow = row === 0 ? 14 : CROWD_COUNT - 14;
      const t = idxInRow / (countInRow - 1); // 0..1
      // Row 0: closer arc, 14 citizens
      // Row 1: wider arc, 12 citizens (slightly behind row 0)
      const radius = row === 0 ? 6.5 : 8.3;
      // Arc from left around back to right (centered on -Z direction)
      // angle=π/2 points toward -Z (behind NPCs)
      const arcStart = Math.PI * 0.2;   // left side
      const arcEnd = Math.PI * 0.8;     // right side
      const angle = arcStart + t * (arcEnd - arcStart);
      const x = Math.cos(angle) * radius;
      const z = -Math.sin(angle) * radius - 1.5; // -Z direction, offset behind NPCs
      citizen.position.set(x, 0, z);
      // Face toward the avatar/camera (positive Z direction roughly)
      const faceAngle = Math.atan2(-x, -z);
      citizen.rotation.y = faceAngle;
      // Slight size variation
      const scale = 0.9 + ((i * 17) % 5) * 0.05;
      citizen.scale.setScalar(scale);
      crowdGroup.add(citizen);
      crowdMembers.push({
        mesh: citizen,
        basePhase: (i * 0.47) % (Math.PI * 2),
        baseY: 0,
        baseRot: faceAngle,
        bobSpeed: 2.5 + (i % 4) * 0.3,
        jumpPhase: (i * 0.31) % (Math.PI * 2),
      });
    }
    crowdGroup.visible = false;
    scene.add(crowdGroup);

    // ─── CONFETTI PARTICLES (finale only) ────────────────────────────
    const confettiGroup = new THREE.Group();
    const confettiPieces = [];
    const confettiColors = [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1, 0xb58cff, 0xff8a5a];
    for (let i = 0; i < 80; i++) {
      const piece = new THREE.Mesh(
        new THREE.PlaneGeometry(0.08, 0.12),
        new THREE.MeshBasicMaterial({
          color: confettiColors[i % confettiColors.length],
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.95,
        })
      );
      // Initial random positions in a wide overhead dome
      piece.position.set(
        (Math.random() - 0.5) * 14,
        5 + Math.random() * 4,
        (Math.random() - 0.5) * 10
      );
      piece.userData = {
        vx: (Math.random() - 0.5) * 1.5,
        vy: -0.5 - Math.random() * 1.0,
        vz: (Math.random() - 0.5) * 1.5,
        spin: (Math.random() - 0.5) * 6,
        tumble: (Math.random() - 0.5) * 4,
        startY: 5 + Math.random() * 4,
        startX: (Math.random() - 0.5) * 14,
        startZ: (Math.random() - 0.5) * 10,
      };
      confettiGroup.add(piece);
      confettiPieces.push(piece);
    }
    confettiGroup.visible = false;
    scene.add(confettiGroup);

    // ─── CELEBRATION RINGS (radiating from platform at finale) ───────
    const celebRings = [];
    for (let i = 0; i < 3; i++) {
      const cr = new THREE.Mesh(
        new THREE.RingGeometry(1.0, 1.15, 48),
        new THREE.MeshBasicMaterial({
          color: [0x4de8ff, 0xff6fb5, 0xffd36b][i],
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.8,
        })
      );
      cr.rotation.x = -Math.PI / 2;
      cr.position.y = 0.02;
      cr.visible = false;
      cr.userData = { phase: i * 0.6 };
      scene.add(cr);
      celebRings.push(cr);
    }

    // Gate, tower, vault
    const gate = makeGate();
    gate.position.set(0, 0, -3);
    gate.visible = false;
    scene.add(gate);
    const tower = makeTower();
    tower.position.set(0, 0, -3);
    tower.visible = false;
    scene.add(tower);
    const vault = makeVault();
    vault.position.set(0, 0, -3);
    vault.visible = false;
    scene.add(vault);

    refs.current = { scene, camera, renderer, avatar, pixel, nova, cipher, gate, tower, vault, plat, ring, crowdGroup, crowdMembers, confettiGroup, confettiPieces, celebRings };

    let rafId;
    const clock = new THREE.Clock();
    // phaseRef so animate() always reads latest phase
    const phaseRef = { current: phase };
    refs.current.phaseRef = phaseRef;
    function animate() {
      const t = clock.getElapsedTime();
      const dt = clock.getDelta();
      // Subtle idle bob for the avatar (suppressed during actions)
      const currentPhase = phaseRef.current || "";
      const isPlayPhase = currentPhase === "m1-play" || currentPhase === "m2-play" || currentPhase === "m3-play";

      // Read avatar action signal from missions
      let curAction = "idle";
      let curActionPhase = 0;
      let curAimAngle = 0;
      if (actionRef && actionRef.current && actionRef.current.action !== "idle" && actionRef.current.triggeredAt > 0) {
        const a = actionRef.current;
        const DUR = { fire: 0.5, slash: 0.6, catch: 0.7 };
        const dur = DUR[a.action] || 0.5;
        const since = (performance.now() - a.triggeredAt) / 1000;
        if (since < dur) {
          curAction = a.action;
          curActionPhase = since / dur;
          curAimAngle = a.aimAngle;
        }
      }

      avatar.position.y = Math.sin(t * 2) * 0.04;
      // During play phases, avatar stays center-stage
      if (isPlayPhase) {
        avatar.position.x = lerp(avatar.position.x, 0, 0.15);
      }
      // During play, avatar faces forward (toward camera); otherwise idle sway
      if (isPlayPhase) {
        avatar.rotation.y = lerp(avatar.rotation.y, 0, 0.1);
      } else {
        avatar.rotation.y = Math.sin(t * 0.5) * 0.08;
      }

      // Animate arms if we have the pivots
      const leftArm = avatar.userData.leftArm;
      const rightArm = avatar.userData.rightArm;
      if (leftArm && rightArm) {
        // Compute target rotations per arm for the current action
        let targetLX = 0, targetLY = 0, targetLZ = 0;
        let targetRX = 0, targetRY = 0, targetRZ = 0;
        if (curAction === "fire") {
          // aimAngle: 0 = up, + = right
          // Raise both arms forward-up toward aim
          const ph = curActionPhase;
          // Strike recoil at 0.2-0.4 phase
          const strike = Math.min(1, Math.max(0, (ph - 0.2) / 0.2));
          const recoil = strike < 1 ? Math.sin(strike * Math.PI) * 0.15 : 0;
          // Arm rotates UP (x negative in three.js -- since Y-up, to raise arm from hanging-down we rotate X negative around shoulder)
          // Actually: arm hangs straight down by default. To point forward we rotate around X by -PI/2. To aim up we rotate around X by -PI.
          // For a forward+slightly-up aim, we use -1.4 rad (about 80°)
          const raiseAmt = -1.4 + recoil;
          targetLX = raiseAmt;
          targetRX = raiseAmt;
          // Sideways aim direction: rotate around Z so both arms angle toward aimAngle
          targetLZ = curAimAngle * 0.5;
          targetRZ = curAimAngle * 0.5;
        } else if (curAction === "slash") {
          // Right arm does the slash; left arm stays mostly down for balance
          const ph = curActionPhase;
          const slashDir = curAimAngle > 0 ? 1 : -1;
          if (ph < 0.25) {
            // Wind up: right arm raises overhead and back
            const k = ph / 0.25;
            targetRX = lerp(0, -2.6, k);       // arm goes UP and BACK
            targetRZ = lerp(0, slashDir * -0.6, k); // arm cocks to opposite side of target
          } else if (ph < 0.55) {
            // Strike: right arm WHIPS through (x²  ease for snappy mid)
            const k = (ph - 0.25) / 0.3;
            const kSharp = k * k;
            targetRX = lerp(-2.6, -1.0, kSharp);    // arm comes down from overhead
            targetRZ = lerp(slashDir * -0.6, slashDir * 0.8, kSharp); // arm swings across
          } else {
            // Follow through: arm returns to ready
            const k = (ph - 0.55) / 0.45;
            const kEase = 1 - (1 - k) * (1 - k);
            targetRX = lerp(-1.0, -0.3, kEase);
            targetRZ = lerp(slashDir * 0.8, curAimAngle * 0.3, kEase);
          }
          // Left arm stays roughly down with slight outward spread
          targetLX = -0.1;
          targetLZ = -0.15;
        } else if (curAction === "catch") {
          // Both arms reach up/forward, then pull back in
          const ph = curActionPhase;
          if (ph < 0.4) {
            // Reach out (arms rotate up)
            const k = ph / 0.4;
            const kEase = k * (2 - k);
            targetLX = lerp(0, -1.5, kEase);
            targetRX = lerp(0, -1.5, kEase);
            targetLZ = lerp(0, -0.15 + curAimAngle * 0.3, kEase);
            targetRZ = lerp(0, 0.15 + curAimAngle * 0.3, kEase);
          } else if (ph < 0.6) {
            // Peak extension with small pulse
            const pulse = Math.sin((ph - 0.4) / 0.2 * Math.PI) * 0.1;
            targetLX = -1.5 - pulse;
            targetRX = -1.5 - pulse;
            targetLZ = -0.15 + curAimAngle * 0.3;
            targetRZ = 0.15 + curAimAngle * 0.3;
          } else {
            // Pull in to chest
            const k = (ph - 0.6) / 0.4;
            const kEase = 1 - (1 - k) * (1 - k);
            targetLX = lerp(-1.5, -0.6, kEase);
            targetRX = lerp(-1.5, -0.6, kEase);
            targetLZ = lerp(-0.15 + curAimAngle * 0.3, -0.5, kEase);
            targetRZ = lerp(0.15 + curAimAngle * 0.3, 0.5, kEase);
          }
        } else {
          // Idle — subtle breathing sway
          targetLZ = Math.sin(t * 1.5) * 0.04;
          targetRZ = -Math.sin(t * 1.5) * 0.04;
        }
        // Lerp arms smoothly toward targets (snappier during actions)
        const k = curAction === "idle" ? 0.08 : 0.3;
        leftArm.rotation.x = lerp(leftArm.rotation.x, targetLX, k);
        leftArm.rotation.y = lerp(leftArm.rotation.y, targetLY, k);
        leftArm.rotation.z = lerp(leftArm.rotation.z, targetLZ, k);
        rightArm.rotation.x = lerp(rightArm.rotation.x, targetRX, k);
        rightArm.rotation.y = lerp(rightArm.rotation.y, targetRY, k);
        rightArm.rotation.z = lerp(rightArm.rotation.z, targetRZ, k);
      }

      if (pixel.visible) {
        pixel.position.y = Math.abs(Math.sin(t * 3)) * 0.12;
        pixel.rotation.y = Math.sin(t * 1.5) * 0.2;
      }
      if (nova.visible) {
        nova.position.y = Math.sin(t * 2.5) * 0.08;
        if (nova.userData.antenna) nova.userData.antenna.rotation.y = t * 3;
      }
      if (cipher.visible) {
        cipher.position.y = Math.sin(t * 1.2) * 0.1;
        if (cipher.userData.crystal) cipher.userData.crystal.rotation.y = t * 2;
      }
      // Vault motes
      if (vault.visible && vault.userData.motes) {
        vault.userData.motes.children.forEach((m, i) => {
          m.userData.angle += dt * m.userData.ySpeed * 0.5;
          m.position.x = Math.cos(m.userData.angle) * m.userData.radius;
          m.position.z = Math.sin(m.userData.angle) * m.userData.radius;
          m.position.y = 1.8 + Math.sin(t * m.userData.ySpeed + i) * 0.3;
        });
      }
      ring.material.opacity = 0.4 + Math.sin(t * 1.5) * 0.2;

      // ─── CELEBRATION ANIMATIONS (only when crowd is visible) ──────
      if (crowdGroup.visible) {
        // Crowd jumps up and down with staggered phases (like a stadium wave)
        for (const c of crowdMembers) {
          const jump = Math.max(0, Math.sin(t * c.bobSpeed + c.jumpPhase));
          c.mesh.position.y = jump * jump * 0.35; // squared for snappier jumps
          // Slight sway side-to-side
          c.mesh.rotation.y = c.baseRot + Math.sin(t * 1.2 + c.basePhase) * 0.15;
          // Body lean forward into jumps
          c.mesh.rotation.x = Math.sin(t * c.bobSpeed + c.jumpPhase) * -0.08;
        }

        // Confetti: falling, tumbling, respawning when off-screen
        for (const p of confettiPieces) {
          p.position.x += p.userData.vx * dt;
          p.position.y += p.userData.vy * dt;
          p.position.z += p.userData.vz * dt;
          // Gentle air drift wobble
          p.position.x += Math.sin(t * 2 + p.userData.spin) * 0.01;
          p.rotation.z += p.userData.spin * dt;
          p.rotation.x += p.userData.tumble * dt;
          // Respawn when confetti hits near ground
          if (p.position.y < 0.1) {
            p.position.y = p.userData.startY;
            p.position.x = p.userData.startX + (Math.random() - 0.5) * 2;
            p.position.z = p.userData.startZ + (Math.random() - 0.5) * 2;
          }
        }

        // Celebration rings expanding outward from platform
        for (let i = 0; i < celebRings.length; i++) {
          const r = celebRings[i];
          const phase = ((t + r.userData.phase) % 2.5) / 2.5; // 0..1 cycle every 2.5s
          const scale = 1 + phase * 7;
          r.scale.setScalar(scale);
          r.material.opacity = Math.max(0, 0.7 * (1 - phase));
        }
      }

      // Camera — different framing for play phases (avatar center-bottom)
      // vs dialogue phases (wider shot with NPCs)
      if (isPlayPhase) {
        // Framed so avatar stands at bottom center of view, ready for action
        const targetCX = 0;
        const targetCY = 3.2;
        const targetCZ = 5.5;
        camera.position.x = lerp(camera.position.x, targetCX, 0.08);
        camera.position.y = lerp(camera.position.y, targetCY, 0.08);
        camera.position.z = lerp(camera.position.z, targetCZ, 0.08);
        camera.lookAt(0, 1.3, 0);
      } else {
        // Dialogue/landing: orbit around origin
        const ang = Math.sin(t * 0.1) * 0.15;
        const targetCX = Math.sin(ang) * 7;
        const targetCZ = Math.cos(ang) * 7;
        camera.position.x = lerp(camera.position.x, targetCX, 0.08);
        camera.position.y = lerp(camera.position.y, 3, 0.08);
        camera.position.z = lerp(camera.position.z, targetCZ, 0.08);
        camera.lookAt(0, 1.2, -1);
      }
      // Render via post-processing composer if available, else direct
      if (composer) {
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
      rafId = requestAnimationFrame(animate);
    }
    animate();

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      if (composer) {
        composer.setSize(w, h);
      }
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener("resize", onResize);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
      if (composer) composer.dispose();
      scene.traverse((o) => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) {
          if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
          else o.material.dispose();
        }
      });
    };
  }, [avatarCfg]);

  // React to phase changes
  useEffect(() => {
    const r = refs.current;
    if (!r.scene) return;
    // Update phaseRef so animate() sees latest phase
    if (r.phaseRef) r.phaseRef.current = phase;
    r.gate.visible = false;
    r.tower.visible = false;
    r.vault.visible = false;
    r.pixel.visible = true;
    r.nova.visible = false;
    r.cipher.visible = false;
    // Hide celebration props by default
    if (r.crowdGroup) r.crowdGroup.visible = false;
    if (r.confettiGroup) r.confettiGroup.visible = false;
    if (r.celebRings) r.celebRings.forEach((cr) => (cr.visible = false));

    const isPlay = phase === "m1-play" || phase === "m2-play" || phase === "m3-play";

    // Sword: only visible during M2 play phase
    if (r.avatar.userData.sword) {
      r.avatar.userData.sword.visible = (phase === "m2-play");
    }

    if (phase === "m1-play") {
      // Play: avatar center-stage, NPC hidden, gate visible behind
      r.gate.visible = true;
      r.avatar.position.set(0, 0, 0.5);
      r.pixel.visible = false;
    } else if (phase === "m2-play") {
      r.tower.visible = true;
      r.avatar.position.set(0, 0, 0.5);
      r.nova.visible = false;
    } else if (phase === "m3-play") {
      r.vault.visible = true;
      r.avatar.position.set(0, 0, 0.5);
      r.cipher.visible = false;
    } else if (phase.startsWith("m1") || phase === "landing") {
      r.gate.visible = true;
      r.avatar.position.set(-1.3, 0, 0.3);
      r.pixel.position.set(1.3, 0, 0.3);
    } else if (phase.startsWith("m2")) {
      r.tower.visible = true;
      r.pixel.visible = false;
      r.nova.visible = true;
      r.avatar.position.set(-1.3, 0, 0.3);
      r.nova.position.set(1.5, 0, -0.5);
    } else if (phase.startsWith("m3")) {
      r.vault.visible = true;
      r.pixel.visible = false;
      r.cipher.visible = true;
      r.avatar.position.set(-1.3, 0, 0.3);
      r.cipher.position.set(1.5, 0, -0.5);
    } else if (phase === "finale" || phase === "complete") {
      r.pixel.visible = true;
      r.nova.visible = true;
      r.cipher.visible = true;
      r.avatar.position.set(0, 0, 1);
      r.pixel.position.set(-2, 0, 0);
      r.nova.position.set(2, 0, 0);
      r.cipher.position.set(0, 0, -2);
      // Celebration! Crowd cheers, confetti falls, rings pulse
      if (r.crowdGroup) r.crowdGroup.visible = true;
      if (r.confettiGroup) r.confettiGroup.visible = true;
      if (r.celebRings) r.celebRings.forEach((cr) => (cr.visible = true));
    }
  }, [phase]);

  return <div ref={mountRef} style={{ position: "absolute", inset: 0 }} />;
}

// NPC builders
// ═══════════════════════════════════════════════════════════════════════════
// CITY CITIZENS — mix of stylized humans and humanoid robots
// Lightweight versions (less geometry than player avatar) for performance
// since we place 20+ of them around the landing pad
// ═══════════════════════════════════════════════════════════════════════════

// Small human citizen — simplified version of the player avatar
function makeHumanCitizen(seed) {
  const g = new THREE.Group();
  const skinTones = ["#ffe0c7", "#f7c59f", "#d99a6c", "#a56a43", "#6b3d25", "#3e2415"];
  const outfitColors = [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1, 0xb58cff, 0xff8a5a, 0x8ac8ff];
  const hairColors = [0x1a1410, 0x4a2818, 0x8a5a3c, 0xd4a373, 0xe8b847, 0xff6fb5];
  const skin = skinTones[seed % skinTones.length];
  const outfit = outfitColors[(seed * 7) % outfitColors.length];
  const hair = hairColors[(seed * 13) % hairColors.length];

  const skinMat = new THREE.MeshStandardMaterial({
    color: skin, roughness: 0.65, metalness: 0.0,
  });
  const outfitMat = new THREE.MeshStandardMaterial({
    color: outfit, roughness: 0.55, metalness: 0.15,
    emissive: outfit, emissiveIntensity: 0.08,
  });
  const pantsMat = new THREE.MeshStandardMaterial({
    color: 0x1a2030, roughness: 0.7, metalness: 0.1,
  });
  const hairMat = new THREE.MeshStandardMaterial({
    color: hair, roughness: 0.5, metalness: 0.0,
  });

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 14),
    skinMat
  );
  head.position.y = 1.4;
  head.scale.set(0.95, 1.05, 0.95);
  g.add(head);
  // Hair cap (simple)
  const hairCap = new THREE.Mesh(
    new THREE.SphereGeometry(0.125, 14, 12, 0, Math.PI * 2, 0, Math.PI / 2),
    hairMat
  );
  hairCap.position.y = 1.4;
  hairCap.scale.set(1, 1.2, 1);
  g.add(hairCap);
  // Eyes (simple pair of dark dots)
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.015, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0x0a1020 })
    );
    eye.position.set(side * 0.04, 1.41, 0.105);
    g.add(eye);
  }
  // Torso
  const torso = new THREE.Mesh(

function makeCitizen(seed) {

}

// Build a detailed skyscraper with window lights, antenna, and glowing base
// Minimal tower for distant background — single box + optional beacon.
// Used for far rings to keep total mesh count reasonable.
function buildSimpleTower(height, emissiveColor, widthScale = 1) {
  const g = new THREE.Group();
  const baseW = 1.4 * widthScale;
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(baseW, height, baseW),
    new THREE.MeshStandardMaterial({
      color: 0x050814,
      emissive: emissiveColor,
      emissiveIntensity: 0.32,
      roughness: 0.45, metalness: 0.55,
    })
  );
  g.add(body);
  // A couple of accent stripes on 1 side only (vague window hint)
  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, height * 0.8, 0.04),
    new THREE.MeshBasicMaterial({ color: emissiveColor })
  );
  stripe.position.set(baseW * 0.3, 0, baseW * 0.51);
  g.add(stripe);
  // Top beacon for tall ones
  if (height > 20) {
    const beacon = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xff6688 })
    );
    beacon.position.y = height / 2 + 0.5;
    g.add(beacon);
  }
  return g;
}

function buildTower(height, emissiveColor, widthScale = 1) {
  const g = new THREE.Group();
  const baseW = 1.4 * widthScale;
  const baseD = 1.4 * widthScale;

  // Main body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(baseW, height, baseD),
    new THREE.MeshStandardMaterial({
      color: 0x0a1230,
      emissive: emissiveColor,
      emissiveIntensity: 0.25,
      roughness: 0.5,
      metalness: 0.4,
    })
  );
  body.userData.baseEmissive = 0.25;
  g.add(body);

  // Glowing accent stripes (vertical light lines)
  for (const s of [-1, 1]) {
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, height * 0.85, 0.08),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: emissiveColor,
        emissiveIntensity: 1.2,
      })
    );
    stripe.userData.baseEmissive = 1.2;
    stripe.position.set(s * baseW * 0.45, 0, baseD * 0.51);
    g.add(stripe);
    const stripe2 = stripe.clone();
    stripe2.position.set(s * baseW * 0.45, 0, -baseD * 0.51);
    g.add(stripe2);
  }

  // Window grid pattern (small emissive dots on front face)
  const windowRows = Math.floor(height / 1.2);
  for (let row = 0; row < windowRows; row++) {
    for (let col = 0; col < 3; col++) {
      if (Math.random() > 0.3) {
        const win = new THREE.Mesh(
          new THREE.PlaneGeometry(0.18, 0.18),
          new THREE.MeshBasicMaterial({
            color: [0x4de8ff, 0xffd36b, 0xff6fb5][Math.floor(Math.random() * 3)],
            transparent: true,
            opacity: 0.4 + Math.random() * 0.6,
          })
        );
        win.position.set(
          (col - 1) * baseW * 0.3,
          -height / 2 + 0.8 + row * 1.2,
          baseD * 0.51 + 0.01
        );
        g.add(win);
      }
    }
  }

  // Cap / antenna on top (for taller towers)
  if (height > 12) {
    const cap = new THREE.Mesh(
      new THREE.ConeGeometry(baseW * 0.3, 1.5, 4),
      new THREE.MeshStandardMaterial({
        color: 0x1a2850,
        emissive: emissiveColor,
        emissiveIntensity: 0.8,
      })
    );
    cap.userData.baseEmissive = 0.8;
    cap.position.y = height / 2 + 0.75;
    g.add(cap);
    // Blinking beacon
    const beacon = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xff6688 })
    );
    beacon.position.y = height / 2 + 1.6;
    g.add(beacon);
  }

  // Glowing base (skirt of light)
  const skirt = new THREE.Mesh(
    new THREE.BoxGeometry(baseW * 1.2, 0.3, baseD * 1.2),
    new THREE.MeshBasicMaterial({ color: emissiveColor, transparent: true, opacity: 0.6 })
  );
  skirt.position.y = -height / 2 + 0.15;
  g.add(skirt);

  return g;
}

  const g = new THREE.Group();
  // Frame — dark metal with cyan trim glow
  const frame = new THREE.Mesh(
