// ═══════════════════════════════════════════════════════════════════════════
// AVATAR BUILDER — builds a 3D mesh from customization config
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// HUMANOID AVATAR BUILDER
// Proper human proportions with articulated limbs, face features, hair.
// Total height ~1.75 units (assumes 1 unit = 1 meter roughly).
// Proportions based on "8 heads tall" ideal (simplified for stylized character).
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// HUMANOID AVATAR BUILDER
// Builds a stylized human character (Pixar/Fortnite proportions, not realistic)
// with articulated head, torso, arms (upper/lower/hands), legs (thigh/shin/feet),
// hair with volume, and outfits that look like clothing.
// Total height ~1.8 units, eyes at ~1.65 for camera framing.
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// 2D AVATAR RENDERER — for mission canvases
// Draws a simplified 2D representation of the player's avatar and ANIMATES it
// through action phases so it looks like the avatar is truly performing.
//
// Usage: drawAvatar2D(ctx, x, y, cfg, { action, phase, aimAngle, scale, idleT })
//
// Actions:
//   'idle'     — standing, gentle breathing bob (uses idleT)
//   'fire'     — shooting animation: raise → shoot+recoil → lower (uses aimAngle + phase 0..1)
//   'slash'    — sword swing: wind up → strike → follow through (uses phase 0..1, aimAngle for target)
//   'catch'    — reaching out → grab → pull-in (uses phase 0..1, aimAngle for reach direction)
//
// Returns: { handR: {x, y}, handL: {x, y} } — world-space hand positions
// so attached items (sword, shot origin) can render from the exact hand point.
// ═══════════════════════════════════════════════════════════════════════════
function drawAvatar2D(ctx, x, y, cfg, opts = {}) {
  const {
    action = "idle",
    phase = 0,        // 0..1 through the action
    aimAngle = 0,     // target direction, 0 = up, + = right
    scale = 1,
    idleT = 0,        // time in seconds for idle breathing
  } = opts;
  const isGirl = cfg.gender === "girl";

  const skin = cfg.skin || "#f7c59f";
  const hairColor = cfg.hairColor || "#4a2818";
  const outfit = cfg.outfitColor || "#4de8ff";
  const hairStyle = cfg.hairStyle || "short";

  const shoulderW = isGirl ? 20 : 26;
  const hipW = isGirl ? 22 : 18;
  const waistW = isGirl ? 14 : 18;

  // ═══ BODY ANIMATION STATE — computed from action/phase ═══
  // These values shift the whole body to make the action feel physical
  let bodyTilt = 0;      // rotation in radians (positive = lean right)
  let bodyShift = 0;     // horizontal shift (follow through on slashes)
  let bodyCompress = 0;  // vertical compression (-1 = crouch, +1 = stretch)
  let headTilt = 0;      // extra head rotation
  let legBend = 0;       // 0 = standing, 1 = bent knees
  let armPhaseL = null;  // {upperAng, elbowAng} or null for default idle
  let armPhaseR = null;

  // Idle breathing (applied to all actions as a subtle baseline)
  const breathe = Math.sin(idleT * 2) * 0.8;

  if (action === "idle") {
    bodyCompress = breathe * 0.03;
    // Gentle arm sway
    armPhaseL = { upperAng: Math.PI / 2 + 0.15 + Math.sin(idleT * 1.5) * 0.04, elbowAng: 0.1 };
    armPhaseR = { upperAng: Math.PI / 2 - 0.15 - Math.sin(idleT * 1.5) * 0.04, elbowAng: -0.1 };
  } else if (action === "fire") {
    // Fire cycle: 0-0.2 raise, 0.2-0.4 recoil+shoot, 0.4-1.0 hold aim then return
    // The whole body rocks back on the recoil then settles
    const windup = Math.min(1, phase / 0.2);         // 0..1 in first 20%
    const strike = Math.min(1, Math.max(0, (phase - 0.2) / 0.2)); // 0..1 from 20-40%
    const settle = Math.min(1, Math.max(0, (phase - 0.4) / 0.6)); // 0..1 from 40-100%
    const armAng = -Math.PI / 2 + aimAngle;
    // Wind up: pull arm back slightly before raising to aim
    // Strike: recoil backward (body rocks, arm bounces a tiny bit)
    // Settle: return to held aim position
    const recoilY = strike < 1 ? Math.sin(strike * Math.PI) * 6 : 0; // body bounces back
    const recoilAng = strike < 1 ? Math.sin(strike * Math.PI) * 0.2 : 0;
    bodyCompress = -recoilY / 30; // slight body lean back on recoil
    bodyTilt = aimAngle * 0.08; // tiny tilt toward aim direction
    legBend = 0.2 + strike * 0.15; // slight knee bend for stance
    // Arms: both raised toward aim, right arm slightly more forward
    armPhaseL = {
      upperAng: armAng - 0.12,
      elbowAng: 0.05 + windup * 0.1,
    };
    armPhaseR = {
      upperAng: armAng + 0.12 - recoilAng,
      elbowAng: -0.05 - windup * 0.1,
    };
  } else if (action === "slash") {
    // Slash cycle: 0-0.25 wind up (arm pulled back), 0.25-0.55 swing through,
    //              0.55-1.0 follow through + return
    // aimAngle indicates where the slash targets
    const slashDir = aimAngle > 0 ? 1 : -1; // which way to swing (right vs left)
    const absAim = Math.abs(aimAngle);

    if (phase < 0.25) {
      // WIND UP: sword goes overhead and to the opposite side of target
      const k = phase / 0.25; // 0..1
      // Raise arm overhead, cocked back away from target
      const startAng = -Math.PI / 2; // pointing up
      const windupAng = -Math.PI / 2 - slashDir * 1.2; // cocked to opposite side
      const armAng = lerp(Math.PI / 2, windupAng, k);
      armPhaseR = { upperAng: armAng, elbowAng: -0.4 * k };
      armPhaseL = { upperAng: Math.PI / 2 + 0.2, elbowAng: 0.3 };
      bodyTilt = -slashDir * 0.15 * k;  // body leans away (opposite side)
      bodyCompress = 0.05 * k;           // slight stretch up
      legBend = 0.1 * k;
      headTilt = -slashDir * 0.1 * k;
    } else if (phase < 0.55) {
      // STRIKE: sword swings through the target direction FAST
      const k = (phase - 0.25) / 0.3; // 0..1
      const kSharp = k * k; // snappier mid-swing
      // Sword arcs from windup side to target side
      const startAng = -Math.PI / 2 - slashDir * 1.2;
      const strikeAng = -Math.PI / 2 + aimAngle + slashDir * 0.3; // overshoot past target
      const armAng = lerp(startAng, strikeAng, kSharp);
      armPhaseR = { upperAng: armAng, elbowAng: -0.2 + k * 0.3 };
      armPhaseL = { upperAng: Math.PI / 2 + 0.15, elbowAng: 0.2 };
      // Body rotates WITH the swing — this is what sells it
      bodyTilt = lerp(-slashDir * 0.15, slashDir * 0.18, kSharp);
      bodyShift = slashDir * 3 * kSharp; // body moves into the swing
      bodyCompress = 0.05 - k * 0.1; // compress down into swing
      legBend = 0.25 + k * 0.2;
      headTilt = lerp(-slashDir * 0.1, slashDir * 0.12, kSharp);
    } else {
      // FOLLOW THROUGH: arm continues past target, body recovers
      const k = (phase - 0.55) / 0.45; // 0..1
      const kEase = 1 - (1 - k) * (1 - k); // ease out
      const strikeAng = -Math.PI / 2 + aimAngle + slashDir * 0.3;
      const restAng = -Math.PI / 2 + aimAngle * 0.5; // sword settles held forward
      const armAng = lerp(strikeAng, restAng, kEase);
      armPhaseR = { upperAng: armAng, elbowAng: 0.05 };
      armPhaseL = { upperAng: Math.PI / 2 + 0.15, elbowAng: 0.15 };
      bodyTilt = lerp(slashDir * 0.18, 0, kEase);
      bodyShift = lerp(slashDir * 3, 0, kEase);
      bodyCompress = lerp(-0.05, 0, kEase);
      legBend = lerp(0.45, 0.1, kEase);
      headTilt = lerp(slashDir * 0.12, 0, kEase);
    }
  } else if (action === "catch") {
    // Catch cycle: 0-0.4 reach out, 0.4-0.6 grab (peak extension),
    //              0.6-1.0 pull in (arms come back)
    const reachDir = aimAngle; // +right, -left, 0 = straight up
    if (phase < 0.4) {
      // REACH
      const k = phase / 0.4;
      const kEase = k * (2 - k); // ease out
      const reachAng = -Math.PI / 2 + reachDir;
      // Both arms extend toward target
      armPhaseL = {
        upperAng: lerp(Math.PI / 2 + 0.15, reachAng - 0.2, kEase),
        elbowAng: lerp(0.1, -0.1, kEase),
      };
      armPhaseR = {
        upperAng: lerp(Math.PI / 2 - 0.15, reachAng + 0.2, kEase),
        elbowAng: lerp(-0.1, 0.1, kEase),
      };
      bodyCompress = 0.08 * kEase; // stretch up to reach
      legBend = 0.1;
      headTilt = reachDir * 0.1 * kEase;
    } else if (phase < 0.6) {
      // GRAB — arms at peak extension, quick pulse
      const k = (phase - 0.4) / 0.2;
      const pulse = Math.sin(k * Math.PI) * 0.1;
      const reachAng = -Math.PI / 2 + reachDir;
      armPhaseL = { upperAng: reachAng - 0.2 + pulse, elbowAng: -0.1 };
      armPhaseR = { upperAng: reachAng + 0.2 - pulse, elbowAng: 0.1 };
      bodyCompress = 0.08 + pulse * 0.3;
      legBend = 0.1;
      headTilt = reachDir * 0.1;
    } else {
      // PULL IN — arms come back to chest
      const k = (phase - 0.6) / 0.4;
      const kEase = 1 - (1 - k) * (1 - k);
      const reachAng = -Math.PI / 2 + reachDir;
      armPhaseL = {
        upperAng: lerp(reachAng - 0.2, Math.PI / 6, kEase),
        elbowAng: lerp(-0.1, -1.0, kEase),
      };
      armPhaseR = {
        upperAng: lerp(reachAng + 0.2, Math.PI - Math.PI / 6, kEase),
        elbowAng: lerp(0.1, 1.0, kEase),
      };
      bodyCompress = lerp(0.08, 0, kEase);
      legBend = lerp(0.1, 0.2, kEase); // knees absorb pullback
      headTilt = lerp(reachDir * 0.1, 0, kEase);
    }
  }

  // ═══ APPLY BODY TRANSFORMS ═══
  ctx.save();
  ctx.translate(x + bodyShift, y);
  ctx.scale(scale, scale);
  // Body rotation happens around hip point (0,0)
  ctx.rotate(bodyTilt);

  // Drop shadow (not affected by body tilt — always below feet)
  ctx.save();
  ctx.rotate(-bodyTilt);
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath();
  ctx.ellipse(0, 22, 22, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Vertical body compression from actions
  const compressY = bodyCompress * 8; // compresses torso by up to 8px

  // ── LEGS ── (bend based on legBend)
  ctx.fillStyle = "#1a2030"; // pants
  // Upper leg (thigh) bent forward slightly when legBend > 0
  const legBendAng = legBend * 0.25;
  // Left leg
  ctx.save();
  ctx.translate(-hipW / 2 + 4, -5);
  ctx.rotate(-legBendAng);
  ctx.beginPath();
  ctx.roundRect(-5, 0, 10, 28 - legBend * 4, 3);
  ctx.fill();
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(hipW / 2 - 4, -5);
  ctx.rotate(legBendAng);
  ctx.beginPath();
  ctx.roundRect(-5, 0, 10, 28 - legBend * 4, 3);
  ctx.fill();
  ctx.restore();
  // Boots (stay at ground)
  ctx.fillStyle = "#0f1420";
  ctx.beginPath();
  ctx.roundRect(-hipW / 2 - 2, 20 - legBend * 3, 12, 5, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(hipW / 2 - 10, 20 - legBend * 3, 12, 5, 2);
  ctx.fill();

  // ── TORSO ──
  // Trapezoidal shape — chest at top, narrower waist, wider hips
  // compress visually by shortening vertical extent
  const chestY = -35 + compressY;
  const waistY = -10 + compressY * 0.5;
  ctx.fillStyle = outfit;
  ctx.beginPath();
  ctx.moveTo(-shoulderW / 2, chestY);
  ctx.lineTo(shoulderW / 2, chestY);
  ctx.lineTo(waistW / 2, waistY);
  ctx.lineTo(hipW / 2, -5);
  ctx.lineTo(-hipW / 2, -5);
  ctx.lineTo(-waistW / 2, waistY);
  ctx.closePath();
  ctx.fill();
  // Outfit accent stripe
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, chestY + 2); ctx.lineTo(0, waistY);
  ctx.stroke();
  // Neck
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.roundRect(-4, chestY - 5, 8, 7, 2);
  ctx.fill();

  // ── HEAD ── (with tilt)
  const headY = chestY - 15;
  ctx.save();
  ctx.translate(0, headY);
  ctx.rotate(headTilt);
  // Face
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(0, 0, 11, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eyes (track aim direction slightly during actions)
  const eyeShift = action !== "idle" ? aimAngle * 0.5 : Math.sin(idleT * 0.5) * 0.3;
  ctx.fillStyle = "#0a1020";
  ctx.beginPath();
  ctx.arc(-4 + eyeShift, 0, 1.6, 0, Math.PI * 2);
  ctx.arc(4 + eyeShift, 0, 1.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(-3.5 + eyeShift, -0.5, 0.6, 0, Math.PI * 2);
  ctx.arc(4.5 + eyeShift, -0.5, 0.6, 0, Math.PI * 2);
  ctx.fill();
  // Mouth — concentrated during actions, smiling at idle
  ctx.strokeStyle = "#6a3a2a";
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  if (action === "idle") {
    ctx.arc(0, 5, 3, 0, Math.PI); // smile
  } else {
    ctx.moveTo(-3, 5); ctx.lineTo(3, 5); // determined flat
  }
  ctx.stroke();

  // ── HAIR ── (rendered in head-local space)
  ctx.fillStyle = hairColor;
  if (hairStyle === "long") {
    ctx.beginPath();
    ctx.ellipse(0, -8, 13, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-11, -5);
    ctx.quadraticCurveTo(-14, 20, -12, 40);
    ctx.lineTo(-7, 40);
    ctx.quadraticCurveTo(-9, 20, -6, -2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(11, -5);
    ctx.quadraticCurveTo(14, 20, 12, 40);
    ctx.lineTo(7, 40);
    ctx.quadraticCurveTo(9, 20, 6, -2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -8, 10, 5, 0, Math.PI, 0);
    ctx.fill();
  } else if (hairStyle === "bun") {
    ctx.beginPath();
    ctx.ellipse(0, -8, 11, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -16, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (hairStyle === "puff") {
    for (let i = 0; i < 7; i++) {
      const ang = (i / 7) * Math.PI;
      ctx.beginPath();
      ctx.arc(Math.cos(ang) * 8, -8 - Math.sin(ang) * 6, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (hairStyle === "spiky") {
    ctx.beginPath();
    ctx.ellipse(0, -8, 12, 6, 0, Math.PI, 0);
    ctx.fill();
    for (let i = 0; i < 5; i++) {
      const sx = -8 + i * 4;
      ctx.beginPath();
      ctx.moveTo(sx - 2, -9);
      ctx.lineTo(sx, -18 - (i % 2) * 3);
      ctx.lineTo(sx + 2, -9);
      ctx.closePath();
      ctx.fill();
    }
  } else if (hairStyle === "buzz") {
    ctx.beginPath();
    ctx.ellipse(0, -7, 10, 4, 0, Math.PI, 0);
    ctx.fill();
  } else {
    // short
    ctx.beginPath();
    ctx.ellipse(0, -8, 12, 7, 0, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-3, -8);
    ctx.quadraticCurveTo(2, -5, 7, 2);
    ctx.quadraticCurveTo(3, -2, -3, -3);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore(); // end head

  // ── ARMS ── (use armPhaseL/R data from action computation)
  const shoulderY = chestY + 2; // shoulder sits just below chest top
  const sL = { x: -shoulderW / 2 + 1, y: shoulderY };
  const sR = { x: shoulderW / 2 - 1, y: shoulderY };

  function drawArm(shoulder, upperAngle, lowerAngleFromUpper, isHolding) {
    // Upper arm (outfit-colored sleeve)
    const elbow = {
      x: shoulder.x + Math.cos(upperAngle) * 16,
      y: shoulder.y + Math.sin(upperAngle) * 16,
    };
    const finalAngle = upperAngle + lowerAngleFromUpper;
    const hand = {
      x: elbow.x + Math.cos(finalAngle) * 15,
      y: elbow.y + Math.sin(finalAngle) * 15,
    };
    ctx.strokeStyle = outfit;
    ctx.lineWidth = 7;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(shoulder.x, shoulder.y);
    ctx.lineTo(elbow.x, elbow.y);
    ctx.stroke();
    ctx.strokeStyle = skin;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(elbow.x, elbow.y);
    ctx.lineTo(hand.x, hand.y);
    ctx.stroke();
    // Hand (small circle for definition)
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(hand.x, hand.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    return hand;
  }

  const apL = armPhaseL || { upperAng: Math.PI / 2 + 0.15, elbowAng: 0.1 };
  const apR = armPhaseR || { upperAng: Math.PI / 2 - 0.15, elbowAng: -0.1 };
  const handL_local = drawArm(sL, apL.upperAng, apL.elbowAng);
  const handR_local = drawArm(sR, apR.upperAng, apR.elbowAng);

  ctx.restore(); // end body transforms

  // Transform hand positions back to world space (accounting for body tilt/shift/scale)
  function toWorld(local) {
    // Apply: rotate(bodyTilt) → scale(scale) → translate(x+bodyShift, y)
    const rx = local.x * Math.cos(bodyTilt) - local.y * Math.sin(bodyTilt);
    const ry = local.x * Math.sin(bodyTilt) + local.y * Math.cos(bodyTilt);
    return {
      x: rx * scale + x + bodyShift,
      y: ry * scale + y,
    };
  }
  return {
    handL: toWorld(handL_local),
    handR: toWorld(handR_local),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// Helper: draw a glowing laser sword from origin at given angle and length
// The sword pivots around the hand. Angle 0 = pointing up.
// ═══════════════════════════════════════════════════════════════════════════
function drawLaserSword(ctx, originX, originY, angle, color = "#4de8ff", length = 70) {
  const tipX = originX + Math.cos(angle - Math.PI / 2) * length;
  const tipY = originY + Math.sin(angle - Math.PI / 2) * length;
  // Outer glow
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineCap = "round";
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.lineWidth = 10;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  // Inner blade
  ctx.globalAlpha = 0.9;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  // Core white-hot line
  ctx.strokeStyle = "#ffffff";
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 12;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  // Hilt
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#2a2f3a";
  ctx.beginPath();
  ctx.arc(originX, originY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  return { tipX, tipY };
}

function buildAvatarMesh(cfg) {
  const g = new THREE.Group();

  // Scale by body type
  const bs = { slim: 0.88, standard: 1.0, sturdy: 1.12 }[cfg.body] || 1.0;
  // Gender influences silhouette: girls = narrower shoulders + wider hips,
  // boys = broader shoulders + straight hips. Subtle but present.
  const isGirl = cfg.gender === "girl";
  const shoulderMult = isGirl ? 0.88 : 1.08;
  const hipMult = isGirl ? 1.08 : 0.96;
  const waistMult = isGirl ? 0.82 : 0.95; // girls have more waist taper

  // Shared materials
  const skinMat = new THREE.MeshStandardMaterial({
    color: cfg.skin, roughness: 0.65, metalness: 0.0,
  });
  const outfitMat = new THREE.MeshStandardMaterial({
    color: cfg.outfitColor, roughness: 0.55, metalness: 0.15,
    emissive: cfg.outfitColor, emissiveIntensity: 0.08,
  });
  const outfitAccent = new THREE.MeshStandardMaterial({
    color: cfg.outfitColor, roughness: 0.3, metalness: 0.5,
    emissive: cfg.outfitColor, emissiveIntensity: 0.4,
  });
  const pantsMat = new THREE.MeshStandardMaterial({
    color: 0x1a2030, roughness: 0.7, metalness: 0.1,
  });
  const bootMat = new THREE.MeshStandardMaterial({
    color: 0x0f1420, roughness: 0.5, metalness: 0.3,
  });
  const hairMat = new THREE.MeshStandardMaterial({
    color: cfg.hairColor, roughness: 0.5, metalness: 0.0,
  });
  const darkMat = new THREE.MeshStandardMaterial({
    color: 0x0a0e1a, roughness: 0.6, metalness: 0.2,
  });

  // ─── HEAD ───────────────────────────────────────────────────────────
  // Head slightly taller than wide for a more human shape
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.14, 24, 20),
    skinMat
  );
  head.position.y = 1.62;
  head.scale.set(0.92, 1.08, 0.95); // slightly egg-shaped
  g.add(head);

  // Jaw — subtle extrusion at the bottom of the head for chin definition
  const jaw = new THREE.Mesh(
    new THREE.SphereGeometry(0.11, 16, 12),
    skinMat
  );
  jaw.position.set(0, 1.54, 0.015);
  jaw.scale.set(0.85, 0.55, 0.85);
  g.add(jaw);

  // Neck
  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.055, 0.065, 0.1, 12),
    skinMat
  );
  neck.position.y = 1.48;
  g.add(neck);

  // ─── FACIAL FEATURES ────────────────────────────────────────────────
  // Eyes — proper depth with whites + irises + pupils + shine
  function makeEye(side) {
    const eyeGroup = new THREE.Group();
    // White of the eye (slightly set back into the skull)
    const white = new THREE.Mesh(
      new THREE.SphereGeometry(0.028, 12, 10),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.15, metalness: 0.0 })
    );
    eyeGroup.add(white);
    // Iris (colored)
    const iris = new THREE.Mesh(
      new THREE.CircleGeometry(0.017, 16),
      new THREE.MeshStandardMaterial({
        color: 0x3a6a9a, roughness: 0.2,
        emissive: 0x1a3060, emissiveIntensity: 0.3,
      })
    );
    iris.position.z = 0.022;
    eyeGroup.add(iris);
    // Pupil
    const pupil = new THREE.Mesh(
      new THREE.CircleGeometry(0.008, 12),
      new THREE.MeshBasicMaterial({ color: 0x050810 })
    );
    pupil.position.z = 0.024;
    eyeGroup.add(pupil);
    // Catchlight (the little reflection that makes eyes look alive)
    const shine = new THREE.Mesh(
      new THREE.CircleGeometry(0.004, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    shine.position.set(0.005, 0.003, 0.025);
    eyeGroup.add(shine);
    eyeGroup.position.set(side * 0.05, 1.635, 0.115);
    return eyeGroup;
  }
  g.add(makeEye(-1));
  g.add(makeEye(1));

  // Eyebrows — subtle arcs above the eyes
  for (const side of [-1, 1]) {
    const brow = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.008, 0.018),
      hairMat
    );
    brow.position.set(side * 0.05, 1.675, 0.12);
    brow.rotation.z = side * -0.15;
    g.add(brow);
  }

  // Nose — a small triangular prism giving the face depth
  const nose = new THREE.Mesh(
    new THREE.ConeGeometry(0.018, 0.05, 4),
    skinMat
  );
  nose.position.set(0, 1.605, 0.138);
  nose.rotation.x = Math.PI;
  nose.rotation.y = Math.PI / 4;
  nose.scale.set(1, 1.3, 0.9);
  g.add(nose);

  // Mouth — smile curve
  const smile = new THREE.Mesh(
    new THREE.TorusGeometry(0.022, 0.004, 6, 12, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0x8a3a3a, roughness: 0.4 })
  );
  smile.position.set(0, 1.555, 0.128);
  smile.rotation.z = Math.PI;
  g.add(smile);

  // Ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 10, 8),
      skinMat
    );
    ear.position.set(side * 0.12, 1.615, 0);
    ear.scale.set(0.5, 1, 0.7);
    g.add(ear);
  }

  // ─── HAIR ───────────────────────────────────────────────────────────
  // Replaces previous abstract hair with proper volume shapes
  if (cfg.hairStyle === "short") {
    // Cap of short hair on top of head, sideburn hints
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.145, 20, 16, 0, Math.PI * 2, 0, Math.PI / 2),
      hairMat
    );
    cap.position.y = 1.62;
    cap.scale.set(1, 1.15, 1);
    g.add(cap);
    // Small fringe at the front
    const fringe = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.04, 0.08),
      hairMat
    );
    fringe.position.set(0, 1.72, 0.08);
    fringe.rotation.x = -0.3;
    g.add(fringe);
  } else if (cfg.hairStyle === "long") {
    // Cap + long strands flowing down past the shoulders
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.145, 20, 16, 0, Math.PI * 2, 0, Math.PI / 2),
      hairMat
    );
    cap.position.y = 1.62;
    cap.scale.set(1.05, 1.1, 1.05);
    g.add(cap);
    // Side strands (frame the face)
    for (const side of [-1, 1]) {
      const strand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.055, 0.4, 8),
        hairMat
      );
      strand.position.set(side * 0.13, 1.4, 0);
      strand.scale.set(1, 1, 0.5);
      strand.userData.isHair = true;
      g.add(strand);
    }
    // Back mass of hair
    const back = new THREE.Mesh(
      new THREE.BoxGeometry(0.28, 0.5, 0.09),
      hairMat
    );
    back.position.set(0, 1.35, -0.085);
    back.userData.isHair = true;
    g.add(back);
  } else if (cfg.hairStyle === "spiky") {
    // Base cap
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 16, 14, 0, Math.PI * 2, 0, Math.PI / 2),
      hairMat
    );
    cap.position.y = 1.62;
    g.add(cap);
    // 9 spikes pointing up and out
    for (let i = 0; i < 9; i++) {
      const spike = new THREE.Mesh(
        new THREE.ConeGeometry(0.03, 0.13, 5),
        hairMat
      );
      const ang = (i / 9) * Math.PI - Math.PI / 2;
      spike.position.set(
        Math.cos(ang) * 0.09,
        1.77 + Math.sin(ang * 2) * 0.02,
        Math.sin(ang) * 0.05 + 0.03
      );
      spike.rotation.z = Math.cos(ang) * 0.4;
      spike.rotation.x = -0.1;
      g.add(spike);
    }
  } else if (cfg.hairStyle === "bun") {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.145, 20, 16, 0, Math.PI * 2, 0, Math.PI / 2),
      hairMat
    );
    cap.position.y = 1.62;
    g.add(cap);
    // The bun
    const bun = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 14, 12),
      hairMat
    );
    bun.position.set(0, 1.82, -0.03);
    g.add(bun);
    // hair tie accent
    const tie = new THREE.Mesh(
      new THREE.TorusGeometry(0.08, 0.01, 6, 16),
      outfitAccent
    );
    tie.position.set(0, 1.75, -0.02);
    tie.rotation.x = Math.PI / 2;
    g.add(tie);
  } else if (cfg.hairStyle === "puff") {
    const puff = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 20, 16),
      hairMat
    );
    puff.position.set(0, 1.72, 0);
    puff.scale.set(1.1, 0.95, 1.1);
    g.add(puff);
    // Little highlights (textured look)
    for (let i = 0; i < 6; i++) {
      const highlight = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 8, 6),
        hairMat
      );
      const ang = (i / 6) * Math.PI * 2;
      highlight.position.set(Math.cos(ang) * 0.18, 1.72 + Math.sin(ang * 2) * 0.08, Math.sin(ang) * 0.18);
      g.add(highlight);
    }
  } else if (cfg.hairStyle === "buzz") {
    const buzz = new THREE.Mesh(
      new THREE.SphereGeometry(0.142, 14, 12, 0, Math.PI * 2, 0, Math.PI / 2),
      hairMat
    );
    buzz.position.y = 1.62;
    buzz.scale.set(1, 0.85, 1);
    g.add(buzz);
  }

  // ─── TORSO ──────────────────────────────────────────────────────────
  // Main chest — tapered rectangular form
  // Gender: girls narrower shoulders, boys broader
  const chest = new THREE.Mesh(
    new THREE.BoxGeometry(0.4 * bs * shoulderMult, 0.28, 0.24 * bs),
    outfitMat
  );
  chest.position.y = 1.26;
  g.add(chest);
  // Waist — narrows between chest and hips (more pronounced on girls)
  const waist = new THREE.Mesh(
    new THREE.CylinderGeometry(0.16 * bs * waistMult, 0.17 * bs * hipMult, 0.18, 12),
    outfitMat
  );
  waist.position.y = 1.00;
  g.add(waist);
  // Abdomen / hips — wider on girls
  const abdomen = new THREE.Mesh(
    new THREE.CylinderGeometry(0.17 * bs * hipMult, 0.18 * bs * hipMult, 0.16, 12),
    outfitMat
  );
  abdomen.position.y = 0.83;
  g.add(abdomen);

  // Outfit-style specific torso details
  if (cfg.outfitStyle === "suit") {
    // Chest zipper stripe running down center
    const zipper = new THREE.Mesh(
      new THREE.BoxGeometry(0.03, 0.5, 0.01),
      outfitAccent
    );
    zipper.position.set(0, 1.1, 0.125 * bs);
    g.add(zipper);
    // Collar
    const collar = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.05, 0.08),
      outfitAccent
    );
    collar.position.set(0, 1.4, 0.1);
    g.add(collar);
  } else if (cfg.outfitStyle === "jacket") {
    // Jacket lapels (two triangular-ish flaps at chest)
    for (const side of [-1, 1]) {
      const lapel = new THREE.Mesh(
        new THREE.BoxGeometry(0.09, 0.2, 0.03),
        outfitAccent
      );
      lapel.position.set(side * 0.08, 1.25, 0.125 * bs);
      lapel.rotation.z = side * -0.2;
      g.add(lapel);
    }
    // Collar
    const collar = new THREE.Mesh(
      new THREE.TorusGeometry(0.12, 0.03, 6, 16, Math.PI),
      outfitAccent
    );
    collar.position.set(0, 1.42, 0.04);
    collar.rotation.x = Math.PI / 2;
    collar.rotation.z = Math.PI;
    g.add(collar);
  } else if (cfg.outfitStyle === "robe") {
    // Robe flows out below the waist
    const robe = new THREE.Mesh(
      new THREE.ConeGeometry(0.4 * bs, 0.7, 12, 1, true),
      new THREE.MeshStandardMaterial({
        color: cfg.outfitColor, roughness: 0.6,
        emissive: cfg.outfitColor, emissiveIntensity: 0.1,
        side: THREE.DoubleSide,
      })
    );
    robe.position.y = 0.4;
    g.add(robe);
    // Hood at neck
    const hood = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 12, 10, 0, Math.PI * 2, 0, Math.PI / 2.2),
      outfitMat
    );
    hood.position.set(0, 1.4, -0.08);
    hood.rotation.x = 0.5;
    g.add(hood);
  } else if (cfg.outfitStyle === "armor") {
    // Chest plate
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(0.44 * bs, 0.45, 0.1),
      new THREE.MeshStandardMaterial({
        color: cfg.outfitColor, metalness: 0.8, roughness: 0.25,
        emissive: cfg.outfitColor, emissiveIntensity: 0.2,
      })
    );
    plate.position.set(0, 1.18, 0.12 * bs);
    g.add(plate);
    // Plate glow accent (diagonal strip)
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, 0.4, 0.01),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff })
    );
    stripe.position.set(0, 1.18, 0.17 * bs);
    stripe.rotation.z = 0.2;
    g.add(stripe);
    // Shoulder pauldrons
    for (const side of [-1, 1]) {
      const pauldron = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2),
        new THREE.MeshStandardMaterial({
          color: cfg.outfitColor, metalness: 0.8, roughness: 0.3,
          emissive: cfg.outfitColor, emissiveIntensity: 0.25,
        })
      );
      pauldron.position.set(side * 0.23 * bs, 1.38, 0);
      pauldron.rotation.z = side * -0.2;
      g.add(pauldron);
    }
  }

  // Belt
  const belt = new THREE.Mesh(
    new THREE.BoxGeometry(0.38 * bs, 0.06, 0.22 * bs),
    new THREE.MeshStandardMaterial({ color: 0x0a0e1a, roughness: 0.5, metalness: 0.6 })
  );
  belt.position.y = 0.76;
  g.add(belt);
  // Belt buckle
  const buckle = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.05, 0.02),
    new THREE.MeshStandardMaterial({
      color: 0xffd36b, metalness: 0.9, roughness: 0.2,
      emissive: 0xffd36b, emissiveIntensity: 0.4,
    })
  );
  buckle.position.set(0, 0.76, 0.12 * bs);
  g.add(buckle);

  // ─── ARMS ───────────────────────────────────────────────────────────
  // Each arm is in a pivot group at the shoulder so rotating the group
  // swings the whole arm around the shoulder (for aim/slash/catch actions).
  const armPivots = { left: null, right: null };
  for (const side of [-1, 1]) {
    const armGroup = new THREE.Group();
    // Pivot point is the shoulder location. All children are positioned
    // RELATIVE to this pivot (shoulder at origin), extending downward.
    armGroup.position.set(side * 0.22 * bs, 1.38, 0);

    // Shoulder ball (at pivot)
    const shoulder = new THREE.Mesh(
      new THREE.SphereGeometry(0.075, 14, 10),
      outfitMat
    );
    armGroup.add(shoulder);

    // Upper arm — hangs down from pivot
    const upperArm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.055, 0.32, 10),
      outfitMat
    );
    upperArm.position.set(side * 0.03 * bs, -0.18, 0);
    upperArm.rotation.z = side * 0.1;
    armGroup.add(upperArm);

    // Elbow
    const elbow = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 12, 10),
      outfitMat
    );
    elbow.position.set(side * 0.06 * bs, -0.35, 0);
    armGroup.add(elbow);

    // Forearm
    const forearm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.053, 0.048, 0.3, 10),
      outfitMat
    );
    forearm.position.set(side * 0.08 * bs, -0.51, 0);
    forearm.rotation.z = side * 0.05;
    armGroup.add(forearm);

    // Hand
    const hand = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 12, 10),
      skinMat
    );
    hand.position.set(side * 0.09 * bs, -0.68, 0);
    hand.scale.set(0.7, 1, 0.9);
    hand.userData.isHand = true;
    armGroup.add(hand);
    const fingers = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.08, 0.05),
      skinMat
    );
    fingers.position.set(side * 0.09 * bs, -0.72, 0.02);
    armGroup.add(fingers);

    // Store the idle rest rotation so animations can lerp back
    armGroup.userData.restRotation = { x: 0, y: 0, z: 0 };
    if (side === -1) armPivots.left = armGroup;
    else armPivots.right = armGroup;
    g.add(armGroup);
  }
  // Expose arm pivots via userData so external code can animate them
  g.userData.leftArm = armPivots.left;
  g.userData.rightArm = armPivots.right;

  // ─── LASER SWORD (attached to right hand, hidden by default) ────────
  const swordGroup = new THREE.Group();
  // Hilt
  const hilt = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 0.15, 10),
    new THREE.MeshStandardMaterial({ color: 0x2a2f3a, metalness: 0.85, roughness: 0.3 })
  );
  hilt.position.y = -0.08;
  swordGroup.add(hilt);
  // Blade — glowing cylinder
  const bladeMat = new THREE.MeshBasicMaterial({
    color: cfg.outfitColor,
    transparent: true,
    opacity: 0.85,
  });
  const blade = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.01, 0.9, 10),
    bladeMat
  );
  blade.position.y = -0.6;
  swordGroup.add(blade);
  // Inner white core for the "hot" center of the blade
  const coreMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.95,
  });
  const bladeCore = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.005, 0.88, 8),
    coreMat
  );
  bladeCore.position.y = -0.6;
  swordGroup.add(bladeCore);
  // Glow point light at the hilt to light the hand
  const swordLight = new THREE.PointLight(cfg.outfitColor, 0.6, 1.5, 2);
  swordLight.position.y = -0.5;
  swordGroup.add(swordLight);
  // Position the sword in the right hand (local-to-right-arm-pivot)
  // Right hand is at local (0.09*bs, -0.68, 0) and sword extends further down
  swordGroup.position.set(0.09 * bs, -0.68, 0);
  swordGroup.visible = false;
  armPivots.right.add(swordGroup);
  g.userData.sword = swordGroup;
  g.userData.swordBlade = blade;
  g.userData.swordCore = bladeCore;
  g.userData.swordLight = swordLight;

  // ─── LEGS ───────────────────────────────────────────────────────────
  for (const side of [-1, 1]) {
    // Thigh
    const thigh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1 * bs, 0.09 * bs, 0.4, 12),
      pantsMat
    );
    thigh.position.set(side * 0.1 * bs, 0.52, 0);
    g.add(thigh);

    // Knee
    const knee = new THREE.Mesh(
      new THREE.SphereGeometry(0.085 * bs, 12, 10),
      pantsMat
    );
    knee.position.set(side * 0.1 * bs, 0.3, 0);
    g.add(knee);

    // Shin
    const shin = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08 * bs, 0.075 * bs, 0.35, 12),
      pantsMat
    );
    shin.position.set(side * 0.1 * bs, 0.12, 0);
    g.add(shin);

    // Boot
    const boot = new THREE.Mesh(
      new THREE.BoxGeometry(0.15 * bs, 0.1, 0.25),
      bootMat
    );
    boot.position.set(side * 0.1 * bs, -0.03, 0.04);
    g.add(boot);
    // Boot toe cap
    const toe = new THREE.Mesh(
      new THREE.BoxGeometry(0.15 * bs, 0.07, 0.05),
      new THREE.MeshStandardMaterial({
        color: cfg.outfitColor, metalness: 0.6, roughness: 0.35,
        emissive: cfg.outfitColor, emissiveIntensity: 0.25,
      })
    );
    toe.position.set(side * 0.1 * bs, -0.04, 0.16);
    g.add(toe);
  }

  // ─── ACCESSORY ──────────────────────────────────────────────────────
  if (cfg.accessory === "visor") {
    const visor = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.05, 0.03),
      new THREE.MeshStandardMaterial({
        color: 0x4de8ff, emissive: 0x4de8ff, emissiveIntensity: 1.0,
        metalness: 0.7, roughness: 0.15,
      })
    );
    visor.position.set(0, 1.66, 0.128);
    g.add(visor);
    // Side stems attaching visor to ears
    for (const side of [-1, 1]) {
      const stem = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, 0.02, 0.12),
        darkMat
      );
      stem.position.set(side * 0.13, 1.66, 0.06);
      g.add(stem);
    }
  } else if (cfg.accessory === "headband") {
    const band = new THREE.Mesh(
      new THREE.TorusGeometry(0.14, 0.02, 8, 18),
      outfitAccent
    );
    band.position.y = 1.73;
    band.rotation.x = Math.PI / 2;
    band.scale.set(1, 1, 0.7);
    g.add(band);
  } else if (cfg.accessory === "cape") {
    const cape = new THREE.Mesh(
      new THREE.PlaneGeometry(0.45, 0.9),
      new THREE.MeshStandardMaterial({
        color: cfg.outfitColor, emissive: cfg.outfitColor, emissiveIntensity: 0.12,
        side: THREE.DoubleSide, transparent: true, opacity: 0.92, roughness: 0.7,
      })
    );
    cape.position.set(0, 1.05, -0.15);
    cape.userData.isCape = true;
    g.add(cape);
    // Cape clasp at the neck
    const clasp = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.04, 0),
      new THREE.MeshStandardMaterial({
        color: 0xffd36b, metalness: 0.9, roughness: 0.2,
        emissive: 0xffd36b, emissiveIntensity: 0.5,
      })
    );
    clasp.position.set(0, 1.44, -0.02);
    g.add(clasp);
  } else if (cfg.accessory === "wings") {
    for (const side of [-1, 1]) {
      const wing = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.55, 3),
        new THREE.MeshStandardMaterial({
          color: 0xffffff, emissive: 0xb58cff, emissiveIntensity: 0.6,
          transparent: true, opacity: 0.75, side: THREE.DoubleSide,
        })
      );
      wing.position.set(side * 0.22, 1.35, -0.15);
      wing.rotation.z = side * Math.PI / 2.3;
      wing.rotation.y = side * 0.3;
      wing.userData.isWing = true;
      g.add(wing);
    }
  }

  g.userData.cfg = cfg;
  g.userData.isPlayerAvatar = true;
  return g;
}

// GLITCH BOT — the cute enemy
// ═══════════════════════════════════════════════════════════════════════════
function makeGlitchBot(variant = 0) {
  const colors = [0xff6688, 0xff8ac0, 0xc66dff];
  const color = colors[variant % colors.length];
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 14, 12),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5, roughness: 0.3 })
  );
  g.add(body);
  // glitchy eyes — angry but cute (not scary)
  for (const x of [-0.12, 0.12]) {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    eye.position.set(x, 0.06, 0.3);
    g.add(eye);
    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0x0a1230 })
    );
    pupil.position.set(x, 0.04, 0.34);
    g.add(pupil);
  }
  // little antenna
  const ant = new THREE.Mesh(
    new THREE.CylinderGeometry(0.015, 0.015, 0.2, 6),
    new THREE.MeshBasicMaterial({ color: 0xffd36b })
  );
  ant.position.y = 0.45;
  g.add(ant);
  const tip = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffd36b })
  );
  tip.position.y = 0.58;
  g.add(tip);
  return g;
}

// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════════════
function CyberiaGame() {
  const [phase, setPhase] = useState("start");
  const [nameInput, setNameInput] = useState("");
  const [playerName, setPlayerName] = useState("");
  const [avatarCfg, setAvatarCfg] = useState(DEFAULT_AVATAR);
  const [dialogueIdx, setDialogueIdx] = useState(0);
  // Shared ref for missions to signal the 3D avatar to perform actions.
  // Missions update this; GameScene reads it every frame to animate arms.
  // Shape: { action, aimAngle, triggeredAt, laneX (for M3 lane-based movement) }
  const actionRef = useRef({ action: "idle", aimAngle: 0, triggeredAt: 0, laneX: 0 });

  const d = useMemo(() => dialogue(playerName || "Guardian"), [playerName]);

  // Phase-driven music — switches tracks as the game progresses
  useEffect(() => {
    const musicMap = {
      "start":             "title",
      "opening-crawl":     "title",
      "landing-cinematic": "cinematic",
      "avatar-lab":        "title",
      "landing":           "title",
      "m1-intro":          "mission1",
      "m1-play":           "mission1",
      "m1-win":            "victory",
      "m2-intro":          "mission2",
      "m2-play":           "mission2",
      "m2-win":            "victory",
      "m3-intro":          "mission3",
      "m3-play":           "mission3",
      "m3-win":            "victory",
      "finale":            "victory",
      "complete":          "victory",
    };
    const track = musicMap[phase];
    if (track) MusicEngine.play(track);
  }, [phase]);

  function startLanding() {
    if (!nameInput.trim()) return;
    setPlayerName(nameInput.trim().slice(0, 12));
    setPhase("opening-crawl");
  }

  function goNext() {
    const cl = currentLine(phase, dialogueIdx, d);
    if (cl.hasMore) setDialogueIdx((i) => i + 1);
    else {
      setDialogueIdx(0);
      advancePhase();
    }
  }

  function currentLine(p, idx, d) {
    const lines = {
      "landing": d.landing,
      "m1-intro": d.m1Intro,
      "m1-win": d.m1Win,
      "m2-intro": d.m2Intro,
      "m2-win": d.m2Win,
      "m3-intro": d.m3Intro,
      "m3-win": d.m3Win,
      "finale": d.finale,
    }[p];
    if (!lines) return { line: null, hasMore: false };
    return { line: lines[idx], hasMore: idx < lines.length - 1 };
  }

  function advancePhase() {
    const order = [
      "landing", "m1-intro", "m1-play", "m1-win",
      "m2-intro", "m2-play", "m2-win",
      "m3-intro", "m3-play", "m3-win",
      "finale", "complete",
    ];
    const i = order.indexOf(phase);
    if (i >= 0 && i < order.length - 1) setPhase(order[i + 1]);
  }

  function resetGame() {
    setPhase("start");
    setPlayerName("");
    setNameInput("");
    setDialogueIdx(0);
    setAvatarCfg(DEFAULT_AVATAR);
  }

  return (
    <div style={styles.root}>
      <style>{globalCss}</style>
      <AudioControls />

      {phase === "start" && (
        <StartScreen
          nameInput={nameInput}
          setNameInput={setNameInput}
          onStart={startLanding}
        />
      )}

      {phase === "opening-crawl" && (
        <OpeningCrawl
          playerName={playerName}
          onComplete={() => setPhase("landing-cinematic")}
        />
      )}

      {phase === "landing-cinematic" && (
        <LandingCinematic
          avatarCfg={avatarCfg}
          onComplete={() => setPhase("avatar-lab")}
        />
      )}

      {phase === "avatar-lab" && (
        <AvatarLab
          cfg={avatarCfg}
          setCfg={setAvatarCfg}
          playerName={playerName}
          onComplete={() => setPhase("landing")}
        />
      )}

      {phase !== "start" && phase !== "opening-crawl" && phase !== "landing-cinematic" && phase !== "avatar-lab" && (
        <GameScene
          phase={phase}
          avatarCfg={avatarCfg}
          playerName={playerName}
          actionRef={actionRef}
        />
      )}

      {phase !== "start" && phase !== "opening-crawl" && phase !== "landing-cinematic" && phase !== "avatar-lab" && (
        <>
          <div style={styles.scanlines} />
          <TopHUD phase={phase} name={playerName} />

          {(() => {
            const cl = currentLine(phase, dialogueIdx, d);
            if (!cl.line) return null;
            return <DialogueBox line={cl.line} onNext={goNext} isLast={!cl.hasMore} />;
          })()}

          {phase === "m1-play" && <Mission1Shooter avatarCfg={avatarCfg} actionRef={actionRef} onComplete={() => setPhase("m1-win")} />}
          {phase === "m2-play" && <Mission2Rhythm avatarCfg={avatarCfg} actionRef={actionRef} onComplete={() => setPhase("m2-win")} />}
          {phase === "m3-play" && <Mission3Dodge avatarCfg={avatarCfg} actionRef={actionRef} onComplete={() => setPhase("m3-win")} />}

          {(phase === "complete" ||
            (phase === "finale" && dialogueIdx >= d.finale.length - 1)) && (
            <FinaleBadge name={playerName} onReplay={resetGame} />
          )}
        </>
      )}
    </div>
  );
}

// START SCREEN (the title screen from v1)
// ═══════════════════════════════════════════════════════════════════════════
function StarfieldBg() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let rafId, stars = [], shooters = [], lastShooterSpawn = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const count = Math.min(220, Math.floor((w * h) / 4500));
      stars = Array.from({ length: count }, () => {
        const r = Math.random();
        return {
          x: Math.random() * w, y: Math.random() * h,
          size: r < 0.85 ? Math.random() * 1.3 + 0.3 : Math.random() * 2 + 1.2,
          twinkleSpeed: 0.5 + Math.random() * 2,
          twinklePhase: Math.random() * Math.PI * 2,
          color: r < 0.7 ? "#ffffff" : r < 0.85 ? "#4de8ff" : r < 0.95 ? "#ff6fb5" : "#ffd36b",
        };
      });
    }
    resize();
    window.addEventListener("resize", resize);

    function spawnShooter() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const fromLeft = Math.random() > 0.5;
      const startX = fromLeft ? -50 : w + 50;
      const startY = Math.random() * h * 0.5;
      const angle = fromLeft
        ? Math.PI / 4 + (Math.random() - 0.5) * 0.3
        : (3 * Math.PI) / 4 + (Math.random() - 0.5) * 0.3;
      const speed = 550 + Math.random() * 250;
      shooters.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1.2, maxLife: 1.2, trail: [],
      });
    }

    const start = performance.now();
    function draw(now) {
      const t = (now - start) / 1000;
      const dt = Math.min(0.05, (now - (draw.last || now)) / 1000);
      draw.last = now;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      for (const s of stars) {
        const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        if (s.size > 1.5) {
          ctx.globalAlpha = alpha * 0.3;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      if (now - lastShooterSpawn > 1800 + Math.random() * 1700) {
        spawnShooter();
        lastShooterSpawn = now;
      }
      ctx.globalAlpha = 1;
      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.life -= dt;
        sh.trail.push({ x: sh.x, y: sh.y });
        if (sh.trail.length > 18) sh.trail.shift();
        if (sh.life <= 0 || sh.x < -100 || sh.x > w + 100 || sh.y > h + 100) {
          shooters.splice(i, 1);
          continue;
        }
        for (let j = 1; j < sh.trail.length; j++) {
          const p0 = sh.trail[j - 1], p1 = sh.trail[j];
          const tFrac = j / sh.trail.length;
          ctx.globalAlpha = tFrac * (sh.life / sh.maxLife);
          ctx.strokeStyle = `rgba(255, 220, 180, ${tFrac})`;
          ctx.lineWidth = tFrac * 2.2;
          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
        }
        ctx.globalAlpha = sh.life / sh.maxLife;
        const grad = ctx.createRadialGradient(sh.x, sh.y, 0, sh.x, sh.y, 6);
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.4, "rgba(255,200,140,0.9)");
        grad.addColorStop(1, "rgba(255,180,100,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      rafId = requestAnimationFrame(draw);
    }
    rafId = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(rafId); window.removeEventListener("resize", resize); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} />;
}

function StartScreen({ nameInput, setNameInput, onStart }) {
  return (
    <div style={styles.startRoot}>
      <StarfieldBg />
      <div style={styles.startNebula} />
      <div style={styles.startContent}>
        <div style={styles.logoLyf}>LYF</div>
        <div style={styles.logoSubtitle}>Learn Your Future</div>
        <div style={styles.tagline}>A UNIVERSE OF WORLDS · ONE GUARDIAN</div>
        <div style={styles.startForm}>
          <label style={styles.startLabel}>What should we call you, Guardian?</label>
          <input
            style={styles.nameInput}
            value={nameInput}
            onChange={(e) => setNameInput(e.target.value)}
            placeholder="type your name"
            maxLength={12}

          />
          <button
            style={{ ...styles.bigButton, opacity: nameInput.trim() ? 1 : 0.4, marginTop: 22 }}

          </button>
        </div>
      </div>
    </div>
  );
}

// OPENING CRAWL — sits between the Launch button and the landing cinematic.
// Introduces the LYF universe. Kept short so kids don't lose interest.
// ═══════════════════════════════════════════════════════════════════════════
const CRAWL_LINES = [
  {
    audioId: "crawl-1",
    text: "In a universe made of dreams and data, three worlds teach the skills every kid needs...",
    duration: 4200,
    style: "body",
  },
  {
    audioId: "crawl-harmonia",
    text: "HARMONIA",
    subtitle: "where feelings become melodies.",
    duration: 3200,
    style: "planet",
    color: "#ff6fb5",
  },
  {
    audioId: "crawl-financia",
    text: "FINANCIA",
    subtitle: "where every coin is a choice.",
    duration: 3200,
    style: "planet",
    color: "#ffd36b",
  },
  {
    audioId: "crawl-cyberia",
    text: "CYBERIA",
    subtitle: "a world of data and guardians... now under attack.",
    duration: 3600,
    style: "planet",
    color: "#4de8ff",
  },
  {
    audioId: "crawl-call",
    text: "Cyberia needs a Guardian.",
    duration: 2600,
    style: "call",
  },
  {
    audioId: "crawl-final",
    text: "Someone like YOU.",
    duration: 3000,
    style: "final",
  },
];

function OpeningCrawl({ playerName, onComplete }) {
  const [lineIdx, setLineIdx] = useState(0);
  const [skippable, setSkippable] = useState(false);
  const canvasRef = useRef(null);
  const cancelledRef = useRef(false);

  // Voice-driven advance: each line plays to completion, then we advance.
  // The line's `duration` field acts as a MINIMUM display time so visuals
  // don't flash by; lines never cut off voice mid-sentence.
  useEffect(() => {
    cancelledRef.current = false;
    // Show skip button after a brief moment so kids see it but it doesn't dominate
    const skipT = setTimeout(() => setSkippable(true), 600);

    let activeTimer = null;
    function playLine(idx) {
      if (cancelledRef.current) return;
      if (idx >= CRAWL_LINES.length) {
        // All lines spoken — give a brief pause then complete
        activeTimer = setTimeout(() => {
          if (!cancelledRef.current) onComplete();
        }, 600);
        return;
      }
      setLineIdx(idx);
      const line = CRAWL_LINES[idx];
      let toSpeak = line.text;
      if (line.style === "final") {
        toSpeak = toSpeak.replace("YOU", playerName);
      }
      if (line.subtitle) {
        toSpeak = `${line.text}. ${line.subtitle}`;
      }
      const audioUrl = line.audioId ? `${AUDIO_BASE_URL}${line.audioId}.mp3` : null;
      const startTime = performance.now();
      // Minimum display time before we'll advance, even if voice finishes quickly
      const minDisplay = Math.min(line.duration, 2200);
      // Safety net: if the voice engine never fires onEnd (browser quirk,
      // muted state, missing voices on first paint), advance after a max
      // wait so we never get stuck on a line.
      let advanced = false;
      const advance = () => {
        if (advanced || cancelledRef.current) return;
        advanced = true;
        const elapsed = performance.now() - startTime;
        const remaining = Math.max(0, minDisplay - elapsed);
        activeTimer = setTimeout(() => {
          if (!cancelledRef.current) playLine(idx + 1);
        }, remaining);
      };
      // Hard cap: even if voice somehow never returns, advance after this.
      // 8s is plenty for any single crawl line.
      const safetyTimer = setTimeout(advance, 8000);
      VoiceEngine.speak(toSpeak, "NARRATOR", () => {
        clearTimeout(safetyTimer);
        advance();
      }, audioUrl);
    }
    // Kick off the chain
    playLine(0);

    return () => {
      cancelledRef.current = true;
      clearTimeout(skipT);
      if (activeTimer) clearTimeout(activeTimer);
      VoiceEngine.cancel();
    };
  }, [onComplete, playerName]);

  // Skip handler — cancels everything cleanly and jumps to next phase
  function handleSkip() {
    cancelledRef.current = true;
    VoiceEngine.cancel();
    onComplete();
  }

  // Canvas background: deep-space nebula with drifting planets + parallax stars
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    let stars = [];
    let planets = [];

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = canvas.clientWidth, h = canvas.clientHeight;
      // 3 parallax layers of stars
      stars = [];
      const layers = [
        { count: 100, sizeMin: 0.3, sizeMax: 0.9, speed: 0.04, alpha: 0.7 }, // far
        { count: 60, sizeMin: 0.6, sizeMax: 1.6, speed: 0.12, alpha: 0.85 }, // mid
        { count: 30, sizeMin: 1.0, sizeMax: 2.4, speed: 0.28, alpha: 1.0 },  // near
      ];
      for (const L of layers) {
        for (let i = 0; i < L.count; i++) {
          const r = Math.random();
          stars.push({
            x: Math.random() * w, y: Math.random() * h,
            size: L.sizeMin + Math.random() * (L.sizeMax - L.sizeMin),
            twinkleSpeed: 0.4 + Math.random() * 1.6,
            twinklePhase: Math.random() * Math.PI * 2,
            color: r < 0.65 ? "#ffffff" : r < 0.8 ? "#4de8ff" : r < 0.92 ? "#ff6fb5" : "#ffd36b",
            speed: L.speed, baseAlpha: L.alpha,
          });
        }
      }
      // Three distant planet silhouettes (drifting slowly)
      planets = [
        { baseX: 0.18, baseY: 0.28, size: 60, colorA: "#ff6fb5", colorB: "#7a2d5a", name: "HARMONIA", driftX: 0, driftY: 0, driftSpd: 0.03 },
        { baseX: 0.82, baseY: 0.22, size: 90, colorA: "#ffd36b", colorB: "#7a5a20", name: "FINANCIA", driftX: 0, driftY: 0, driftSpd: 0.025 },
        { baseX: 0.5, baseY: 0.78, size: 120, colorA: "#4de8ff", colorB: "#1a5a7a", name: "CYBERIA", driftX: 0, driftY: 0, driftSpd: 0.02 },
      ];
    }
    resize();
    window.addEventListener("resize", resize);

    const startT = performance.now();
    function draw(now) {
      const t = (now - startT) / 1000;
      const dt = Math.min(0.05, (now - (draw.last || now)) / 1000);
      draw.last = now;
      const w = canvas.clientWidth, h = canvas.clientHeight;

      // Background gradient — deep cosmic
      const bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.7);
      bg.addColorStop(0, "#0c1a3a");
      bg.addColorStop(0.5, "#060a20");
      bg.addColorStop(1, "#030510");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      // Soft colored nebula wash
      ctx.globalCompositeOperation = "screen";
      const neb1 = ctx.createRadialGradient(w * 0.25, h * 0.35, 0, w * 0.25, h * 0.35, w * 0.4);
      neb1.addColorStop(0, "rgba(255,111,181,0.22)");
      neb1.addColorStop(1, "rgba(255,111,181,0)");
      ctx.fillStyle = neb1;
      ctx.fillRect(0, 0, w, h);
      const neb2 = ctx.createRadialGradient(w * 0.75, h * 0.65, 0, w * 0.75, h * 0.65, w * 0.45);
      neb2.addColorStop(0, "rgba(77,232,255,0.25)");
      neb2.addColorStop(1, "rgba(77,232,255,0)");
      ctx.fillStyle = neb2;
      ctx.fillRect(0, 0, w, h);
      const neb3 = ctx.createRadialGradient(w * 0.5, h * 0.2, 0, w * 0.5, h * 0.2, w * 0.35);
      neb3.addColorStop(0, "rgba(255,211,107,0.15)");
      neb3.addColorStop(1, "rgba(255,211,107,0)");
      ctx.fillStyle = neb3;
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "source-over";

      // Parallax drift on stars — subtle slow downward-right motion
      for (const s of stars) {
        s.x += s.speed * dt * 6;
        if (s.x > w + 5) s.x = -5;
        const alpha = s.baseAlpha * (0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase)));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        if (s.size > 1.6) {
          ctx.globalAlpha = alpha * 0.25;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      // Drifting planets
      for (const p of planets) {
        p.driftX = Math.sin(t * p.driftSpd) * 18;
        p.driftY = Math.cos(t * p.driftSpd * 0.8) * 12;
        const cx = p.baseX * w + p.driftX;
        const cy = p.baseY * h + p.driftY;
        const r = p.size;
        // soft atmosphere glow
        const glow = ctx.createRadialGradient(cx, cy, r * 0.7, cx, cy, r * 2.2);
        glow.addColorStop(0, p.colorA + "55");
        glow.addColorStop(1, p.colorA + "00");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2);
        ctx.fill();
        // planet body — radial gradient for fake 3D lighting
        const body = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
        body.addColorStop(0, p.colorA);
        body.addColorStop(0.65, p.colorB);
        body.addColorStop(1, "#0a1020");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        // rim light
        ctx.globalAlpha = 0.45;
        ctx.strokeStyle = p.colorA;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r + 1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        // tiny surface lights (only for Cyberia — it's "alive")
        if (p.name === "CYBERIA") {
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2 + t * 0.1;
            const sx = cx + Math.cos(a) * r * 0.7;
            const sy = cy + Math.sin(a) * r * 0.5;
            ctx.fillStyle = ["#ff6fb5", "#ffd36b", "#ffffff"][i % 3];
            ctx.globalAlpha = 0.3 + Math.sin(t * 2 + i) * 0.3;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.3, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      }

      raf = requestAnimationFrame(draw);
    }
    raf = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, []);

  const currentLine = CRAWL_LINES[lineIdx];
  // Calculate progress for bottom bar
  const totalDuration = CRAWL_LINES.reduce((a, l) => a + l.duration, 0);
  const elapsedDuration = CRAWL_LINES.slice(0, lineIdx + 1).reduce((a, l) => a + l.duration, 0);
  const progress = (elapsedDuration / totalDuration) * 100;

  return (
    <div style={styles.crawlRoot}>
      <canvas ref={canvasRef} style={styles.crawlCanvas} />

      {/* Subtle vignette */}
      <div style={styles.crawlVignette} />

      {/* The text line — centered, swaps as lineIdx changes */}
      <div style={styles.crawlTextLayer}>
        {currentLine && (
          <CrawlLine key={lineIdx} line={currentLine} playerName={playerName} />
        )}
      </div>

      {/* Progress bar at bottom */}
      <div style={styles.crawlProgressTrack}>
        <div style={{ ...styles.crawlProgressFill, width: `${progress}%` }} />
      </div>

      {/* Chapter indicator top-left */}
      <div style={styles.crawlChapter}>
        <div style={styles.crawlChapterLabel}>PROLOGUE</div>
        <div style={styles.crawlChapterTitle}>The LYF Universe</div>
      </div>

      {skippable && (
        <button style={styles.skipBtn} onClick={handleSkip}>SKIP INTRO ▸</button>
      )}
    </div>
  );
}

function CrawlLine({ line, playerName }) {
  // Pick styling per type
  if (line.style === "planet") {
    return (
      <div style={styles.crawlPlanetBlock}>
        <div style={{ ...styles.crawlPlanetName, color: line.color, textShadow: `0 0 40px ${line.color}aa, 0 0 80px ${line.color}55` }}>
          {line.text}
        </div>
        <div style={styles.crawlPlanetSubtitle}>{line.subtitle}</div>
      </div>
    );
  }
  if (line.style === "call") {
    return <div style={styles.crawlCall}>{line.text}</div>;
  }
  if (line.style === "final") {
    // Replace "YOU" with the player name for personalization
    const parts = line.text.split("YOU");
    return (
      <div style={styles.crawlFinal}>
        {parts[0]}<span style={styles.crawlYou}>{playerName.toUpperCase()}</span>{parts[1]}
      </div>
    );
  }
  if (line.style === "muted") {
    return <div style={styles.crawlMuted}>{line.text}</div>;
  }
  return <div style={styles.crawlBody}>{line.text}</div>;
}


function LandingCinematic({ avatarCfg, onComplete }) {
  const mountRef = useRef(null);
  const [skippable, setSkippable] = useState(false);
  const [subtitle, setSubtitle] = useState("");
  const [cockpitMode, setCockpitMode] = useState(true);
  const [landingMode, setLandingMode] = useState(false);
  const [hud, setHud] = useState({ altitude: 50000, velocity: 980, act: 1 });

  useEffect(() => {
    // Subtitle timing aligns with the 5 acts (total 26s)
    // Act 1: 0-5s  · Act 2: 5-9s  · Act 3: 9-13s  · Act 4: 13-20s  · Act 5: 20-26s
    // Visual text is short for readability; voice text is even tighter
    // so each line fits comfortably within its 3-5 second slot.
    const subs = [
      { t: 0.5,  text: "LYF-1 · APPROACHING CYBERIA",            voice: "Approaching Cyberia.",                    audioId: "cine-1" },
      { t: 5.5,  text: "FINAL APPROACH — ATMOSPHERIC INTERFACE", voice: "Final approach.",                          audioId: "cine-2" },
      { t: 9.5,  text: "ENTERING ATMOSPHERE — HOLD TIGHT",       voice: "Entering atmosphere. Hold tight.",         audioId: "cine-3" },
      { t: 13.5, text: "ENTERING CYBERIA AIRSPACE",              voice: "Entering Cyberia airspace.",               audioId: "cine-4" },
      { t: 17,   text: "DIGITAL GUARDIANS WELCOME YOU",          voice: "Digital guardians welcome you.",           audioId: "cine-5" },
      { t: 20.5, text: "BEGINNING LANDING SEQUENCE",             voice: "Beginning landing sequence.",              audioId: "cine-6" },
      { t: 24,   text: "TOUCHDOWN",                              voice: "Touchdown.",                               audioId: "cine-7" },
    ];
    const subTimers = subs.map((s) => setTimeout(() => {
      setSubtitle(s.text);
      const audioUrl = s.audioId ? `${AUDIO_BASE_URL}${s.audioId}.mp3` : null;
      // If previous voice is still playing, let it finish — don't cut it off.
      // The visual subtitle still updates so the cinematic stays in sync;
      // we just skip THIS voice to preserve the previous one.
      if (!VoiceEngine.isPlaying()) {
        VoiceEngine.speak(s.voice, "NARRATOR", null, audioUrl);
      }
    }, s.t * 1000));
    const skipT = setTimeout(() => setSkippable(true), 500);
    const doneT = setTimeout(() => onComplete(), 26000);
    // Switch from cockpit to chase cam at start of act 4 (city flyby)
    const chaseT = setTimeout(() => setCockpitMode(false), 13000);
    // Remove letterboxes at start of act 5 (landing) — clear view for touchdown
    const landingT = setTimeout(() => setLandingMode(true), 20000);
    return () => {
      clearTimeout(skipT); clearTimeout(doneT); clearTimeout(chaseT); clearTimeout(landingT);
      subTimers.forEach((t) => clearTimeout(t));
      VoiceEngine.cancel();
    };
  }, [onComplete]);

  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;
    const w = mount.clientWidth, h = mount.clientHeight;

    // ═══════════════════════════════════════════════════════════════════
    // SCENE SETUP — sRGB + tone-mapped output for cinematic realism
    // ═══════════════════════════════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, w / h, 0.1, 4000);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance",
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    // Cinematic color grading (r128-compatible: outputEncoding / sRGBEncoding)
    if (THREE.SRGBColorSpace !== undefined) {
      renderer.outputColorSpace = THREE.SRGBColorSpace;
    } else if (THREE.sRGBEncoding !== undefined) {
      renderer.outputEncoding = THREE.sRGBEncoding;
    }
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mount.appendChild(renderer.domElement);

    // ═══════════════════════════════════════════════════════════════════
    // LIGHTING — key sunlight + atmospheric rim
    // ═══════════════════════════════════════════════════════════════════
    const ambient = new THREE.AmbientLight(0x1a2844, 0.35);
    scene.add(ambient);

    // Cyberia's "sun" — warm directional light
    const sun = new THREE.DirectionalLight(0xfff0d8, 3.5);
    sun.position.set(80, 50, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 300;
    sun.shadow.bias = -0.0003;
    scene.add(sun);

    // Planetary rim light (blue atmospheric glow)
    const rim = new THREE.DirectionalLight(0x4de8ff, 1.2);
    rim.position.set(-60, 20, -40);
    scene.add(rim);

    // Subtle city-up fill, only contributes near the city. Dimmed heavily so it
    // doesn't color the planet or space during approach.
    const cityGlow = new THREE.HemisphereLight(0xff8fbb, 0x050810, 0.15);
    scene.add(cityGlow);

    // ═══════════════════════════════════════════════════════════════════
    // DEEP-SPACE STARFIELD (2 layers for parallax)
    // ═══════════════════════════════════════════════════════════════════
    function makeStarfield(count, minR, maxR, size, color) {
      const g = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = minR + Math.random() * (maxR - minR);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i * 3 + 2] = r * Math.cos(phi);
      }
      g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      return new THREE.Points(
        g,
        new THREE.PointsMaterial({
          color, size, transparent: true, opacity: 0.95,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
    }
    const starsFar = makeStarfield(3000, 1500, 2000, 1.5, 0xffffff);
    const starsNear = makeStarfield(800, 300, 800, 2.5, 0xcfe6ff);
    scene.add(starsFar, starsNear);

    // Space is pure black — no nebula color wash. Cyberia against the void.

    // ═══════════════════════════════════════════════════════════════════
    // CYBERIA PLANET — hi-detail sphere with continents + atmosphere shell
    // ═══════════════════════════════════════════════════════════════════
    const planetGroup = new THREE.Group();
    scene.add(planetGroup);

    // Core ocean sphere — Cyberia is THE dark blue planet of data
    const planetCore = new THREE.Mesh(
      new THREE.SphereGeometry(30, 96, 72),
      new THREE.MeshStandardMaterial({
        color: 0x0a1f46,      // richer deep blue
        emissive: 0x142a56,   // subtle self-illumination so it reads even unlit
        emissiveIntensity: 0.3,
        roughness: 0.45,
        metalness: 0.1,
      })
    );
    planetGroup.add(planetCore);

    // Continents — blue-themed surface detail (digital landscape, not green land)
    for (let i = 0; i < 22; i++) {
      const size = 3 + Math.random() * 5;
      const patch = new THREE.Mesh(
        new THREE.SphereGeometry(size, 16, 12),
        new THREE.MeshStandardMaterial({
          color: [0x2a4a7a, 0x1a3a68, 0x3a5a9a, 0x0f2a50][i % 4],
          emissive: [0x4de8ff, 0x8ac8ff, 0x4de8ff, 0xffd36b][i % 4],
          emissiveIntensity: 0.15,
          roughness: 0.7,
        })
      );
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 30;
      patch.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      patch.lookAt(0, 0, 0);
      patch.scale.set(1 + Math.random() * 0.5, 1 + Math.random() * 0.5, 0.15);
      planetGroup.add(patch);
    }

    // Cloud shell — volumetric-ish via many translucent wisps
    const cloudShell = new THREE.Group();
    for (let i = 0; i < 80; i++) {
      const cloud = new THREE.Mesh(
        new THREE.SphereGeometry(1.5 + Math.random() * 2.5, 10, 8),
        new THREE.MeshStandardMaterial({
          color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3,
          transparent: true, opacity: 0.35 + Math.random() * 0.3, roughness: 1,
          depthWrite: false,
        })
      );
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 31.5;
      cloud.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      cloud.scale.set(1 + Math.random(), 1 + Math.random(), 0.4);
      cloud.lookAt(0, 0, 0);
      cloudShell.add(cloud);
    }
    planetGroup.add(cloudShell);

    // Atmospheric halo — stronger cyan Fresnel-style rim for planet silhouette
    const atmoInner = new THREE.Mesh(
      new THREE.SphereGeometry(31, 64, 48),
      new THREE.MeshBasicMaterial({
        color: 0x4de8ff, transparent: true, opacity: 0.32, side: THREE.BackSide,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    planetGroup.add(atmoInner);
    const atmoOuter = new THREE.Mesh(
      new THREE.SphereGeometry(33.5, 64, 48),
      new THREE.MeshBasicMaterial({
        color: 0x4de8ff, transparent: true, opacity: 0.15, side: THREE.BackSide,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    planetGroup.add(atmoOuter);
    const atmoFar = new THREE.Mesh(
      new THREE.SphereGeometry(36, 64, 48),
      new THREE.MeshBasicMaterial({
        color: 0x4de8ff, transparent: true, opacity: 0.06, side: THREE.BackSide,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    planetGroup.add(atmoFar);

    // Night-side city lights (only visible on the dark hemisphere)
    const cityLightsGroup = new THREE.Group();
    for (let i = 0; i < 180; i++) {
      const light = new THREE.Mesh(
        new THREE.SphereGeometry(0.08 + Math.random() * 0.12, 6, 6),
        new THREE.MeshBasicMaterial({
          color: [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1, 0xffffff][i % 5],
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 30.2;
      light.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      light.userData.phase = Math.random() * Math.PI * 2;
      cityLightsGroup.add(light);
    }
    planetGroup.add(cityLightsGroup);

    planetGroup.position.set(0, 0, -200);
    planetGroup.rotation.z = 0.25;
    planetGroup.rotation.y = -0.4;

    // ═══════════════════════════════════════════════════════════════════
    // ATMOSPHERIC CLOUD LAYER — we fly THROUGH this in act 3
    // Stacked translucent billboards for volumetric feel
    // ═══════════════════════════════════════════════════════════════════
    const cloudField = new THREE.Group();
    // Deep-blue palette matching Cyberia's color identity
    // Occasional warm highlight where the sun catches the top of a cloud
    const cloudColors = [0x2a4070, 0x1a2c5a, 0x3a5a8a, 0x4a7ab8, 0x8aa8d8, 0xffbb8a];
    for (let i = 0; i < 60; i++) {
      const sz = 4 + Math.random() * 7;  // smaller clouds (was 8-20)
      const cloud = new THREE.Mesh(
        new THREE.PlaneGeometry(sz, sz * 0.55),  // flatter - wispier look
        new THREE.MeshBasicMaterial({
          color: cloudColors[i % cloudColors.length],
          transparent: true,
          opacity: 0.15 + Math.random() * 0.2, // max 0.35 (was 0.70)
          depthWrite: false, side: THREE.DoubleSide,
          blending: THREE.NormalBlending,
        })
      );
      cloud.position.set(
        (Math.random() - 0.5) * 180,
        (Math.random() - 0.5) * 40 - 15,  // skew clouds BELOW camera line
        -60 - Math.random() * 400         // spawn further away (min -60, was -20)
      );
      cloud.userData.baseZ = cloud.position.z;
      cloud.userData.rotSpeed = (Math.random() - 0.5) * 0.15;
      cloudField.add(cloud);
    }
    scene.add(cloudField);

    // Dust / speed particles (visible during entry)
    const dustGeo = new THREE.BufferGeometry();
    const dustCount = 400;
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i * 3] = (Math.random() - 0.5) * 80;
      dustPos[i * 3 + 1] = (Math.random() - 0.5) * 40;
      dustPos[i * 3 + 2] = -Math.random() * 200;
    }
    dustGeo.setAttribute("position", new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.15, transparent: true, opacity: 0.7,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    dust.visible = false;
    scene.add(dust);

    // Heat shock ring (compression wave at mach transition)
    const shockRing = new THREE.Mesh(
      new THREE.RingGeometry(2, 2.4, 48),
      new THREE.MeshBasicMaterial({
        color: 0xffaa66, transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
      })
    );
    shockRing.visible = false;
    scene.add(shockRing);

    // ═══════════════════════════════════════════════════════════════════
    // THE CITY — denser, more alive metropolis
    // ═══════════════════════════════════════════════════════════════════
    const city = new THREE.Group();

    // Ground plane — "infinite black ocean of data" (deep, glossy, reflective)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.MeshStandardMaterial({
        color: 0x010208, emissive: 0x050a1c, emissiveIntensity: 0.15,
        roughness: 0.1, metalness: 0.9,
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.6;
    ground.receiveShadow = true;
    city.add(ground);

    // Grid pattern (faint cyberpunk street grid)
    const grid = new THREE.GridHelper(800, 160, 0x4de8ff, 0x0a1530);
    grid.position.y = -0.55;
    grid.material.opacity = 0.22;
    grid.material.transparent = true;
    city.add(grid);

    // Data rivers — long glowing strips flowing across the ocean floor
    const dataRivers = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const river = new THREE.Mesh(
        new THREE.PlaneGeometry(0.35, 40 + Math.random() * 30),
        new THREE.MeshBasicMaterial({
          color: [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1][i % 4],
          transparent: true, opacity: 0.7,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      river.rotation.x = -Math.PI / 2;
      river.rotation.z = (i / 8) * Math.PI * 2;
      const angle = (i / 8) * Math.PI * 2;
      const dist = 10 + Math.random() * 60;
      river.position.set(Math.cos(angle) * dist, -0.5, Math.sin(angle) * dist);
      river.userData.flowPhase = Math.random() * Math.PI * 2;
      dataRivers.add(river);
    }
    city.add(dataRivers);

    // Distant horizon gradient plane (fake atmospheric scattering at horizon)
    function makeHorizonLayer(color, y, opacity, scale, distance) {
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(scale, scale * 0.3),
        new THREE.MeshBasicMaterial({
          color, transparent: true, opacity,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      m.position.set(0, y, -distance);
      return m;
    }
    city.add(
      makeHorizonLayer(0xff6fb5, 8, 0.55, 1400, 400),
      makeHorizonLayer(0xffd36b, 14, 0.35, 1400, 420),
      makeHorizonLayer(0x4de8ff, 22, 0.2, 1400, 440),
    );

    // Landing platform — central, glowing, well-detailed
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(8, 7.5, 0.8, 24),
      new THREE.MeshStandardMaterial({
        color: 0x0a1230, emissive: 0x4de8ff, emissiveIntensity: 0.35,
        roughness: 0.3, metalness: 0.5,
      })
    );
    platform.position.y = 0;
    platform.castShadow = true;
    platform.receiveShadow = true;
    city.add(platform);

    // Outer landing ring (gold H-pad markings)
    const padRing = new THREE.Mesh(
      new THREE.RingGeometry(6.5, 7.5, 64),
      new THREE.MeshBasicMaterial({ color: 0xffd36b, side: THREE.DoubleSide, transparent: true, opacity: 0.95 })
    );
    padRing.rotation.x = -Math.PI / 2;
    padRing.position.y = 0.42;
    city.add(padRing);

    // Landing crosshair / H
    for (let rot = 0; rot < 2; rot++) {
      const bar = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 0.6),
        new THREE.MeshBasicMaterial({ color: 0xffd36b, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
      );
      bar.rotation.x = -Math.PI / 2;
      bar.rotation.z = rot * Math.PI / 2;
      bar.position.y = 0.43;
      city.add(bar);
    }
    // Inner pulsing ring
    const innerPulse = new THREE.Mesh(
      new THREE.RingGeometry(2.5, 3.5, 48),
      new THREE.MeshBasicMaterial({ color: 0xff6fb5, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
    );
    innerPulse.rotation.x = -Math.PI / 2;
    innerPulse.position.y = 0.44;
    city.add(innerPulse);

    // Skyscraper towers — dense, continuous city with no horizon gaps
    const towers = new THREE.Group();
    const towerColors = [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1, 0xb58cff, 0x8ac8ff];
    // Inner spires (tall, dramatic)
    for (let i = 0; i < 14; i++) {
      const angle = (i / 14) * Math.PI * 2 + 0.2;
      const dist = 16 + Math.random() * 4;
      const hh = 35 + Math.random() * 25;
      const tower = buildTower(hh, towerColors[i % towerColors.length], 1.8);
