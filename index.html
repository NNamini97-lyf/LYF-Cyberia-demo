    new THREE.MeshStandardMaterial({
      color: 0x06091a,
      emissive: 0x4de8ff,
      emissiveIntensity: 0.6,
      roughness: 0.45,
      metalness: 0.7,
    })
  );
  frame.position.y = 1.75;
  frame.castShadow = true;
  g.add(frame);
  // Inner energy field — high emissive for blooming halo
  const inner = new THREE.Mesh(
    new THREE.PlaneGeometry(3, 3),
    new THREE.MeshStandardMaterial({
      color: 0x4de8ff,
      emissive: 0x4de8ff,
      emissiveIntensity: 2.4,
      transparent: true,
      opacity: 0.75,
      side: THREE.DoubleSide,
    })
  );
  inner.position.set(0, 1.75, 0.16);
  g.add(inner);
  // Trim accent — bright vertical edges that bloom into rays
  for (const x of [-1.7, 1.7]) {
    const edge = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 3.5, 0.4),
      new THREE.MeshBasicMaterial({ color: 0x9eedff })
    );
    edge.position.set(x, 1.75, 0);
    g.add(edge);
  }
  return g;
}

function makeTower() {
  const g = new THREE.Group();
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 1, 0.5, 8),
    new THREE.MeshStandardMaterial({ color: 0x0a1430, emissive: 0x5bffa1, emissiveIntensity: 0.5, roughness: 0.5, metalness: 0.6 })
  );
  base.position.y = 0.25;
  base.castShadow = true;
  g.add(base);
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.2, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0x1a2540, emissive: 0x5bffa1, emissiveIntensity: 0.9, roughness: 0.5, metalness: 0.6 })
  );
  pole.position.y = 2.5;
  pole.castShadow = true;
  g.add(pole);
  const dishGeo = new THREE.TorusGeometry(0.5, 0.08, 8, 24);
  for (let i = 0; i < 3; i++) {
    // Higher emissive — the rings should glow brightly and bloom
    const dish = new THREE.Mesh(dishGeo, new THREE.MeshStandardMaterial({
      color: 0x5bffa1, emissive: 0x5bffa1, emissiveIntensity: 1.8,
      roughness: 0.3, metalness: 0.4,
    }));
    dish.position.y = 1 + i * 1.2;
    dish.rotation.x = Math.PI / 2;
    g.add(dish);
  }
  // Antenna tip — pure bright point that becomes a bloomed star
  const tip = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xb8ffd9 })
  );
  tip.position.y = 4.6;
  g.add(tip);
  return g;
}

function makeVault() {
  const g = new THREE.Group();
  // Crystal body with strong emissive for centerpiece glow
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.4, 0),
    new THREE.MeshStandardMaterial({
      color: 0x2a154a,
      emissive: 0xb58cff,
      emissiveIntensity: 1.2,
      roughness: 0.2,
      metalness: 0.6,
    })
  );
  body.position.y = 1.8;
  body.castShadow = true;
  g.add(body);
  // Inner glow core — pure emission, fully blooms
  const core = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.7, 0),
    new THREE.MeshBasicMaterial({ color: 0xe8d4ff, transparent: true, opacity: 0.85 })
  );
  core.position.y = 1.8;
  g.add(core);
  // Floating golden motes
  const motes = new THREE.Group();
  for (let i = 0; i < 14; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8, 8),
      new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xffd36b : 0xffffff })
    );
    m.userData.angle = (i / 14) * Math.PI * 2;
    m.userData.radius = 1.8 + Math.random() * 0.4;
    m.userData.ySpeed = 0.5 + Math.random() * 0.5;
    motes.add(m);
  }
  g.add(motes);
  g.userData.motes = motes;
  return g;
}

// ═══════════════════════════════════════════════════════════════════════════
// MISSION 1 — TAP-TO-AIM SHOOTER (Password Fortress)
// ═══════════════════════════════════════════════════════════════════════════
function Mission1Shooter({ avatarCfg, actionRef, onComplete }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({
    bots: [],
    shots: [],
    particles: [],
    wave: 1,
    botsDefeated: 0,
    botsSpawned: 0,
    gateHP: 100,
    pwLength: 0,
    pwKinds: { number: false, capital: false, symbol: false },
    lastSpawn: 0,
    missCount: 0,
    showHint: false,
    started: performance.now(),
    running: true,
    feedback: null,
    aimAngle: 0,       // current aim direction (0 = straight up)
    aimTarget: 0,      // target aim angle (smoothly lerped)
    lastShotTime: 0,   // for recoil animation
  });
  const [tick, forceTick] = useState(0);

  const BOT_KINDS = ["number", "capital", "symbol", "lower"];
  const KIND_LABELS = { number: "7", capital: "K", symbol: "★", lower: "m" };
  const KIND_COLORS = { number: "#4de8ff", capital: "#ff6fb5", symbol: "#ffd36b", lower: "#5bffa1" };

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const s = stateRef.current;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    function spawnBot() {
      const w = canvas.clientWidth;
      // Force-spawn missing required kinds so the kid always has a path to completion
      const missing = [];
      if (!s.pwKinds.number) missing.push("number");
      if (!s.pwKinds.capital) missing.push("capital");
      if (!s.pwKinds.symbol) missing.push("symbol");
      let kind;
      // 70% chance to spawn something we still need (if anything missing)
      if (missing.length > 0 && Math.random() < 0.7) {
        kind = missing[Math.floor(Math.random() * missing.length)];
      } else {
        kind = BOT_KINDS[Math.floor(Math.random() * BOT_KINDS.length)];
      }
      const x = 40 + Math.random() * (w - 80);
      s.bots.push({
        x, y: -40,
        vy: 30 + s.wave * 8 + Math.random() * 15,
        kind,
        r: 34,
        wobble: Math.random() * Math.PI * 2,
        id: Math.random(),
        hp: 1,
      });
      s.botsSpawned++;
    }

    function handleTap(e) {
      if (!s.running) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX ?? e.touches?.[0]?.clientX;
      const clientY = e.clientY ?? e.touches?.[0]?.clientY;
      const x = clientX - rect.left;
      const y = clientY - rect.top;

      // Find closest bot (kid-forgiving hitbox: up to r + 18)
      let closest = null;
      let closestDist = Infinity;
      for (const bot of s.bots) {
        const d = Math.hypot(bot.x - x, bot.y - y);
        if (d < bot.r + 18 && d < closestDist) {
          closest = bot;
          closestDist = d;
        }
      }

      // Fire a shot from avatar position
      const avatarX = canvas.clientWidth / 2;
      const avatarY = canvas.clientHeight - 110;
      // Update aim direction toward the tap
      const dx = x - avatarX;
      const dy = y - avatarY;
      const aimAng = Math.atan2(dx, -dy); // angle from straight up, + = right
      s.aimTarget = aimAng;
      s.lastShotTime = performance.now();
      // Signal 3D avatar to perform fire action
      if (actionRef && actionRef.current) {
        actionRef.current.action = "fire";
        actionRef.current.aimAngle = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, aimAng));
        actionRef.current.triggeredAt = performance.now();
      }
      if (closest) {
        s.shots.push({
          x: avatarX, y: avatarY,
          tx: closest.x, ty: closest.y,
          target: closest,
          kind: closest.kind,
          t: 0,
        });
      } else {
        // Miss — gentle feedback, no penalty
        s.shots.push({
          x: avatarX, y: avatarY,
          tx: x, ty: y,
          target: null,
          kind: "miss",
          t: 0,
        });
        s.missCount++;
        if (s.missCount >= 2) s.showHint = true;
      }
    }
    canvas.addEventListener("pointerdown", handleTap);

    const startT = performance.now();
    function loop(now) {
      const dt = Math.min(0.05, (now - (loop.last || now)) / 1000);
      loop.last = now;
      if (!s.running) {
        raf = requestAnimationFrame(loop);
        return;
      }

      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      // ── BACKGROUND: gate overlay ──
      // Draw gate as glowing vertical band at top
      const gateHP = s.gateHP;
      const gateAlpha = Math.max(0.3, gateHP / 100);
      const cracks = 1 - gateHP / 100;
      // Gate glow
      const grad = ctx.createLinearGradient(0, 0, 0, 140);
      grad.addColorStop(0, `rgba(77,232,255,${0.45 * gateAlpha})`);
      grad.addColorStop(1, "rgba(77,232,255,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, 140);

      // ── SPAWNING ──
      const spawnInterval = Math.max(700, 1600 - s.wave * 150);
      if (now - s.lastSpawn > spawnInterval && s.botsSpawned < 20) {
        spawnBot();
        s.lastSpawn = now;
      }

      // ── UPDATE BOTS ──
      for (let i = s.bots.length - 1; i >= 0; i--) {
        const b = s.bots[i];
        b.y += b.vy * dt;
        b.wobble += dt * 3;
        b.x += Math.sin(b.wobble) * 0.4;

        // Bot reached near bottom (near avatar) — bounces off, small gate dmg
        if (b.y > h - 120) {
          s.bots.splice(i, 1);
          s.gateHP = Math.max(20, s.gateHP - 5); // floor at 20 — can't lose
          // spawn red particles
          for (let k = 0; k < 8; k++) {
            s.particles.push({
              x: b.x, y: b.y, vx: (Math.random() - 0.5) * 200, vy: -Math.random() * 150,
              life: 0.6, maxLife: 0.6, color: "#ff6688", size: 3,
            });
          }
        }
      }

      // ── UPDATE SHOTS ──
      for (let i = s.shots.length - 1; i >= 0; i--) {
        const sh = s.shots[i];
        sh.t += dt * 4;
        if (sh.t >= 1) {
          // hit
          if (sh.target && s.bots.includes(sh.target)) {
            const idx = s.bots.indexOf(sh.target);
            s.bots.splice(idx, 1);
            s.botsDefeated++;
            // Update password state
            if (sh.kind !== "lower" && !s.pwKinds[sh.kind]) {
              s.pwKinds[sh.kind] = true;
              // Educational feedback on first of each kind
              const kindMsg = {
                number: "✓ Numbers added! Strong passwords mix letters & numbers.",
                capital: "✓ Capital letter! BIG and small letters confuse Glitch Bots.",
                symbol: "✓ Symbol captured! Symbols like ★ # @ make passwords HARD to crack.",
              }[sh.kind];
              if (kindMsg) {
                s.feedback = {
                  text: kindMsg,
                  color: KIND_COLORS[sh.kind],
                  until: performance.now() + 2800,
                };
              }
            }
            s.pwLength++;
            // Restore gate
            s.gateHP = Math.min(100, s.gateHP + 4);
            // Burst particles in kind's color
            const color = KIND_COLORS[sh.kind] || "#ffffff";
            for (let k = 0; k < 14; k++) {
              const ang = Math.random() * Math.PI * 2;
              const speed = 80 + Math.random() * 120;
              s.particles.push({
                x: sh.tx, y: sh.ty,
                vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
                life: 0.8, maxLife: 0.8, color, size: 4,
              });
            }
          }
          s.shots.splice(i, 1);
        }
      }

      // ── UPDATE PARTICLES ──
      for (let i = s.particles.length - 1; i >= 0; i--) {
        const p = s.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 180 * dt;
        p.life -= dt;
        if (p.life <= 0) s.particles.splice(i, 1);
      }

      // ── DRAW: avatar glow + aim line preview (in 3D elsewhere, here just effects) ──

      // Draw bots
      for (const b of s.bots) {
        const color = KIND_COLORS[b.kind];
        // glow halo
        const gr = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.2);
        gr.addColorStop(0, color + "aa");
        gr.addColorStop(1, color + "00");
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 2.2, 0, Math.PI * 2);
        ctx.fill();
        // body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        // face
        ctx.fillStyle = "#0a1230";
        ctx.beginPath();
        ctx.arc(b.x - 10, b.y - 5, 5, 0, Math.PI * 2);
        ctx.arc(b.x + 10, b.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        // label (kind letter big and obvious)
        ctx.fillStyle = "#0a1230";
        ctx.font = "bold 28px Orbitron, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(KIND_LABELS[b.kind], b.x, b.y + 12);
      }

      // Draw shots (bezier-ish arc from avatar to target)
      const avX = w / 2, avY = h - 110;
      for (const sh of s.shots) {
        const tt = sh.t;
        // quadratic bezier with midpoint lifted
        const midY = Math.min(avY, sh.ty) - 80;
        const bx = avX * (1 - tt) * (1 - tt) + 2 * (avX) * (1 - tt) * tt + sh.tx * tt * tt;
        const by = avY * (1 - tt) * (1 - tt) + 2 * midY * (1 - tt) * tt + sh.ty * tt * tt;
        const color = sh.kind === "miss" ? "#ffffff88" : KIND_COLORS[sh.kind];
        // trail
        ctx.strokeStyle = color + "aa";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(avX, avY);
        ctx.quadraticCurveTo(avX, midY, bx, by);
        ctx.stroke();
        // head
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(bx, by, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw particles
      for (const p of s.particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Note: the player avatar is rendered by GameScene (3D) behind this canvas.
      // We only need to compute aim and signal actions via actionRef.
      const aimLerp = 0.22;
      const d = s.aimTarget - s.aimAngle;
      let dw = d;
      if (dw > Math.PI) dw -= Math.PI * 2;
      if (dw < -Math.PI) dw += Math.PI * 2;
      s.aimAngle += dw * aimLerp;

      // Educational feedback tooltip
      if (s.feedback && performance.now() < s.feedback.until) {
        const timeLeft = s.feedback.until - performance.now();
        const alpha = Math.min(1, timeLeft / 400);
        ctx.globalAlpha = alpha;
        ctx.font = "bold 13px system-ui, sans-serif";
        const metrics = ctx.measureText(s.feedback.text);
        const padX = 14, padY = 10;
        const boxW = Math.min(w - 40, metrics.width + padX * 2);
        const boxH = 30;
        const boxX = (w - boxW) / 2;
        const boxY = 180;
        ctx.fillStyle = "rgba(10, 18, 48, 0.94)";
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 8);
        ctx.fill();
        ctx.strokeStyle = s.feedback.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = s.feedback.color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(s.feedback.text, w / 2, boxY + boxH / 2);
        ctx.globalAlpha = 1;
      }

      forceTick((n) => (n + 1) % 1000000);

      // ── WIN CHECK ──
      const hasAllKinds = s.pwKinds.number && s.pwKinds.capital && s.pwKinds.symbol;
      if (hasAllKinds && s.pwLength >= 5 && s.running) {
        s.running = false;
        setTimeout(() => onComplete(), 900);
      }

      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      canvas.removeEventListener("pointerdown", handleTap);
      window.removeEventListener("resize", resize);
    };
  }, [onComplete]);

  const s = stateRef.current;
  const hasAll = s.pwKinds.number && s.pwKinds.capital && s.pwKinds.symbol;

  return (
    <div style={styles.missionOverlay}>
      <canvas ref={canvasRef} style={styles.missionCanvas} />
      {/* HUD: gate HP + password progress */}
      <div style={styles.m1HudTop}>
        <div style={styles.hpLabel}>GATE</div>
        <div style={styles.hpBar}>
          <div
            style={{
              ...styles.hpFill,
              width: `${s.gateHP}%`,
              background: s.gateHP > 60
                ? "linear-gradient(to right, #4de8ff, #5bffa1)"
                : s.gateHP > 35
                ? "linear-gradient(to right, #ffd36b, #ff8a5a)"
                : "linear-gradient(to right, #ff6688, #ff6fb5)",
            }}
          />
        </div>
      </div>
      <div style={styles.m1Objective}>
        TAP the Glitch Bots! Need: {!s.pwKinds.number && <span style={{ color: KIND_COLORS.number }}>7</span>} {!s.pwKinds.capital && <span style={{ color: KIND_COLORS.capital }}>K</span>} {!s.pwKinds.symbol && <span style={{ color: KIND_COLORS.symbol }}>★</span>}
        {hasAll && <span style={{ color: "#5bffa1" }}>{"  ✦ ALMOST!"}</span>}
      </div>
      {s.showHint && !hasAll && (
        <div style={styles.hintPill}>💡 Tap the matching colored bots!</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MISSION 2 — LASER SWORD (Signal Tower / Message Flood)
// Avatar stands at bottom holding a laser sword. Messages fall from top
// toward the tower. Player TAPS a message → avatar slashes it.
//   - TRAP message slashed = DESTROYED (good!)
//   - SAFE message slashed = you destroyed a real message (gentle correction)
//   - SAFE message reaches tower = TOWER RECEIVES IT (good!)
//   - TRAP message reaches tower = TOWER TAKES A HIT (small, kids can't fail)
// ═══════════════════════════════════════════════════════════════════════════
function Mission2Rhythm({ avatarCfg, actionRef, onComplete }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({
    messages: [], // { lane, safe, y, id, slashed, received, text, icon, why }
    particles: [],
    slashes: [], // { x1, y1, x2, y2, life }
    towerHealth: 100,
    received: 0,         // safe messages that reached tower
    destroyed: 0,        // traps that were slashed
    mistaken: 0,         // safe messages slashed by mistake
    missedTraps: 0,      // traps that reached tower
    totalMessages: 14,
    spawned: 0,
    nextSpawn: 500,
    startT: performance.now(),
    running: true,
    feedback: null,
    // Avatar pose state
    slashAngle: 0,         // current angle
    slashTargetAngle: 0,   // angle pointing at slashed message
    slashPhase: 0,         // 0 = idle, 0..1 = in slash animation
    lastSlashTime: 0,
  });
  const [, forceTick] = useState(0);
  const LANES = 3;

  const SAFE_MESSAGES = [
    { text: "Hi! Hope you're having a great day.", icon: "👋" },
    { text: "Mom: don't forget dinner at 6.", icon: "🍝" },
    { text: "Library book due Friday.", icon: "📚" },
    { text: "Your team won!", icon: "🏆" },
    { text: "Field trip slip.", icon: "📋" },
    { text: "Practice at 4pm today.", icon: "⚽" },
    { text: "Grandma says hi.", icon: "💌" },
  ];
  const TRAP_MESSAGES = [
    { text: "YOU WON $1000! CLICK NOW!", icon: "💰", why: "Free prizes = fake" },
    { text: "Account DELETED in 1 hour!", icon: "⚠️", why: "Urgency is a red flag" },
    { text: "Stranger: what's your address?", icon: "👤", why: "Never share with strangers" },
    { text: "Free V-Bucks — click link!", icon: "🎮", why: "Free stuff online is a trap" },
    { text: "Enter your password here:", icon: "🔑", why: "Real sites never ask like this" },
    { text: "Send me your photo.", icon: "📷", why: "Ask a parent if it's really them" },
    { text: "Download to win!", icon: "⬇️", why: "Weird downloads install bots" },
  ];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const s = stateRef.current;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    function laneX(lane) {
      const w = canvas.clientWidth;
      const laneW = w / LANES;
      return lane * laneW + laneW / 2;
    }
    // Avatar position: bottom-center, a bit above the tower
    function avatarPos() {
      return { x: canvas.clientWidth / 2, y: canvas.clientHeight - 120 };
    }

    function handleTap(e) {
      if (!s.running) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX ?? e.touches?.[0]?.clientX;
      const clientY = e.clientY ?? e.touches?.[0]?.clientY;
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const av = avatarPos();

      // Find the message closest to the tap (generous hitbox)
      let best = null;
      let bestDist = 999;
      for (const m of s.messages) {
        if (m.slashed || m.received) continue;
        const mx = laneX(m.lane);
        const d = Math.hypot(mx - x, m.y - y);
        if (d < 60 && d < bestDist) {
          best = m;
          bestDist = d;
        }
      }
      if (!best) return;

      // Slash it — mark as slashed + trigger animation
      best.slashed = true;
      const mx = laneX(best.lane);
      const my = best.y;
      // Set avatar slash angle to point at message
      const dx = mx - av.x;
      const dy = my - av.y;
      const slashAng = Math.atan2(dx, -dy); // 0 = up, + = right
      s.slashTargetAngle = slashAng;
      s.slashPhase = 1.0; // trigger slash animation
      s.lastSlashTime = performance.now();
      // Signal 3D avatar to perform slash action
      if (actionRef && actionRef.current) {
        actionRef.current.action = "slash";
        actionRef.current.aimAngle = slashAng;
        actionRef.current.triggeredAt = performance.now();
      }

      // Draw a sword-trail line from avatar to message
      s.slashes.push({
        x1: av.x, y1: av.y - 30, x2: mx, y2: my,
        color: best.safe ? "#ffd36b" : "#4de8ff",
        life: 0.5, maxLife: 0.5,
      });

      if (!best.safe) {
        // Correctly slashed a trap!
        s.destroyed++;
        // explosion particles (red)
        for (let k = 0; k < 22; k++) {
          const ang = Math.random() * Math.PI * 2;
          const sp = 120 + Math.random() * 140;
          s.particles.push({
            x: mx, y: my,
            vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40,
            life: 0.7, maxLife: 0.7,
            color: "#ff6688", size: 5,
          });
        }
      } else {
        // Mistakenly slashed a safe message
        s.mistaken++;
        s.feedback = {
          text: `Oops! That was a real message — let safe ones through.`,
          color: "#ffd36b",
          until: performance.now() + 2500,
        };
        for (let k = 0; k < 10; k++) {
          const ang = Math.random() * Math.PI * 2;
          const sp = 70;
          s.particles.push({
            x: mx, y: my,
            vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 30,
            life: 0.5, maxLife: 0.5,
            color: "#ffd36b", size: 3,
          });
        }
      }
    }
    canvas.addEventListener("pointerdown", handleTap);

    function loop(now) {
      const dt = Math.min(0.05, (now - (loop.last || now)) / 1000);
      loop.last = now;
      if (!s.running) {
        raf = requestAnimationFrame(loop);
        return;
      }

      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      const av = avatarPos();

      // Spawn messages (staggered, ~800ms apart — kid-friendly pacing)
      if (s.spawned < s.totalMessages && now - s.startT > s.nextSpawn) {
        const lane = Math.floor(Math.random() * LANES);
        const safe = Math.random() > 0.45; // ~55% safe, 45% traps (more action)
        const pool = safe ? SAFE_MESSAGES : TRAP_MESSAGES;
        const data = pool[Math.floor(Math.random() * pool.length)];
        s.messages.push({
          lane, safe, y: -60, id: Math.random(),
          slashed: false, received: false,
          text: data.text, icon: data.icon, why: data.why || null,
        });
        s.spawned++;
        s.nextSpawn = (now - s.startT) + 700 + Math.random() * 200;
      }

      // Draw lanes (subtle guides)
      for (let i = 0; i < LANES; i++) {
        const x = i * (w / LANES);
        ctx.fillStyle = "rgba(77,232,255,0.03)";
        ctx.fillRect(x, 0, w / LANES, h);
        ctx.strokeStyle = "rgba(77,232,255,0.12)";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        ctx.beginPath();
        ctx.moveTo(x, 0); ctx.lineTo(x, h);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Draw Signal Tower at very bottom
      const towerY = h - 40;
      const towerW = w * 0.7;
      const towerX = (w - towerW) / 2;
      // Tower base
      const tGrad = ctx.createLinearGradient(0, towerY - 30, 0, h);
      tGrad.addColorStop(0, `rgba(77,232,255,${0.35 + s.towerHealth / 300})`);
      tGrad.addColorStop(1, "rgba(77,232,255,0.08)");
      ctx.fillStyle = tGrad;
      ctx.fillRect(towerX, towerY - 25, towerW, h - towerY + 25);
      // Tower top line
      ctx.strokeStyle = "#4de8ff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(towerX, towerY - 25);
      ctx.lineTo(towerX + towerW, towerY - 25);
      ctx.stroke();
      // Signal icon (antenna)
      ctx.fillStyle = "#4de8ff";
      ctx.beginPath();
      ctx.arc(w / 2, towerY - 35, 5, 0, Math.PI * 2);
      ctx.fill();

      // ─── UPDATE + DRAW MESSAGES ───
      for (let i = s.messages.length - 1; i >= 0; i--) {
        const m = s.messages[i];

        // Slashed messages disappear immediately (splash effect already spawned)
        if (m.slashed) {
          s.messages.splice(i, 1);
          continue;
        }

        // Move message down
        m.y += 130 * dt; // slightly slower than before so kids have time to decide

        // Check if reached tower
        if (m.y > towerY - 25) {
          if (m.safe) {
            // Safe message received
            m.received = true;
            s.received++;
            // Green ripple at tower
            for (let k = 0; k < 16; k++) {
              const ang = Math.random() * Math.PI * 2;
              const sp = 80 + Math.random() * 80;
              s.particles.push({
                x: laneX(m.lane), y: towerY - 25,
                vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 30,
                life: 0.6, maxLife: 0.6,
                color: "#5bffa1", size: 4,
              });
            }
          } else {
            // Trap reached tower — gentle damage, encouragement to slash next time
            s.missedTraps++;
            s.towerHealth = Math.max(60, s.towerHealth - 5);
            s.feedback = {
              text: `⚠ Trap got through! ${m.why || "Slash the red ones next time."}`,
              color: "#ff6688",
              until: performance.now() + 2200,
            };
            // Red burst
            for (let k = 0; k < 14; k++) {
              const ang = Math.random() * Math.PI * 2;
              const sp = 70;
              s.particles.push({
                x: laneX(m.lane), y: towerY - 25,
                vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 30,
                life: 0.6, maxLife: 0.6,
                color: "#ff6688", size: 3,
              });
            }
          }
          s.messages.splice(i, 1);
          continue;
        }

        // Draw the message box
        const mx = laneX(m.lane);
        const r = 50;
        const color = m.safe ? "#5bffa1" : "#ff6688";
        // Halo
        const gr = ctx.createRadialGradient(mx, m.y, 0, mx, m.y, r * 2);
        gr.addColorStop(0, color + "99");
        gr.addColorStop(1, color + "00");
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(mx, m.y, r * 2, 0, Math.PI * 2);
        ctx.fill();
        // Body — rounded rect
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(mx - r, m.y - r * 0.75, r * 2, r * 1.5, 14);
        ctx.fill();
        // Border
        ctx.strokeStyle = m.safe ? "#a0ffc9" : "#ffb0bb";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Icon
        ctx.font = "30px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(m.icon || "", mx, m.y - 16);
        // Text label (bigger so kids can read)
        ctx.fillStyle = "#0a1230";
        ctx.font = "bold 12px system-ui, sans-serif";
        const words = m.text.split(" ");
        let line = "";
        let yOff = 12;
        for (const wd of words) {
          const test = line + (line ? " " : "") + wd;
          if (ctx.measureText(test).width > r * 1.9 && line) {
            ctx.fillText(line, mx, m.y + yOff);
            line = wd;
            yOff += 13;
            if (yOff > 30) break;
          } else {
            line = test;
          }
        }
        if (line && yOff <= 30) {
          ctx.fillText(line, mx, m.y + yOff);
        }
      }

      // ─── PARTICLES ───
      for (let i = s.particles.length - 1; i >= 0; i--) {
        const p = s.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 150 * dt;
        p.life -= dt;
        if (p.life <= 0) { s.particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // ─── SLASH TRAIL EFFECTS ───
      for (let i = s.slashes.length - 1; i >= 0; i--) {
        const sl = s.slashes[i];
        sl.life -= dt;
        if (sl.life <= 0) { s.slashes.splice(i, 1); continue; }
        const alpha = sl.life / sl.maxLife;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = sl.color;
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.shadowColor = sl.color;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(sl.x1, sl.y1);
        ctx.lineTo(sl.x2, sl.y2);
        ctx.stroke();
        // Core white line
        ctx.shadowBlur = 8;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sl.x1, sl.y1);
        ctx.lineTo(sl.x2, sl.y2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;

      // Note: player avatar + laser sword are rendered by GameScene (3D).
      // 2D canvas only handles game elements (messages, particles, slash trails).
      // Ease slash angle back to center when not slashing (for signal tracking)
      const slashDur = 0.6;
      const sinceSlash = (performance.now() - s.lastSlashTime) / 1000;
      const inSlash = sinceSlash < slashDur && s.lastSlashTime > 0;
      if (inSlash) {
        s.slashAngle = s.slashTargetAngle;
      } else {
        s.slashAngle *= 0.92;
      }

      // Educational feedback tooltip
      if (s.feedback && now < s.feedback.until) {
        const timeLeft = s.feedback.until - now;
        const alpha = Math.min(1, timeLeft / 400);
        ctx.globalAlpha = alpha;
        ctx.font = "bold 14px system-ui, sans-serif";
        const metrics = ctx.measureText(s.feedback.text);
        const padX = 16;
        const boxW = Math.min(w - 40, metrics.width + padX * 2);
        const boxH = 36;
        const boxX = (w - boxW) / 2;
        const boxY = 80;
        ctx.fillStyle = "rgba(10, 18, 48, 0.94)";
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 8);
        ctx.fill();
        ctx.strokeStyle = s.feedback.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = s.feedback.color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(s.feedback.text, w / 2, boxY + boxH / 2);
        ctx.globalAlpha = 1;
      }

      forceTick((n) => (n + 1) % 1000000);

      // Win when all messages have been handled
      const totalHandled = s.received + s.destroyed + s.mistaken + s.missedTraps;
      if (s.spawned >= s.totalMessages && totalHandled >= s.totalMessages && s.running) {
        s.running = false;
        setTimeout(() => onComplete(), 900);
      }

      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      canvas.removeEventListener("pointerdown", handleTap);
      window.removeEventListener("resize", resize);
    };
  }, [onComplete, avatarCfg]);

  const s = stateRef.current;
  const totalHandled = s.received + s.destroyed + s.mistaken + s.missedTraps;

  return (
    <div style={styles.missionOverlay}>
      <canvas ref={canvasRef} style={styles.missionCanvas} />
      <div style={styles.m2HudTop}>
        <div style={styles.m2Legend}>
          <span style={{ color: "#ff6688" }}>⚔ TAP TRAPS</span>
          <span style={{ color: "#5bffa1" }}>✓ LET SAFE PASS</span>
        </div>
      </div>
      <div style={styles.m2Progress}>
        {totalHandled} / {s.totalMessages}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MISSION 3 — DRAG TO BIN (Data Vault)
// Clear UI: one item at a time drops from top. Player drags it LEFT into
// the 🔒 VAULT or RIGHT into 🌍 OPEN. Active decision on every item.
// Private items → vault (correct).  Public items → open (correct).
// Wrong drops bounce back with a hint, then auto-route correctly.
// ═══════════════════════════════════════════════════════════════════════════
function Mission3Dodge({ avatarCfg, actionRef, onComplete }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({
    currentItem: null,     // the active item being shown (or null between items)
    queueIdx: 0,           // which item in the sequence we're on
    total: 10,
    correctCount: 0,
    handled: 0,
    spawnTime: 0,          // when next item should spawn
    feedback: null,
    vaultGlow: 0,          // pulse when something enters vault
    openGlow: 0,           // pulse when something enters open bin
    vaultCollected: [],    // items correctly in vault
    openCollected: [],     // items correctly in open
    running: true,
    pointerActive: false,
    pointerX: 0,
    pointerY: 0,
  });
  const [, forceTick] = useState(0);

  // Full list of items with clear "why" explanations.
  // Pre-shuffle a mixed sequence so kids see both types.
  const ITEMS = [
    { label: "Home Address",     icon: "🏠", privateInfo: true,  why: "Tells strangers where you sleep" },
    { label: "Favorite Color",   icon: "🎨", privateInfo: false, why: "Fun fact — totally safe to share" },
    { label: "Password",         icon: "🔑", privateInfo: true,  why: "Never share — keeps your accounts locked" },
    { label: "Favorite Food",    icon: "🍕", privateInfo: false, why: "Everyone has one! Safe to share" },
    { label: "Real Photo of You",icon: "📷", privateInfo: true,  why: "Strangers could recognize you anywhere" },
    { label: "Cool Game",        icon: "🎮", privateInfo: false, why: "Great way to make friends" },
    { label: "Phone Number",     icon: "📞", privateInfo: true,  why: "Strangers can call or text you" },
    { label: "Favorite Movie",   icon: "🎬", privateInfo: false, why: "Opinions about movies? Safe" },
    { label: "School Name",      icon: "🏫", privateInfo: true,  why: "Tells strangers where to find you" },
    { label: "Favorite Sport",   icon: "⚽", privateInfo: false, why: "Interests make good conversation" },
    { label: "Birthday",         icon: "🎂", privateInfo: true,  why: "Often used to reset passwords" },
    { label: "Pet's Name",       icon: "🐶", privateInfo: false, why: "Usually safe (unless it's your password!)" },
    { label: "Credit Card #",    icon: "💳", privateInfo: true,  why: "Lets anyone spend your family's money" },
    { label: "Hobby",            icon: "🎸", privateInfo: false, why: "Hobbies connect people" },
    { label: "Your Location",    icon: "📍", privateInfo: true,  why: "Tells strangers exactly where you are" },
  ];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const s = stateRef.current;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    // Shuffle a subset of 10 items mixing private and public
    const privItems = ITEMS.filter(i => i.privateInfo);
    const pubItems = ITEMS.filter(i => !i.privateInfo);
    // Interleave to guarantee variety
    const queue = [];
    for (let i = 0; i < s.total; i++) {
      if (i % 2 === 0 && privItems.length > 0) {
        queue.push(privItems.splice(Math.floor(Math.random() * privItems.length), 1)[0]);
      } else if (pubItems.length > 0) {
        queue.push(pubItems.splice(Math.floor(Math.random() * pubItems.length), 1)[0]);
      } else if (privItems.length > 0) {
        queue.push(privItems.splice(Math.floor(Math.random() * privItems.length), 1)[0]);
      }
    }
    // Shuffle again lightly so kids don't detect the "every other" pattern
    for (let i = queue.length - 1; i > 0; i--) {
      if (Math.random() < 0.3) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
    }

    // Bin hit-zone calculations (recalc on resize)
    function getBins() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const binW = w * 0.42;
      const binH = 140;
      const binY = h - binH - 30;
      return {
        vault: { x: w * 0.04, y: binY, w: binW, h: binH, label: "VAULT", icon: "🔒", color: "#b58cff", subLabel: "PRIVATE — only you" },
        open:  { x: w * 0.54, y: binY, w: binW, h: binH, label: "OPEN",  icon: "🌍", color: "#4de8ff", subLabel: "SAFE TO SHARE" },
      };
    }

    function spawnNextItem() {
      if (s.queueIdx >= s.total) return;
      const data = queue[s.queueIdx];
      const w = canvas.clientWidth;
      s.currentItem = {
        ...data,
        x: w / 2,
        y: 90,
        vx: 0,
        vy: 0,
        grabbed: false,
        dragOffsetX: 0,
        dragOffsetY: 0,
        animatingToBin: null,  // 'vault' | 'open' | 'bounce-back' | null
        animProgress: 0,
        animStartX: 0,
        animStartY: 0,
        animTargetX: 0,
        animTargetY: 0,
        settled: false,
        correctBin: data.privateInfo ? 'vault' : 'open',
      };
      s.queueIdx++;
    }

    // Spawn first item after brief delay
    s.spawnTime = performance.now() + 400;

    function handlePointerDown(e) {
      if (!s.running) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX ?? e.touches?.[0]?.clientX;
      const clientY = e.clientY ?? e.touches?.[0]?.clientY;
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      s.pointerX = x;
      s.pointerY = y;
      s.pointerActive = true;
      const it = s.currentItem;
      if (!it || it.animatingToBin) return;
      // Grab if tap is within item bounds (generous)
      const dx = x - it.x;
      const dy = y - it.y;
      if (Math.hypot(dx, dy) < 80) {
        it.grabbed = true;
        it.dragOffsetX = it.x - x;
        it.dragOffsetY = it.y - y;
      }
    }

    function handlePointerMove(e) {
      if (!s.running || !s.pointerActive) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX ?? e.touches?.[0]?.clientX;
      const clientY = e.clientY ?? e.touches?.[0]?.clientY;
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      s.pointerX = x;
      s.pointerY = y;
      const it = s.currentItem;
      if (it && it.grabbed) {
        it.x = x + it.dragOffsetX;
        it.y = y + it.dragOffsetY;
      }
    }

    function handlePointerUp(e) {
      if (!s.running) return;
      s.pointerActive = false;
      const it = s.currentItem;
      if (!it || !it.grabbed) return;
      it.grabbed = false;
      // Check which bin the item was dropped over
      const bins = getBins();
      const inBin = (bin) => (
        it.x > bin.x && it.x < bin.x + bin.w &&
        it.y > bin.y - 30 && it.y < bin.y + bin.h
      );
      let droppedIn = null;
      if (inBin(bins.vault)) droppedIn = 'vault';
      else if (inBin(bins.open)) droppedIn = 'open';

      if (droppedIn === null) {
        // Dropped in open air — do nothing, item continues drifting
        return;
      }

      if (droppedIn === it.correctBin) {
        // CORRECT
        s.correctCount++;
        s.handled++;
        it.animatingToBin = droppedIn;
        it.animStartX = it.x;
        it.animStartY = it.y;
        it.animTargetX = (droppedIn === 'vault' ? bins.vault : bins.open).x + (droppedIn === 'vault' ? bins.vault : bins.open).w / 2;
        it.animTargetY = (droppedIn === 'vault' ? bins.vault : bins.open).y + 50;
        it.animProgress = 0;
        if (droppedIn === 'vault') s.vaultGlow = 1.0;
        else s.openGlow = 1.0;
        s.feedback = {
          text: `✓ ${it.label}: ${it.why}`,
          color: "#5bffa1",
          until: performance.now() + 2400,
        };
        // Signal 3D avatar catch action
        if (actionRef && actionRef.current) {
          actionRef.current.action = "catch";
          actionRef.current.aimAngle = droppedIn === 'vault' ? -0.4 : 0.4;
          actionRef.current.triggeredAt = performance.now();
        }
      } else {
        // WRONG — bounce back to center, show hint, then auto-route to correct bin
        s.handled++;
        const correctBin = it.correctBin === 'vault' ? bins.vault : bins.open;
        const itemName = it.correctBin === 'vault' ? 'PRIVATE' : 'SAFE to share';
        const where = it.correctBin === 'vault' ? 'the VAULT 🔒' : 'OPEN 🌍';
        s.feedback = {
          text: `⚠ ${it.label} is ${itemName} — drag it to ${where}`,
          color: "#ffd36b",
          until: performance.now() + 2800,
        };
        // Animate a short bounce back to center, then auto-route to correct bin
        it.animatingToBin = 'bounce-then-correct';
        it.animStartX = it.x;
        it.animStartY = it.y;
        it.animTargetX = correctBin.x + correctBin.w / 2;
        it.animTargetY = correctBin.y + 50;
        it.animProgress = 0;
      }
    }

    canvas.addEventListener("pointerdown", handlePointerDown);
    canvas.addEventListener("pointermove", handlePointerMove);
    canvas.addEventListener("pointerup", handlePointerUp);
    canvas.addEventListener("pointercancel", handlePointerUp);
    canvas.addEventListener("pointerleave", handlePointerUp);

    function loop(now) {
      const dt = Math.min(0.05, (now - (loop.last || now)) / 1000);
      loop.last = now;
      if (!s.running) {
        raf = requestAnimationFrame(loop);
        return;
      }

      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      const bins = getBins();

      // Spawn next item if time is right and no current item
      if (!s.currentItem && s.queueIdx < s.total && now > s.spawnTime) {
        spawnNextItem();
      }

      // ─── BACKGROUND PANELS ───
      // Subtle gradient strip at top suggesting "data stream"
      const topGrad = ctx.createLinearGradient(0, 0, 0, 80);
      topGrad.addColorStop(0, "rgba(77,232,255,0.08)");
      topGrad.addColorStop(1, "rgba(77,232,255,0)");
      ctx.fillStyle = topGrad;
      ctx.fillRect(0, 0, w, 80);

      // ─── DRAW BINS (the big UI anchors) ───
      function drawBin(bin, glow, hoveringItem) {
        // Hover highlight
        const isHovered = hoveringItem && (
          hoveringItem.x > bin.x && hoveringItem.x < bin.x + bin.w &&
          hoveringItem.y > bin.y - 30 && hoveringItem.y < bin.y + bin.h
        );
        // Outer glow from recent drops
        if (glow > 0.01) {
          const g = ctx.createRadialGradient(bin.x + bin.w / 2, bin.y + bin.h / 2, 0, bin.x + bin.w / 2, bin.y + bin.h / 2, bin.w);
          g.addColorStop(0, bin.color + Math.floor(glow * 160).toString(16).padStart(2, '0'));
          g.addColorStop(1, bin.color + "00");
          ctx.fillStyle = g;
          ctx.fillRect(bin.x - 40, bin.y - 40, bin.w + 80, bin.h + 80);
        }
        // Bin body
        ctx.save();
        if (isHovered) {
          ctx.shadowColor = bin.color;
          ctx.shadowBlur = 30;
        }
        // Background — darker rounded rect
        ctx.fillStyle = "rgba(10, 18, 48, 0.85)";
        ctx.beginPath();
        ctx.roundRect(bin.x, bin.y, bin.w, bin.h, 18);
        ctx.fill();
        // Border — thicker when hovered
        ctx.strokeStyle = bin.color;
        ctx.lineWidth = isHovered ? 4 : 2.5;
        ctx.stroke();
        ctx.restore();

        // Big icon
        ctx.font = "52px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(bin.icon, bin.x + bin.w / 2, bin.y + 38);

        // Label
        ctx.font = "bold 22px 'Orbitron', sans-serif";
        ctx.fillStyle = bin.color;
        ctx.fillText(bin.label, bin.x + bin.w / 2, bin.y + 80);

        // Sublabel (smaller, plain)
        ctx.font = "11px system-ui, sans-serif";
        ctx.fillStyle = "rgba(207, 232, 255, 0.7)";
        ctx.fillText(bin.subLabel, bin.x + bin.w / 2, bin.y + 102);

        // Collected count
        const collected = bin.label === "VAULT" ? s.vaultCollected.length : s.openCollected.length;
        if (collected > 0) {
          ctx.font = "bold 14px 'Orbitron', sans-serif";
          ctx.fillStyle = bin.color;
          ctx.fillText(`${collected}`, bin.x + bin.w / 2, bin.y + 122);
        }
      }

      // Find hovering item for highlight
      const hoveringItem = s.currentItem && s.currentItem.grabbed ? s.currentItem : null;
      drawBin(bins.vault, s.vaultGlow, hoveringItem);
      drawBin(bins.open, s.openGlow, hoveringItem);
      s.vaultGlow = Math.max(0, s.vaultGlow - dt * 1.2);
      s.openGlow = Math.max(0, s.openGlow - dt * 1.2);

      // ─── UPDATE + DRAW CURRENT ITEM ───
      if (s.currentItem) {
        const it = s.currentItem;

        // Handle animations (bin-bound or bounce-back)
        if (it.animatingToBin === 'vault' || it.animatingToBin === 'open') {
          it.animProgress += dt * 3.0;
          const k = Math.min(1, it.animProgress);
          const kEase = 1 - (1 - k) * (1 - k);
          it.x = lerp(it.animStartX, it.animTargetX, kEase);
          it.y = lerp(it.animStartY, it.animTargetY, kEase);
          // Shrink into the bin
          const shrink = 1 - kEase * 0.6;
          if (k >= 1) {
            // Successfully placed
            if (it.animatingToBin === 'vault') s.vaultCollected.push(it);
            else s.openCollected.push(it);
            it.settled = true;
          }
          drawItemCard(ctx, it, shrink);
        } else if (it.animatingToBin === 'bounce-then-correct') {
          // First: quick bounce back up for 300ms then auto-route to correct bin
          it.animProgress += dt * 2.0;
          const k = Math.min(1, it.animProgress);
          const kEase = k < 0.5
            ? (k * 2) * (k * 2) * 0.5        // first half: accelerate
            : 1 - (1 - (k - 0.5) * 2) * (1 - (k - 0.5) * 2) * 0.5; // second half: decelerate
          it.x = lerp(it.animStartX, it.animTargetX, kEase);
          it.y = lerp(it.animStartY, it.animTargetY, kEase);
          const shrink = k > 0.7 ? 1 - (k - 0.7) / 0.3 * 0.5 : 1;
          if (k >= 1) {
            // Auto-settle correctly
            const bin = it.correctBin === 'vault' ? bins.vault : bins.open;
            if (it.correctBin === 'vault') {
              s.vaultCollected.push(it);
              s.vaultGlow = 0.8;
            } else {
              s.openCollected.push(it);
              s.openGlow = 0.8;
            }
            it.settled = true;
          }
          drawItemCard(ctx, it, shrink);
        } else if (!it.grabbed) {
          // Idle drift — item slowly floats downward in the middle area
          // If no pointer action, gentle bob
          it.y += 10 * dt; // VERY slow drift down
          it.x += Math.sin(now / 700) * 0.3; // gentle sway
          // Clamp so item doesn't drift into bins or off top
          const topLimit = 80;
          const bottomLimit = bins.vault.y - 60;
          if (it.y > bottomLimit) it.y = bottomLimit;
          if (it.y < topLimit) it.y = topLimit;
          drawItemCard(ctx, it, 1);
        } else {
          // Being dragged
          drawItemCard(ctx, it, 1.08); // slightly larger when held
        }

        // Advance to next item after item settles
        if (it.settled) {
          s.currentItem = null;
          s.spawnTime = now + 500;
        }
      }

      // ─── FEEDBACK TOOLTIP ───
      if (s.feedback && now < s.feedback.until) {
        const timeLeft = s.feedback.until - now;
        const alpha = Math.min(1, timeLeft / 400);
        ctx.globalAlpha = alpha;
        ctx.font = "bold 14px system-ui, sans-serif";
        const metrics = ctx.measureText(s.feedback.text);
        const padX = 18;
        const boxW = Math.min(w - 40, metrics.width + padX * 2);
        const boxH = 36;
        const boxX = (w - boxW) / 2;
        const boxY = 14;
        ctx.fillStyle = "rgba(10, 18, 48, 0.95)";
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 10);
        ctx.fill();
        ctx.strokeStyle = s.feedback.color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = s.feedback.color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(s.feedback.text, w / 2, boxY + boxH / 2);
        ctx.globalAlpha = 1;
      }

      // ─── HINT (only shown for first few items) ───
      if (s.queueIdx <= 2 && s.currentItem && !s.currentItem.grabbed && !s.currentItem.animatingToBin) {
        ctx.globalAlpha = 0.5 + Math.sin(now / 400) * 0.3;
        ctx.font = "bold 14px system-ui, sans-serif";
        ctx.fillStyle = "#ffd36b";
        ctx.textAlign = "center";
        ctx.fillText("👆 Drag the item to the right bin!", w / 2, h - 200);
        ctx.globalAlpha = 1;
      }

      forceTick((n) => (n + 1) % 1000000);

      // Win condition
      if (s.handled >= s.total && s.running && !s.currentItem) {
        s.running = false;
        setTimeout(() => onComplete(), 900);
      }

      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      canvas.removeEventListener("pointerdown", handlePointerDown);
      canvas.removeEventListener("pointermove", handlePointerMove);
      canvas.removeEventListener("pointerup", handlePointerUp);
      canvas.removeEventListener("pointercancel", handlePointerUp);
      canvas.removeEventListener("pointerleave", handlePointerUp);
      window.removeEventListener("resize", resize);
    };
  }, [onComplete, avatarCfg]);

  // Draw an item card — used both while idle/dragged and while animating to bin
  function drawItemCard(ctx, it, scale = 1) {
    const w = 140 * scale;
    const h = 90 * scale;
    const x = it.x;
    const y = it.y;
    const color = it.privateInfo ? "#ffd36b" : "#4de8ff";
    ctx.save();
    // Drop shadow
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath();
    ctx.ellipse(x, y + h / 2 + 8, w * 0.4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Halo
    const hGrad = ctx.createRadialGradient(x, y, 0, x, y, w * 0.9);
    hGrad.addColorStop(0, color + "55");
    hGrad.addColorStop(1, color + "00");
    ctx.fillStyle = hGrad;
    ctx.beginPath();
    ctx.arc(x, y, w * 0.9, 0, Math.PI * 2);
    ctx.fill();
    // Card body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x - w / 2, y - h / 2, w, h, 14);
    ctx.fill();
    // Border
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.stroke();
    // Icon (big)
    ctx.font = `${40 * scale}px system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(it.icon, x, y - 12 * scale);
    // Label — wrapped if long
    ctx.fillStyle = "#0a1230";
    ctx.font = `bold ${14 * scale}px system-ui, sans-serif`;
    const words = it.label.split(" ");
    let line = "";
    let yOff = 18 * scale;
    for (const wd of words) {
      const test = line + (line ? " " : "") + wd;
      if (ctx.measureText(test).width > w * 0.82 && line) {
        ctx.fillText(line, x, y + yOff);
        line = wd;
        yOff += 15 * scale;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, x, y + yOff);
    ctx.restore();
  }

  const s = stateRef.current;

  return (
    <div style={styles.missionOverlay}>
      <canvas ref={canvasRef} style={styles.missionCanvas} />
      <div style={styles.m3Progress}>
        {s.handled} / {s.total}
      </div>
    </div>
  );
}

// Global mute toggle — visible on every screen so kids/parents can silence at any time.
// Audio controls — separate toggles for voice and music. Bottom-right corner.
function AudioControls() {
  const [voiceMuted, setVoiceMuted] = useState(VoiceEngine.isMuted());
  const [musicMuted, setMusicMuted] = useState(MusicEngine.isMuted());
  function toggleVoice(e) {
    if (e) e.stopPropagation();
    setVoiceMuted(VoiceEngine.toggleMute());
  }
  function toggleMusic(e) {
    if (e) e.stopPropagation();
    setMusicMuted(MusicEngine.toggleMute());
  }
  return (
    <div style={styles.audioControls}>
      <button
        onClick={toggleMusic}
        style={{ ...styles.audioBtn, opacity: musicMuted ? 0.4 : 1 }}
        aria-label={musicMuted ? "Unmute music" : "Mute music"}

}

function DialogueBox({ line, onNext, isLast }) {
  const [shown, setShown] = useState("");
  const [complete, setComplete] = useState(false);
  const [voiceDone, setVoiceDone] = useState(false);
  useEffect(() => {
    setShown("");
    setComplete(false);
    setVoiceDone(false);
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setShown(line.text.slice(0, i));
      if (i >= line.text.length) {
        clearInterval(iv);
        setComplete(true);
      }
    }, 14); // snappier typewriter
    // Speak the line. If an audioId is present, try the MP3 first; the engine
    // falls back to TTS if the file isn't available. Mark voiceDone when
    // the audio/TTS finishes naturally so the user knows it's safe to advance.
    const audioUrl = line.audioId ? `${AUDIO_BASE_URL}${line.audioId}.mp3` : null;
    VoiceEngine.speak(
      line.voiceText || line.text,
      line.npc,
      () => setVoiceDone(true),
      audioUrl
    );
    return () => {
      clearInterval(iv);
      VoiceEngine.cancel();
    };
  }, [line.text, line.npc]);
  const npcStyle = {
    PIXEL: { color: COLORS.teal, glow: COLORS.teal },
    NOVA: { color: COLORS.green, glow: COLORS.green },
    CIPHER: { color: COLORS.violet, glow: COLORS.violet },
  }[line.npc] || { color: COLORS.cyan, glow: COLORS.cyan };
  const icon = { PIXEL: "🤖", NOVA: "📡", CIPHER: "🔮" }[line.npc] || "✦";

  // Tap behavior depends on state:
  //   1. typewriter still running → tap reveals full text (voice keeps playing uninterrupted)
  //   2. typewriter done, voice still playing → tap skips voice and advances
  //   3. both done → tap advances normally
  function handleTap() {
    if (!complete) {
      setShown(line.text);
      setComplete(true);
    } else {
      VoiceEngine.cancel();
      onNext();
    }
  }

  // Button label adapts to current state — clear cue what happens on tap
  let buttonLabel;
  if (!complete) {
    buttonLabel = "...";
  } else if (!voiceDone) {
    buttonLabel = "Skip voice ⏭";
  } else {
    buttonLabel = isLast ? "Let's go! →" : "Tap to continue →";
  }

  return (
    <div style={styles.dialogueRoot} onClick={handleTap}>
      <div style={{ ...styles.dialogueBox, borderColor: npcStyle.glow, boxShadow: `0 0 30px ${npcStyle.glow}55`, cursor: "pointer" }}>
        <div style={styles.dialogueHeader}>
          <div style={{ ...styles.npcBadge, color: npcStyle.color, borderColor: npcStyle.glow }}>
            <span style={{ fontSize: 20, marginRight: 8 }}>{icon}</span>
            {line.npc}
          </div>
          {!voiceDone && complete && (
            <span style={styles.dialogueSpeakingDot}>● speaking</span>
          )}
        </div>
        <div style={styles.dialogueText}>{shown}<span style={styles.caret}>{complete ? "" : "▊"}</span></div>
        <button
          onClick={(e) => { e.stopPropagation(); handleTap(); }}
          style={{
            ...styles.nextBtn,
            borderColor: npcStyle.glow,
            color: npcStyle.color,
            opacity: !complete ? 0.5 : 1,
          }}
        >
          {buttonLabel}
        </button>
      </div>
    </div>
  );
}
