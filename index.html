      tower.position.set(Math.cos(angle) * dist, hh / 2 - 0.3, Math.sin(angle) * dist);
      towers.add(tower);
    }
    // Mid ring (denser)
    for (let i = 0; i < 30; i++) {
      const angle = (i / 30) * Math.PI * 2;
      const dist = 28 + Math.random() * 10;
      const hh = 18 + Math.random() * 22;
      const tower = buildTower(hh, towerColors[i % towerColors.length], 1.2);
      tower.position.set(Math.cos(angle) * dist, hh / 2 - 0.3, Math.sin(angle) * dist);
      towers.add(tower);
    }
    // Outer ring (denser)
    for (let i = 0; i < 55; i++) {
      const angle = (i / 55) * Math.PI * 2;
      const dist = 48 + Math.random() * 20;
      const hh = 10 + Math.random() * 25;
      const tower = buildTower(hh, towerColors[i % towerColors.length], 1.0);
      tower.position.set(Math.cos(angle) * dist, hh / 2 - 0.3, Math.sin(angle) * dist);
      towers.add(tower);
    }
    // Far ring (prevents horizon gaps) — uses simplified builder for perf
    for (let i = 0; i < 80; i++) {
      const angle = (i / 80) * Math.PI * 2;
      const dist = 75 + Math.random() * 50;
      const hh = 15 + Math.random() * 40;
      const tower = buildSimpleTower(hh, towerColors[i % towerColors.length], 1.4);
      tower.position.set(Math.cos(angle) * dist, hh / 2 - 0.3, Math.sin(angle) * dist);
      towers.add(tower);
    }
    // DISTANT silhouette skyline — massive far background so city fills horizon
    for (let i = 0; i < 120; i++) {
      const angle = (i / 120) * Math.PI * 2;
      const dist = 140 + Math.random() * 120;
      const hh = 25 + Math.random() * 55;
      const tower = buildSimpleTower(hh, towerColors[i % towerColors.length], 2.0);
      tower.position.set(Math.cos(angle) * dist, hh / 2 - 0.3, Math.sin(angle) * dist);
      towers.add(tower);
    }
    // EXTREME BACKGROUND — simple boxes for the far skyline (huge density at horizon)
    for (let i = 0; i < 180; i++) {
      const angle = (i / 180) * Math.PI * 2;
      const dist = 280 + Math.random() * 140;
      const hh = 30 + Math.random() * 80;
      const width = 3 + Math.random() * 6;
      const col = towerColors[i % towerColors.length];
      // Simple silhouette block - no expensive detail since they're far away
      const silhouette = new THREE.Mesh(
        new THREE.BoxGeometry(width, hh, width),
        new THREE.MeshStandardMaterial({
          color: 0x050814,
          emissive: col,
          emissiveIntensity: 0.3,
          roughness: 0.4, metalness: 0.6,
        })
      );
      silhouette.position.set(Math.cos(angle) * dist, hh / 2, Math.sin(angle) * dist);
      // Add a top beacon light
      const beacon = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 6, 6),
        new THREE.MeshBasicMaterial({ color: col })
      );
      beacon.position.y = hh / 2 + 0.5;
      silhouette.add(beacon);
      towers.add(silhouette);
    }
    // FLIGHT CORRIDOR — tall dense buildings lining the ship's approach path
    // Extended further back to fill view during the entire flyby
    for (let i = 0; i < 40; i++) {
      const side = i % 2 === 0 ? 1 : -1;
      const zPos = -40 - i * 14;  // extends from z=-40 to z=-586
      const lateral = 14 + Math.random() * 10;
      const hh = 28 + Math.random() * 35;
      const tower = buildTower(hh, towerColors[i % towerColors.length], 1.6);
      tower.position.set(side * lateral, hh / 2 - 0.3, zPos);
      towers.add(tower);
    }
    // Additional corridor at wider lateral offset (creates depth layering)
    for (let i = 0; i < 30; i++) {
      const side = i % 2 === 0 ? 1 : -1;
      const zPos = -60 - i * 20;
      const lateral = 35 + Math.random() * 15;
      const hh = 20 + Math.random() * 40;
      const tower = buildSimpleTower(hh, towerColors[i % towerColors.length], 1.3);
      tower.position.set(side * lateral, hh / 2 - 0.3, zPos);
      towers.add(tower);
    }
    towers.children.forEach((t) => {
      t.traverse((c) => {
        if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
      });
    });
    city.add(towers);

    // ─── FLOATING PLATFORMS (crystalline light platforms per Cyberia doc) ─
    // The doc describes "floating platforms" and "crystalline light towers"
    // These are suspended hexagonal platforms at various altitudes
    const floatingPlatforms = new THREE.Group();
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 22 + Math.random() * 70;
      const height = 15 + Math.random() * 35;
      const size = 2 + Math.random() * 4;
      const col = towerColors[i % towerColors.length];
      // Hexagonal platform
      const platform = new THREE.Mesh(
        new THREE.CylinderGeometry(size, size, 0.4, 6),
        new THREE.MeshStandardMaterial({
          color: 0x0a1230, emissive: col, emissiveIntensity: 0.4,
          roughness: 0.3, metalness: 0.7,
        })
      );
      platform.position.set(Math.cos(angle) * dist, height, Math.sin(angle) * dist);
      floatingPlatforms.add(platform);
      // Rim light
      const rim = new THREE.Mesh(
        new THREE.TorusGeometry(size, 0.08, 6, 12),
        new THREE.MeshBasicMaterial({ color: col })
      );
      rim.position.copy(platform.position);
      rim.position.y += 0.2;
      rim.rotation.x = Math.PI / 2;
      floatingPlatforms.add(rim);
      // A small spire rising from the platform
      if (Math.random() > 0.5) {
        const spire = new THREE.Mesh(
          new THREE.ConeGeometry(0.3, 2.5, 6),
          new THREE.MeshStandardMaterial({
            color: 0x0a1230, emissive: col, emissiveIntensity: 0.5, metalness: 0.7,
          })
        );
        spire.position.set(platform.position.x, platform.position.y + 1.4, platform.position.z);
        floatingPlatforms.add(spire);
      }
      // Gravity beam connecting to ground (visual element)
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.05, height, 6),
        new THREE.MeshBasicMaterial({
          color: col, transparent: true, opacity: 0.18,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      beam.position.set(platform.position.x, height / 2, platform.position.z);
      floatingPlatforms.add(beam);
    }
    city.add(floatingPlatforms);

    // ─── SKY BRIDGES (connecting tall towers — per doc's crystalline architecture) ─
    const bridges = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const a1 = Math.random() * Math.PI * 2;
      const a2 = a1 + (0.3 + Math.random() * 0.5);
      const r = 30 + Math.random() * 25;
      const y = 15 + Math.random() * 20;
      const p1 = new THREE.Vector3(Math.cos(a1) * r, y, Math.sin(a1) * r);
      const p2 = new THREE.Vector3(Math.cos(a2) * r, y, Math.sin(a2) * r);
      const dist = p1.distanceTo(p2);
      const col = towerColors[i % towerColors.length];
      const bridge = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.3, dist),
        new THREE.MeshStandardMaterial({
          color: 0x0a1230, emissive: col, emissiveIntensity: 0.3,
          roughness: 0.4, metalness: 0.7,
        })
      );
      bridge.position.set((p1.x + p2.x) / 2, y, (p1.z + p2.z) / 2);
      bridge.lookAt(p2);
      bridges.add(bridge);
      // Glow underline
      const under = new THREE.Mesh(
        new THREE.BoxGeometry(0.45, 0.03, dist),
        new THREE.MeshBasicMaterial({ color: col })
      );
      under.position.copy(bridge.position);
      under.position.y -= 0.18;
      under.rotation.copy(bridge.rotation);
      bridges.add(under);
    }
    city.add(bridges);

    // The Fortress Gate (landmark visible during approach)
    const gate = new THREE.Group();
    const gateFrame = new THREE.Mesh(
      new THREE.BoxGeometry(14, 15, 1.5),
      new THREE.MeshStandardMaterial({
        color: 0x141c34, emissive: 0x4de8ff, emissiveIntensity: 0.4,
        roughness: 0.35, metalness: 0.7,
      })
    );
    gateFrame.position.y = 7.5;
    gate.add(gateFrame);
    const gateInner = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 13),
      new THREE.MeshBasicMaterial({
        color: 0x4de8ff, transparent: true, opacity: 0.65, side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    gateInner.position.set(0, 7.5, 0.8);
    gate.add(gateInner);
    // Gate halo glow
    const gateHalo = new THREE.Sprite(
      new THREE.SpriteMaterial({
        color: 0x4de8ff, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    gateHalo.position.set(0, 7.5, 0.5);
    gateHalo.scale.set(30, 30, 1);
    gate.add(gateHalo);
    gate.position.set(0, 0, -90);
    city.add(gate);

    // ─── SIGNAL TOWER (NOVA's domain) — tall transmission tower off to one side
    const signalTower = new THREE.Group();
    const stBase = new THREE.Mesh(
      new THREE.CylinderGeometry(1.4, 2.2, 1.2, 10),
      new THREE.MeshStandardMaterial({
        color: 0x1a2850, emissive: 0x5bffa1, emissiveIntensity: 0.4, roughness: 0.4, metalness: 0.5,
      })
    );
    stBase.position.y = 0.6;
    signalTower.add(stBase);
    const stPole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.5, 16, 10),
      new THREE.MeshStandardMaterial({
        color: 0x2a3a60, emissive: 0x5bffa1, emissiveIntensity: 0.5, metalness: 0.7,
      })
    );
    stPole.position.y = 9;
    signalTower.add(stPole);
    // Three transmission dishes stacked
    for (let i = 0; i < 3; i++) {
      const dish = new THREE.Mesh(
        new THREE.TorusGeometry(1.2, 0.18, 10, 32),
        new THREE.MeshStandardMaterial({
          color: 0x5bffa1, emissive: 0x5bffa1, emissiveIntensity: 0.9, metalness: 0.6,
        })
      );
      dish.position.y = 4 + i * 3;
      dish.rotation.x = Math.PI / 2;
      signalTower.add(dish);
    }
    // Top beacon
    const stBeacon = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 12, 10),
      new THREE.MeshBasicMaterial({ color: 0xffd36b })
    );
    stBeacon.position.y = 17.5;
    signalTower.add(stBeacon);
    // Beacon glow sprite
    const stGlow = new THREE.Sprite(
      new THREE.SpriteMaterial({
        color: 0xffd36b, transparent: true, opacity: 0.7,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    stGlow.position.y = 17.5;
    stGlow.scale.set(4, 4, 1);
    signalTower.add(stGlow);
    signalTower.position.set(30, 0, -55);
    city.add(signalTower);

    // ─── DATA VAULT (CIPHER's domain) — glowing crystalline chamber on the opposite side
    const dataVault = new THREE.Group();
    const vaultBase = new THREE.Mesh(
      new THREE.CylinderGeometry(3, 3.6, 0.8, 16),
      new THREE.MeshStandardMaterial({
        color: 0x2a1a4a, emissive: 0xb58cff, emissiveIntensity: 0.4, metalness: 0.5,
      })
    );
    vaultBase.position.y = 0.4;
    dataVault.add(vaultBase);
    // Central octahedron chamber
    const vaultCore = new THREE.Mesh(
      new THREE.OctahedronGeometry(3, 0),
      new THREE.MeshStandardMaterial({
        color: 0x4a2a7a, emissive: 0xb58cff, emissiveIntensity: 0.7,
        metalness: 0.7, roughness: 0.3,
      })
    );
    vaultCore.position.y = 4;
    vaultCore.userData.isVaultCore = true;
    dataVault.add(vaultCore);
    // Surrounding ring of pillars
    for (let i = 0; i < 6; i++) {
      const ang = (i / 6) * Math.PI * 2;
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.25, 5, 8),
        new THREE.MeshStandardMaterial({
          color: 0x1a0a30, emissive: 0xb58cff, emissiveIntensity: 0.6,
        })
      );
      pillar.position.set(Math.cos(ang) * 3.2, 2.5, Math.sin(ang) * 3.2);
      dataVault.add(pillar);
      // Crown light on each pillar
      const crown = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffd36b })
      );
      crown.position.set(Math.cos(ang) * 3.2, 5.2, Math.sin(ang) * 3.2);
      dataVault.add(crown);
    }
    dataVault.position.set(-32, 0, -55);
    city.add(dataVault);

    // ─── CITIZENS — mix of humans and humanoid robots around the landing pad
    const citizens = new THREE.Group();
    for (let i = 0; i < 22; i++) {
      const bot = makeCitizen(i);
      const ang = Math.random() * Math.PI * 2;
      const r = 10 + Math.random() * 5;
      bot.position.set(Math.cos(ang) * r, 0, Math.sin(ang) * r);
      bot.userData.baseAngle = ang;
      bot.userData.radius = r;
      bot.userData.bobPhase = Math.random() * Math.PI * 2;
      bot.userData.wanderSpeed = (Math.random() - 0.5) * 0.15;
      bot.userData.walkPhase = Math.random() * Math.PI * 2;
      // Scale citizens slightly smaller so they don't dominate the pad
      bot.scale.setScalar(0.75 + Math.random() * 0.2);
      citizens.add(bot);
    }
    city.add(citizens);

    // Flying traffic — ships on VARIED paths crossing the city at different altitudes.
    // Mix of orbital paths AND linear corridors that cut through the city.
    const traffic = new THREE.Group();
    const trafficData = [];
    for (let i = 0; i < 22; i++) {
      const t = new THREE.Group();
      const col = [0x4de8ff, 0xff6fb5, 0xffd36b, 0x5bffa1, 0xb58cff][i % 5];
      // Body
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.2, 1.3),
        new THREE.MeshStandardMaterial({
          color: 0x14203a, emissive: col, emissiveIntensity: 1.0,
          metalness: 0.7, roughness: 0.3,
        })
      );
      t.add(body);
      // Extended trail — longer and more luminous than before
      const trail = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12, 5.5),
        new THREE.MeshBasicMaterial({
          color: col, transparent: true, opacity: 0.75,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      trail.position.z = 3;
      t.add(trail);
      // Wider trail (softer glow halo behind)
      const trailGlow = new THREE.Mesh(
        new THREE.PlaneGeometry(0.5, 4),
        new THREE.MeshBasicMaterial({
          color: col, transparent: true, opacity: 0.2,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      trailGlow.position.z = 2.3;
      t.add(trailGlow);
      traffic.add(t);

      // Assign a path type: orbital (loops around), linear (crosses across), or diagonal (up/down)
      const pathType = i < 8 ? "orbital" : i < 16 ? "linear" : "diagonal";
      if (pathType === "orbital") {
        trafficData.push({
          type: "orbital",
          angle: Math.random() * Math.PI * 2,
          radius: 22 + Math.random() * 45,
          y: 6 + Math.random() * 32,
          speed: (0.12 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1),
          mesh: t,
        });
      } else if (pathType === "linear") {
        // Traffic flying on straight corridors crossing through the city
        const axis = Math.random() > 0.5 ? "x" : "z";
        trafficData.push({
          type: "linear",
          axis,
          progress: Math.random(),
          lateral: (Math.random() - 0.5) * 80, // lateral offset from center
          y: 8 + Math.random() * 25,
          speed: 0.1 + Math.random() * 0.15, // normalized per-second progress
          direction: Math.random() > 0.5 ? 1 : -1,
          mesh: t,
        });
      } else {
        // Diagonal — crosses the city at an angle
        trafficData.push({
          type: "diagonal",
          progress: Math.random(),
          startAngle: Math.random() * Math.PI * 2,
          y1: 5 + Math.random() * 15,
          y2: 20 + Math.random() * 20,
          speed: 0.08 + Math.random() * 0.12,
          direction: Math.random() > 0.5 ? 1 : -1,
          mesh: t,
        });
      }
    }
    city.add(traffic);

    // ─── GROUND-LEVEL STREET TRAFFIC ────────────────────────────────
    // Small fast-moving bright dots with trails, low to the ground,
    // creating the sense of bustling city streets below
    const streetTraffic = new THREE.Group();
    const streetData = [];
    for (let i = 0; i < 30; i++) {
      const col = [0xff6688, 0xffd36b, 0x4de8ff, 0x5bffa1][i % 4];
      const car = new THREE.Group();
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 6, 6),
        new THREE.MeshBasicMaterial({ color: col })
      );
      car.add(bulb);
      // Bright trail behind
      const streak = new THREE.Mesh(
        new THREE.PlaneGeometry(0.08, 2.5),
        new THREE.MeshBasicMaterial({
          color: col, transparent: true, opacity: 0.8,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      streak.position.z = 1.25;
      car.add(streak);
      // Glow sprite around the car
      const carGlow = new THREE.Sprite(
        new THREE.SpriteMaterial({
          color: col, transparent: true, opacity: 0.5,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      carGlow.scale.set(0.8, 0.8, 1);
      car.add(carGlow);
      streetTraffic.add(car);

      // Assign it to a radial street (lane around the city)
      const ringR = 12 + Math.floor(Math.random() * 4) * 12; // 12, 24, 36, 48
      streetData.push({
        angle: Math.random() * Math.PI * 2,
        radius: ringR + (Math.random() - 0.5) * 4,
        speed: (0.4 + Math.random() * 0.4) * (Math.random() > 0.5 ? 1 : -1),
        y: -0.3,
        mesh: car,
      });
    }
    city.add(streetTraffic);

    // ─── TOWER SEARCHLIGHTS ────────────────────────────────────────
    // Several tall towers get sweeping searchlights
    const searchlights = new THREE.Group();
    const searchlightData = [];
    for (let i = 0; i < 6; i++) {
      // Cone representing the light beam
      const beamMat = new THREE.MeshBasicMaterial({
        color: [0x4de8ff, 0xff6fb5, 0xffd36b][i % 3],
        transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
      });
      const beam = new THREE.Mesh(
        new THREE.ConeGeometry(8, 35, 16, 1, true),
        beamMat
      );
      beam.position.y = -17;
      // Source point (bright spot at the light origin)
      const group = new THREE.Group();
      group.add(beam);
      const source = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 10, 8),
        new THREE.MeshBasicMaterial({ color: beamMat.color, transparent: true, opacity: 0.9 })
      );
      group.add(source);
      const ang = (i / 6) * Math.PI * 2;
      const dist = 20 + Math.random() * 14;
      group.position.set(Math.cos(ang) * dist, 25 + Math.random() * 15, Math.sin(ang) * dist);
      searchlights.add(group);
      searchlightData.push({
        group,
        sweepSpeed: (0.3 + Math.random() * 0.5) * (Math.random() > 0.5 ? 1 : -1),
        sweepPhase: Math.random() * Math.PI * 2,
        tiltBase: 0.4 + Math.random() * 0.3,
      });
    }
    city.add(searchlights);

    // Billboard signs — additive glowing planes on tower sides
    const billboards = new THREE.Group();
    const billboardColors = [0xff6fb5, 0xffd36b, 0x4de8ff, 0x5bffa1];
    for (let i = 0; i < 30; i++) {
      const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(4 + Math.random() * 3, 1.5 + Math.random() * 1.5),
        new THREE.MeshBasicMaterial({
          color: billboardColors[i % billboardColors.length],
          transparent: true, opacity: 0.85, side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      const angle = Math.random() * Math.PI * 2;
      const dist = 22 + Math.random() * 30;
      const height = 6 + Math.random() * 25;
      sign.position.set(Math.cos(angle) * dist, height, Math.sin(angle) * dist);
      sign.lookAt(0, height, 0);
      sign.userData.flickerPhase = Math.random() * Math.PI * 2;
      sign.userData.hueShift = Math.random() > 0.5;
      billboards.add(sign);
    }
    city.add(billboards);

    // Data-stream particles — glowing data flowing between towers
    const dataStreamGeo = new THREE.BufferGeometry();
    const dsN = 300;
    const dsPos = new Float32Array(dsN * 3);
    const dsColors = new Float32Array(dsN * 3);
    const dsData = [];
    const palette = [new THREE.Color(0x4de8ff), new THREE.Color(0xff6fb5), new THREE.Color(0xffd36b)];
    for (let i = 0; i < dsN; i++) {
      const c = palette[i % 3];
      const angle = Math.random() * Math.PI * 2;
      const r = 15 + Math.random() * 60;
      const y = 5 + Math.random() * 40;
      dsPos[i * 3] = Math.cos(angle) * r;
      dsPos[i * 3 + 1] = y;
      dsPos[i * 3 + 2] = Math.sin(angle) * r;
      dsColors[i * 3] = c.r; dsColors[i * 3 + 1] = c.g; dsColors[i * 3 + 2] = c.b;
      dsData.push({
        angle, r, y, angSpeed: (Math.random() - 0.5) * 0.8,
        ySpeed: 0.3 + Math.random() * 1.2, phase: Math.random() * Math.PI * 2,
      });
    }
    dataStreamGeo.setAttribute("position", new THREE.BufferAttribute(dsPos, 3));
    dataStreamGeo.setAttribute("color", new THREE.BufferAttribute(dsColors, 3));
    const dataStream = new THREE.Points(
      dataStreamGeo,
      new THREE.PointsMaterial({
        size: 0.3, vertexColors: true, transparent: true, opacity: 0.9,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    city.add(dataStream);

    city.position.set(0, 0, 0);
    city.visible = false;
    scene.add(city);

    // ═══════════════════════════════════════════════════════════════════
    // LENS FLARE SYSTEM (screen-aligned sprite stack toward light source)
    // ═══════════════════════════════════════════════════════════════════
    const lensFlareGroup = new THREE.Group();
    function makeFlare(color, size, opacity) {
      return new THREE.Sprite(
        new THREE.SpriteMaterial({
          color, transparent: true, opacity,
          blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
        })
      );
    }
    // Large warm halo, small tight core, 2 ghosts
    const flareHalo = makeFlare(0xfff0c0, 30, 0.4);
    const flareCore = makeFlare(0xffffff, 6, 0.9);
    const flareGhost1 = makeFlare(0xff9966, 8, 0.35);
    const flareGhost2 = makeFlare(0x66ccff, 5, 0.3);
    lensFlareGroup.add(flareHalo, flareCore, flareGhost1, flareGhost2);
    scene.add(lensFlareGroup);

    // ═══════════════════════════════════════════════════════════════════
    // THE SHIP — higher-detail with landing gear, glowing intakes, cockpit
    // ═══════════════════════════════════════════════════════════════════
    const ship = new THREE.Group();

    // Main fuselage — long tapered body (cylinder + sphere caps for r128 compatibility)
    const fuselageMat = new THREE.MeshStandardMaterial({
      color: 0xc8d4e8, emissive: 0x1a2c44, emissiveIntensity: 0.15,
      roughness: 0.3, metalness: 0.85,
    });
    const fuselage = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.45, 1.4, 16),
      fuselageMat
    );
    fuselage.rotation.x = Math.PI / 2;
    fuselage.castShadow = true;
    ship.add(fuselage);
    // rear cap
    const rearCap = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2),
      fuselageMat
    );
    rearCap.rotation.x = Math.PI / 2;
    rearCap.position.z = -0.7;
    rearCap.castShadow = true;
    ship.add(rearCap);

    // Nose cone
    const nose = new THREE.Mesh(
      new THREE.ConeGeometry(0.45, 0.8, 16),
      new THREE.MeshStandardMaterial({
        color: 0x8a9cb0, roughness: 0.25, metalness: 0.9,
      })
    );
    nose.rotation.x = -Math.PI / 2;
    nose.position.z = 1.4;
    nose.castShadow = true;
    ship.add(nose);

    // Cockpit canopy — tinted glass
    const canopy = new THREE.Mesh(
      new THREE.SphereGeometry(0.42, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2.3),
      new THREE.MeshPhysicalMaterial({
        color: 0x1a3050, emissive: 0x4de8ff, emissiveIntensity: 0.4,
        metalness: 0.3, roughness: 0.05, transmission: 0.6,
        transparent: true, opacity: 0.75,
      })
    );
    canopy.position.set(0, 0.28, 0.5);
    ship.add(canopy);

    // Wings — swept delta form
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);
    wingShape.lineTo(1.4, -0.35);
    wingShape.lineTo(1.4, -0.55);
    wingShape.lineTo(0.3, -0.9);
    wingShape.lineTo(0, -0.9);
    wingShape.lineTo(0, 0);
    const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.12, bevelEnabled: true, bevelSize: 0.03, bevelThickness: 0.03, bevelSegments: 2 });
    wingGeo.center();
    for (const side of [-1, 1]) {
      const wing = new THREE.Mesh(
        wingGeo.clone(),
        new THREE.MeshStandardMaterial({
          color: avatarCfg.outfitColor,
          emissive: avatarCfg.outfitColor, emissiveIntensity: 0.55,
          roughness: 0.4, metalness: 0.7,
        })
      );
      wing.rotation.y = side === -1 ? Math.PI : 0;
      wing.rotation.x = Math.PI;
      wing.position.set(side * 0.7, -0.1, -0.1);
      wing.castShadow = true;
      ship.add(wing);
      // Wingtip navigation lights
      const navLight = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 10, 8),
        new THREE.MeshBasicMaterial({ color: side === -1 ? 0xff4444 : 0x44ff44 })
      );
      navLight.position.set(side * 1.35, -0.1, -0.25);
      navLight.userData.isNavLight = true;
      ship.add(navLight);
    }

    // Engine nacelles (twin thrusters)
    for (const side of [-1, 1]) {
      const nacelle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.22, 0.7, 12),
        new THREE.MeshStandardMaterial({
          color: 0x2a3a50, emissive: 0xffd36b, emissiveIntensity: 0.15,
          roughness: 0.4, metalness: 0.8,
        })
      );
      nacelle.rotation.x = Math.PI / 2;
      nacelle.position.set(side * 0.45, -0.15, -0.7);
      nacelle.castShadow = true;
      ship.add(nacelle);
    }

    // Thruster plumes — cone meshes that we scale + color
    const plumes = [];
    for (const side of [-1, 1]) {
      const plume = new THREE.Mesh(
        new THREE.ConeGeometry(0.2, 1.0, 12),
        new THREE.MeshBasicMaterial({
          color: 0xffd36b, transparent: true, opacity: 0.9,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      plume.rotation.x = Math.PI / 2;
      plume.position.set(side * 0.45, -0.15, -1.3);
      ship.add(plume);
      plumes.push(plume);
      // Inner plume (hotter core)
      const core = new THREE.Mesh(
        new THREE.ConeGeometry(0.1, 0.7, 10),
        new THREE.MeshBasicMaterial({
          color: 0xffffff, transparent: true, opacity: 0.8,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      core.rotation.x = Math.PI / 2;
      core.position.set(side * 0.45, -0.15, -1.15);
      ship.add(core);
      plumes.push(core);
    }

    // Underside running lights
    for (let i = 0; i < 5; i++) {
      const runLight = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffd36b })
      );
      runLight.position.set(0, -0.35, -0.5 + i * 0.3);
      runLight.userData.isRunLight = true;
      runLight.userData.phase = i * 0.3;
      ship.add(runLight);
    }

    scene.add(ship);


    // ═══════════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════════
    // COCKPIT INTERIOR — V4 (minimalist, maximum window visibility)
    //
    // GOAL: 80%+ of the view is clear window. Cockpit is subtle framing.
    //
    // Frame math at camera FOV=55°, ~1.78 aspect ratio:
    //   At z=-1.5, visible frame is ~1.56 tall × ~2.76 wide.
    //   Dashboard lives at y < -0.65 (bottom ~20% of view only)
    //   Pillars live at |x| > 1.15 (outer ~16% of each side)
    //   NOTHING in upper half or center of frame
    // ═══════════════════════════════════════════════════════════════════
    const cockpitGroup = new THREE.Group();

    // Shared materials (dark, non-emissive for structure; emissive only for screens/lights)
    const cpDark = new THREE.MeshStandardMaterial({
      color: 0x0a0d16, roughness: 0.55, metalness: 0.5,
    });
    const cpMid = new THREE.MeshStandardMaterial({
      color: 0x121620, roughness: 0.5, metalness: 0.55,
    });
    const cpMetal = new THREE.MeshStandardMaterial({
      color: 0x252932, metalness: 0.85, roughness: 0.35,
    });
    const screenMat = (color, intensity = 0.7) => new THREE.MeshStandardMaterial({
      color: 0x020408, emissive: color, emissiveIntensity: intensity,
      roughness: 0.25, metalness: 0.1,
    });

    // ─── DASHBOARD: narrow strip along the bottom of the view ──────────
    // Only 0.35 tall (21% of view height), pushed low at y=-0.9
    // Angled away from camera so top of dash is higher than bottom
    const dashPanel = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 0.35, 0.3),
      cpMid
    );
    dashPanel.position.set(0, -0.95, -1.5);
    dashPanel.rotation.x = -0.3;
    cockpitGroup.add(dashPanel);

    // Glowing top edge of dashboard — thin cyan strip
    const dashEdge = new THREE.Mesh(
      new THREE.BoxGeometry(2.4, 0.02, 0.04),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff })
    );
    dashEdge.position.set(0, -0.78, -1.42);
    cockpitGroup.add(dashEdge);

    // ─── CENTER MFD: small nav display, sits within the dashboard ──────
    // Small — about 30% of dash width
    const mfdBezel = new THREE.Mesh(
      new THREE.BoxGeometry(0.7, 0.3, 0.03),
      cpMetal
    );
    mfdBezel.position.set(0, -0.95, -1.45);
    mfdBezel.rotation.x = -0.3;
    cockpitGroup.add(mfdBezel);

    const mfdScreen = new THREE.Mesh(
      new THREE.PlaneGeometry(0.62, 0.24),
      screenMat(0x4de8ff, 0.6)
    );
    mfdScreen.position.set(0, -0.945, -1.43);
    mfdScreen.rotation.x = -0.3;
    cockpitGroup.add(mfdScreen);

    // Radar rings on MFD
    const radarRing1 = new THREE.Mesh(
      new THREE.RingGeometry(0.055, 0.062, 24),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff, transparent: true, opacity: 0.7 })
    );
    radarRing1.position.set(0, -0.935, -1.425);
    radarRing1.rotation.x = -Math.PI / 2 + 0.3;
    cockpitGroup.add(radarRing1);
    const radarRing2 = new THREE.Mesh(
      new THREE.RingGeometry(0.09, 0.095, 24),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff, transparent: true, opacity: 0.5 })
    );
    radarRing2.position.copy(radarRing1.position);
    radarRing2.rotation.copy(radarRing1.rotation);
    cockpitGroup.add(radarRing2);
    // Radar sweep
    const radarSweep = new THREE.Mesh(
      new THREE.PlaneGeometry(0.008, 0.1),
      new THREE.MeshBasicMaterial({ color: 0x4de8ff })
    );
    radarSweep.position.copy(radarRing1.position);
    radarSweep.position.z += 0.001;
    radarSweep.rotation.copy(radarRing1.rotation);
    radarSweep.userData.isRadarSweep = true;
    cockpitGroup.add(radarSweep);

    // ─── FLANKING GAUGES (compact, left and right of MFD) ──────────────
    function makeMiniGauge(px, py, pz, color) {
      const g = new THREE.Group();
      // Bezel
      const bezel = new THREE.Mesh(
        new THREE.TorusGeometry(0.075, 0.008, 6, 16),
        cpMetal
      );
      g.add(bezel);
      // Face
      const face = new THREE.Mesh(
        new THREE.CircleGeometry(0.07, 20),
        new THREE.MeshStandardMaterial({
          color: 0x040810, emissive: color, emissiveIntensity: 0.35, roughness: 0.4,
        })
      );
      face.position.z = 0.002;
      g.add(face);
      // Tick marks (simple 5 ticks)
      for (let i = 0; i < 5; i++) {
        const tick = new THREE.Mesh(
          new THREE.BoxGeometry(0.003, 0.014, 0.002),
          new THREE.MeshBasicMaterial({ color: 0xcfe8ff })
        );
        const ang = -Math.PI * 0.75 + (i / 4) * Math.PI * 1.5;
        tick.position.set(Math.cos(ang) * 0.058, Math.sin(ang) * 0.058, 0.004);
        tick.rotation.z = ang - Math.PI / 2;
        g.add(tick);
      }
      // Needle
      const needle = new THREE.Mesh(
        new THREE.BoxGeometry(0.004, 0.055, 0.005),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      needle.position.set(0, 0.028, 0.006);
      needle.userData.isNeedle = true;
      needle.userData.gaugeColor = color;
      g.add(needle);
      // Center hub
      const hub = new THREE.Mesh(
        new THREE.CircleGeometry(0.01, 10),
        new THREE.MeshBasicMaterial({ color })
      );
      hub.position.z = 0.007;
      g.add(hub);
      g.position.set(px, py, pz);
      g.rotation.x = -0.3;
      return g;
    }
    cockpitGroup.add(makeMiniGauge(-0.5, -0.9, -1.45, 0x4de8ff));  // velocity
    cockpitGroup.add(makeMiniGauge(-0.85, -0.95, -1.43, 0xffd36b)); // altitude
    cockpitGroup.add(makeMiniGauge(0.5, -0.9, -1.45, 0x5bffa1));    // engine temp
    cockpitGroup.add(makeMiniGauge(0.85, -0.95, -1.43, 0xff6fb5));  // shields

    // ─── INDICATOR LIGHT ROW along the dash's upper edge ───────────────
    // 9 tiny round lights directly on the illuminated edge
    for (let i = 0; i < 9; i++) {
      const colors = [0x4de8ff, 0x5bffa1, 0xffd36b, 0xff6688, 0xffffff, 0xffd36b, 0x4de8ff, 0xff6688, 0x5bffa1];
      const ind = new THREE.Mesh(
        new THREE.CircleGeometry(0.012, 10),
        new THREE.MeshBasicMaterial({ color: colors[i] })
      );
      ind.position.set(-0.58 + i * 0.145, -0.79, -1.415);
      ind.userData.isIndicator = true;
      ind.userData.phase = i * 0.37;
      cockpitGroup.add(ind);
    }

    // ─── A-PILLARS: THIN bars at extreme edges only ─────────────────────
    // These are intentionally narrow (0.08) and slightly angled inward to
    // suggest a canopy without walling off the view
    for (const side of [-1, 1]) {
      const pillar = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 1.8, 0.1),
        cpMid
      );
      pillar.position.set(side * 1.45, 0.1, -1.85);
      pillar.rotation.z = side * 0.12;
      cockpitGroup.add(pillar);
      // Red (port) / green (starboard) nav light strip ON the pillar
      const navStrip = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, 1.4, 0.02),
        new THREE.MeshBasicMaterial({ color: side === -1 ? 0xff4444 : 0x44ff88 })
      );
      navStrip.position.set(side * 1.41, 0.1, -1.8);
      navStrip.rotation.z = side * 0.12;
      cockpitGroup.add(navStrip);
    }

    // ─── CONTROL YOKE: bottom-center, below dashboard (pilot's hands) ──
    // Positioned so only the TOP of the yoke peeks above the dashboard line
    const yoke = new THREE.Group();
    // Central hub box
    const yHub = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 0.08, 0.06),
      cpMetal
    );
    yoke.add(yHub);
    // U-shape grip
    const yBar = new THREE.Mesh(
      new THREE.TorusGeometry(0.16, 0.018, 6, 20, Math.PI),
      cpMetal
    );
    yBar.rotation.x = Math.PI / 2;
    yoke.add(yBar);
    // Grip pads at the sides
    for (const side of [-1, 1]) {
      const grip = new THREE.Mesh(
        new THREE.CylinderGeometry(0.028, 0.028, 0.09, 10),
        new THREE.MeshStandardMaterial({ color: 0x1c1f26, roughness: 0.85 })
      );
      grip.position.set(side * 0.16, 0, 0);
      grip.rotation.z = Math.PI / 2;
      yoke.add(grip);
      // Tiny trigger button
      const trig = new THREE.Mesh(
        new THREE.BoxGeometry(0.025, 0.017, 0.017),
        new THREE.MeshBasicMaterial({ color: 0xff6688 })
      );
      trig.position.set(side * 0.16, 0.025, 0.022);
      yoke.add(trig);
    }
    // Power LED on hub
    const yPwr = new THREE.Mesh(
      new THREE.CircleGeometry(0.01, 8),
      new THREE.MeshBasicMaterial({ color: 0x5bffa1 })
    );
    yPwr.position.set(0, 0.01, 0.042);
    yoke.add(yPwr);
    yoke.position.set(0, -0.72, -1.15);
    yoke.rotation.x = -0.25;
    yoke.userData.isYoke = true;
    cockpitGroup.add(yoke);

    cockpitGroup.visible = false;

    // Dedicated cockpit interior light — parented to camera
    const cockpitLight = new THREE.PointLight(0x88aaff, 1.2, 3.5, 1.5);
    cockpitLight.position.set(0, 0.0, -0.5);
    cockpitGroup.add(cockpitLight);
    // Warm glow from dashboard (lights pilot's face feel)
    const dashFillLight = new THREE.PointLight(0xffcc88, 0.4, 2.5, 2);
    dashFillLight.position.set(0, -0.6, -1.0);
    cockpitGroup.add(dashFillLight);

    // Parent to camera — cockpit renders in camera-space
    camera.add(cockpitGroup);
    scene.add(camera);




    // ═══════════════════════════════════════════════════════════════════
    // ANIMATION TIMELINE
    // Act 1: 0.0 – 2.5s  (deep space drift-in)
    // Act 2: 2.5 – 4.0s  (planet approach, rotating into view)
    // Act 3: 4.0 – 7.0s  (atmospheric entry — cockpit shake, heat, clouds)
    // Act 4: 7.0 – 12.0s (city flyby — third-person chase)
    // Act 5: 12.0 – 16.5s (landing approach + touchdown)
    // ═══════════════════════════════════════════════════════════════════
    const clock = new THREE.Clock();
    let rafId, elapsed = 0;

    const smoothstep = (t) => { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); };
    const lerp = (a, b, t) => a + (b - a) * t;
    const lerpV = (vA, vB, t) => vA.clone().lerp(vB, t);

    // Camera smoothing (damping)
    const targetPos = new THREE.Vector3();
    const targetLook = new THREE.Vector3();
    const smoothLook = new THREE.Vector3();

    function animate() {
      const dt = Math.min(0.04, clock.getDelta());
      elapsed += dt;
      const t = elapsed;

      // Update HUD telemetry
      const altBase = Math.max(0, 50000 * (1 - t / 26));
      const velBase = 980 - (t < 9 ? 0 : Math.min(900, (t - 9) * 150));
      if (Math.floor(t * 4) % 2 === 0) {
        setHud({
          altitude: Math.round(altBase + Math.random() * 50),
          velocity: Math.max(0, Math.round(velBase)),
          act: t < 5 ? 1 : t < 9 ? 2 : t < 13 ? 3 : t < 20 ? 4 : 5,
        });
      }

      // ─── ACT 1: DEEP SPACE (0 – 5s) ─────────────────────────────────
      // Slow, cinematic establishing shot. Ship glides past camera with Cyberia in distance.
      if (t < 5) {
        const p = smoothstep(t / 5);
        // Cockpit cam: drifts almost imperceptibly
        targetPos.set(lerp(-0.2, 0.05, p), lerp(0.05, 0, p), 0);
        targetLook.set(lerp(0.3, 0, p), 0, -20);

        // Ship rides beside the cockpit view, slowly getting closer
        ship.position.set(lerp(5, 1.5, p), lerp(1.5, 0.3, p), lerp(-1, -4.5, p));
        ship.rotation.set(0, lerp(-0.4, 0, p), lerp(0.15, 0, p));

        // Planet far, big enough to be a presence on the horizon
        planetGroup.position.z = lerp(-300, -200, p);
        planetGroup.position.x = lerp(-15, 0, p);
        planetGroup.scale.setScalar(1);

        // Very gentle engine plumes — cruising, not burning
        plumes.forEach((pl) => pl.scale.setScalar(lerp(0.5, 0.8, p)));
      }

      // ─── ACT 2: APPROACH (5 – 9s) ───────────────────────────────────
      // The planet grows to fill the frame. Atmospheric halo becomes visible.
      // Ship commits to entry path.
      else if (t < 9) {
        const p = smoothstep((t - 5) / 4);

        // Cockpit tightens on planet
        targetPos.set(0, lerp(0, -0.05, p), 0);
        targetLook.set(0, lerp(0, -0.3, p), -15);

        ship.position.set(lerp(1.5, 0.5, p), lerp(0.3, -0.1, p), lerp(-4.5, -5, p));
        ship.rotation.set(lerp(0, 0.15, p), 0, 0);

        // Planet grows dramatically
        planetGroup.position.z = lerp(-200, -70, p);
        planetGroup.scale.setScalar(lerp(1, 2.0, p));

        plumes.forEach((pl) => pl.scale.setScalar(lerp(0.8, 1.4, p)));

        // Keep shock ring OFF during approach — it belongs only during entry
        shockRing.visible = false;
      }

      // ─── ACT 3: ATMOSPHERIC ENTRY (9 – 13s) ─────────────────────────
      // Three micro-beats:
      //   3A (p: 0.0-0.35): Approach to atmosphere boundary — BLACK space still visible, planet curve
      //   3B (p: 0.35-0.70): Peak plasma burn — brief colored flash, shake strongest
      //   3C (p: 0.70-1.0): Emerging into upper atmosphere — city lights start glowing below
      else if (t < 13) {
        const p = smoothstep((t - 9) / 4);

        // Sky color: start fully black, transition through deep blue into atmospheric dusk
        // Key: at p < 0.35 (early entry), sky is still essentially space — BLACK
        let hue, sat, lit;
        if (p < 0.35) {
          // Still approaching — mostly black with hint of blue
          const q = p / 0.35;
          hue = 0.62; sat = 0.9; lit = lerp(0.0, 0.035, q);
        } else if (p < 0.7) {
          // Peak entry — warm plasma glow tints the sky briefly
          const q = (p - 0.35) / 0.35;
          hue = lerp(0.62, 0.05, q * 0.5); // shift slightly toward warm (plasma heat)
          sat = lerp(0.9, 0.7, q);
          lit = lerp(0.035, 0.08, q);
        } else {
          // Emerging into upper atmosphere — deep blue dusk
          const q = (p - 0.7) / 0.3;
          hue = lerp(0.56, 0.62, q);
          sat = 0.7;
          lit = lerp(0.08, 0.12, q);
        }
        scene.background = new THREE.Color().setHSL(hue, sat, lit);
        scene.fog = new THREE.FogExp2(scene.background, lerp(0, 0.002, p));

        // Cockpit shake — strongest at 3B (peak entry), fades in and out
        const shakeAmp = 0.1 * Math.sin(Math.max(0, Math.min(1, (p - 0.2) / 0.6)) * Math.PI);
        const shakeX = (Math.sin(t * 55) + Math.sin(t * 31)) * 0.5 * shakeAmp;
        const shakeY = (Math.cos(t * 47) + Math.sin(t * 23)) * 0.5 * shakeAmp;
        targetPos.set(shakeX, shakeY - 0.05, 0);
        targetLook.set(shakeX * 0.3, shakeY * 0.3 - 0.5, -15);

        // Ship pitches forward progressively
        ship.position.set(lerp(0.5, 0, p), lerp(-0.1, -0.3, p), lerp(-5, -4.5, p));
        ship.rotation.set(lerp(0.15, 0.3, p), 0, Math.sin(t * 7) * 0.06);

        // Planet: keep it visible during beat 3A so player sees they're entering it.
        // Planet is the DOMINANT frame element at start, recedes below as we descend into it.
        if (p < 0.35) {
          // Planet massive in front and slightly below — we're about to hit atmosphere
          planetGroup.position.y = lerp(0, -15, p / 0.35);
          planetGroup.position.z = lerp(-70, -45, p / 0.35);
          planetGroup.scale.setScalar(lerp(2.0, 2.5, p / 0.35));
          planetGroup.visible = true;
        } else if (p < 0.7) {
          // Planet passes beneath us as we go through plasma layer
          const q = (p - 0.35) / 0.35;
          planetGroup.position.y = lerp(-15, -35, q);
          planetGroup.position.z = lerp(-45, -30, q);
          planetGroup.scale.setScalar(lerp(2.5, 2.7, q));
          planetGroup.visible = true;
        } else {
          // Fade out planet as city becomes the new backdrop
          const q = (p - 0.7) / 0.3;
          planetGroup.position.y = lerp(-35, -60, q);
          planetGroup.scale.setScalar(lerp(2.7, 3, q));
          planetGroup.visible = q < 0.8;
        }

        // Plumes: burn intensifies at peak entry, calms toward end
        const plumeBurn = 0.8 + 0.6 * Math.sin(Math.max(0, Math.min(1, (p - 0.1) / 0.6)) * Math.PI);
        plumes.forEach((pl, i) => {
          pl.scale.setScalar(1.0 + plumeBurn * (0.8 + Math.sin(t * 40 + i) * 0.3));
          if (pl.material) pl.material.opacity = 0.9;
        });

        // Heat shock ring: ONLY active during beat 3B (peak entry), subtle
        if (p > 0.3 && p < 0.75) {
          shockRing.visible = true;
          shockRing.position.copy(ship.position);
          shockRing.position.z -= 18;  // even further out — silhouette effect
          shockRing.lookAt(camera.position);
          // Intensity peaks at mid-beat-3B
          const burnPeak = Math.sin((p - 0.3) / 0.45 * Math.PI);
          shockRing.material.opacity = burnPeak * 0.35; // dim (was up to 0.75)
          shockRing.scale.setScalar(2.5 + burnPeak * 0.8);
        } else {
          shockRing.visible = false;
        }

        // Dust particles — streak past giving speed feel
        dust.visible = true;
        const posAttr = dust.geometry.attributes.position;
        for (let i = 0; i < dustCount; i++) {
          posAttr.array[i * 3 + 2] += 500 * dt;
          if (posAttr.array[i * 3 + 2] > -12) {
            posAttr.array[i * 3] = (Math.random() - 0.5) * 100;
            posAttr.array[i * 3 + 1] = (Math.random() - 0.5) * 50;
            posAttr.array[i * 3 + 2] = -200 - Math.random() * 100;
          }
        }
        posAttr.needsUpdate = true;

        // Clouds: ONLY briefly visible during beat 3B (peak entry).
        // Outside that window, clouds are hidden entirely — keeping the view clear.
        const cloudOn = p > 0.35 && p < 0.75;
        cloudField.children.forEach((c, idx) => {
          if (!cloudOn) { c.visible = false; return; }
          // Only every 4th cloud visible (was every 3rd) — fewer, cleaner
          c.visible = (idx % 4 === 0);
          if (!c.visible) return;
          c.position.z += 140 * dt;  // slower than before
          c.rotation.z += c.userData.rotSpeed * dt;
          // Recycle — but keep them well below center-line so they don't block the view
          if (c.position.z > -15) {
            c.position.z = c.userData.baseZ - Math.random() * 200;
            c.position.x = (Math.random() - 0.5) * 180;
            c.position.y = (Math.random() - 0.5) * 35 - 20;  // bias BELOW the view
          }
          // Fade based on proximity AND beat position
          const distFade = Math.min(1, Math.max(0, (-c.position.z - 15) / 100));
          const beatFade = Math.sin((p - 0.35) / 0.4 * Math.PI);
          if (c.material) {
            c.material.opacity = 0.18 * distFade * beatFade;  // max 0.18 (was 0.35)
          }
          c.lookAt(camera.position);
        });
      }

      // ─── ACT 4: CITY FLYBY (13 – 20s) ───────────────────────────────
      // 7 seconds of the ship ACTIVELY flying through Cyberia's cityscape.
      // Ship starts already within the outer city, weaves between towers,
      // then arcs toward the landing pad.
      else if (t < 20) {
        const p = smoothstep((t - 13) / 7);

        planetGroup.visible = false;
        city.visible = true;
        dust.visible = false;
        shockRing.visible = false;

        // Deep blue night sky with city glow
        scene.background = new THREE.Color().setHSL(0.62, 0.6, lerp(0.12, 0.05, p));
        scene.fog = new THREE.FogExp2(scene.background, lerp(0.003, 0.0018, p));

        // Ship path — now contained WITHIN the city from the start.
        // Starts at outer city edge (z=-130) and flies through the heart of it.
        // Heavy S-curve weave makes it visually navigate between towers.
        const endX = -16, endY = 10, endZ = 0;
        const shipZ = lerp(-130, endZ, p);
        const shipY = lerp(14, endY, p);
        // Stronger weave — visible navigation through tower gaps
        const weaveX = Math.sin(p * Math.PI * 2.5) * 8 * (1 - p * 0.3);
        const shipX = lerp(0, endX, p) + weaveX;

        ship.position.set(shipX, shipY, shipZ);
        // Bank hard into the weave for that fighter-jet feel
        const bank = Math.cos(p * Math.PI * 2.5) * -0.55 * (1 - p * 0.3);
        const pitch = lerp(0.15, -0.05, p);
        const yaw = lerp(0, -Math.PI / 2, smoothstep(Math.max(0, (p - 0.8) / 0.2)));
        ship.rotation.set(pitch, yaw, bank);

        // 4-beat cinematic camera — cameras are PLACED IN THE CITY,
        // ship flies past/through/over each one so you SEE it navigating the skyline.
        //   Beat A (0-0.22): FLYPAST — stationary cam, ship flies past in foreground with towers behind
        //   Beat B (0.22-0.48): SIDE-TRACK — camera paces alongside between towers
        //   Beat C (0.48-0.75): HERO CANYON — low-angle looking up as ship flies over, towers framing
        //   Beat D (0.75-1.0): APPROACH ARC — pulls back to landing path
        const beatA = Math.max(0, Math.min(1, p / 0.22));
        const beatB = Math.max(0, Math.min(1, (p - 0.22) / 0.26));
        const beatC = Math.max(0, Math.min(1, (p - 0.48) / 0.27));
        const beatD = Math.max(0, Math.min(1, (p - 0.75) / 0.25));

        // BEAT A — FLYPAST
        // Camera fixed in the city at z=-110 (the ship flies PAST it from z=-130 toward z=0)
        // Camera high-angled so we see ship + buildings together
        const beatA_pos = new THREE.Vector3(18, 16, -112);
        const beatA_look = new THREE.Vector3(shipX, shipY, shipZ);

        // BEAT B — SIDE TRACKING
        // Camera paces alongside ship, close enough to be dramatic but with towers between/behind
        const beatB_pos = new THREE.Vector3(shipX + 12, shipY + 0.5, shipZ + 2);
        const beatB_look = new THREE.Vector3(shipX - 2, shipY - 0.5, shipZ - 3);

        // BEAT C — HERO CANYON (the money shot)
        // Camera at street level looking UP — ship flies over with tower canyon framing the sky
        // Camera moves slowly along ship's path but stays low; ship flies overhead
        const camC_z = lerp(-55, -20, (p - 0.48) / 0.27);
        const beatC_pos = new THREE.Vector3(shipX - 4, 2, camC_z);
        const beatC_look = new THREE.Vector3(shipX + 1, shipY + 2, shipZ - 3);

        // BEAT D — APPROACH ARC
        // Wider pullback with ship heading toward platform
        const beatD_pos = new THREE.Vector3(shipX + 11, shipY + 7, shipZ + 14);
        const beatD_look = new THREE.Vector3(shipX - 3, shipY - 1, shipZ - 6);

        // Smoothly blend through the beats
        let camPos = beatA_pos.clone();
        let camLook = beatA_look.clone();
        camPos.lerp(beatB_pos, smoothstep(beatB));
        camLook.lerp(beatB_look, smoothstep(beatB));
        camPos.lerp(beatC_pos, smoothstep(beatC));
        camLook.lerp(beatC_look, smoothstep(beatC));
        camPos.lerp(beatD_pos, smoothstep(beatD));
        camLook.lerp(beatD_look, smoothstep(beatD));

        targetPos.copy(camPos);
        targetLook.copy(camLook);

        plumes.forEach((pl, i) => pl.scale.setScalar(1.2 + Math.sin(t * 20 + i) * 0.15));
      }

      // ─── ACT 5: LANDING (20 – 26s) ──────────────────────────────────
      else {
        const p = Math.min((t - 20) / 6, 1);
        const pS = smoothstep(p);

        scene.background = new THREE.Color(0x060a1c);
        scene.fog = new THREE.FogExp2(0x060a1c, 0.0015);

        city.visible = true;
        planetGroup.visible = false;

        // Orbit approach: ship circles 1/4 around platform while descending
        // Start position (-16, 10, 0) matches Act 4 end for seamless transition
        const orbitAngle = lerp(-Math.PI / 2, 0, pS);
        const orbitRadius = lerp(16, 0, pS);
        const shipY = lerp(10, 1.2, pS);

        ship.position.set(
          Math.sin(orbitAngle) * orbitRadius,
          shipY,
          Math.cos(orbitAngle) * orbitRadius
        );
        const shipYaw = orbitAngle + Math.PI / 2;
        ship.rotation.set(
          lerp(-0.08, 0, pS),
          lerp(shipYaw, 0, smoothstep(Math.max(0, (pS - 0.8) / 0.2))),
          lerp(-0.25, 0, pS)
        );

        // Camera follows the ship from a fixed trailing offset so it stays prominent
        // while still showing the landing pad and city context.
        const camBehindDist = lerp(11, 8, pS);
        const camAbove = lerp(3.5, 2.8, pS);
        const camOffsetAngle = orbitAngle + Math.PI * 0.5 + 0.4;
        targetPos.set(
          ship.position.x + Math.sin(camOffsetAngle) * camBehindDist,
          ship.position.y + camAbove,
          ship.position.z + Math.cos(camOffsetAngle) * camBehindDist
        );
        // Look directly at the ship at all times
        targetLook.set(
          ship.position.x,
          ship.position.y,
          ship.position.z
        );

        plumes.forEach((pl, i) => {
          const s = lerp(1.2, 0.5, pS) + Math.sin(t * 25 + i) * 0.1 * (1 - pS);
          pl.scale.setScalar(Math.max(0.3, s));
          if (pl.material) pl.material.opacity = lerp(0.9, 0.4, pS);
        });
      }

      // ─── COCKPIT vs CHASE CAMERA APPLICATION WITH DAMPING ────────────
      // In acts 1-3 we're in cockpit POV (camera inside ship — HIDE ship geometry)
      // In acts 4-5 we're chase cam (camera external — SHOW ship)
      if (t < 13) {
        // Hide the external ship model — you can't see your own hull from inside
        ship.visible = false;

        // COCKPIT: camera rides with ship, offset puts "pilot" at front of canopy
        // Ship canopy is at local (0, 0.28, 0.5), pilot sits inside it, slightly forward
        const pilotOffset = new THREE.Vector3(0, 0.28, 0.55);
        pilotOffset.applyEuler(ship.rotation);
        const desiredCam = ship.position.clone().add(pilotOffset).add(targetPos);
        camera.position.lerp(desiredCam, 0.25);
        smoothLook.lerp(ship.position.clone().add(
          new THREE.Vector3(0, 0, -15).applyEuler(ship.rotation).add(targetLook.clone().multiplyScalar(0.2))
        ), 0.25);
        camera.lookAt(smoothLook);

        // Cockpit interior is parented to camera — always in view
        cockpitGroup.visible = true;
        cockpitGroup.position.x = Math.sin(t * 0.8) * 0.015;
        cockpitGroup.position.y = Math.cos(t * 0.6) * 0.012;

        // Animate cockpit components
        cockpitGroup.traverse((c) => {
          if (c.userData.isYoke) {
            // Yoke responds to ship attitude — visible feedback to pilot input
            c.rotation.z = ship.rotation.z * 0.8;
            c.rotation.x = -0.35 + ship.rotation.x * 0.5;
            // Small subconscious correction wobble
            c.position.x = Math.sin(t * 2.3) * 0.01;
          }
          if (c.userData.isIndicator) {
            // Each indicator flickers on its own staggered phase
            c.material.opacity = 0.35 + Math.abs(Math.sin(t * 3 + c.userData.phase)) * 0.65;
            c.material.transparent = true;
          }
          if (c.userData.isBtn) {
            // Backlit buttons breathe slowly
            const breath = 0.6 + Math.sin(t * 1.8 + c.userData.btnPhase) * 0.4;
            c.material.opacity = breath;
            c.material.transparent = true;
          }
          if (c.userData.isMfdBar) {
            // Bar graphs animate — velocity bar fills/empties with speed,
            // others have characteristic animation
            const idx = c.userData.barIdx;
            let fill;
            if (idx === 0) {
              // Velocity bar — based on sim velocity
              const velNorm = Math.min(1, Math.max(0, (980 - (t < 4 ? 0 : Math.min(900, (t - 4) * 200))) / 1000));
              fill = velNorm;
            } else if (idx === 1) {
              // Altitude bar (descending)
              fill = Math.max(0.1, 1 - t / 16);
            } else {
              // Shields — steady with flicker
              fill = 0.85 + Math.sin(t * 5) * 0.1;
            }
            c.scale.x = fill;
            c.position.x = 0.03 - (1 - fill) * 0.25;
          }
          if (c.userData.isRadarSweep) {
            // Radar line sweeps around the display
            // Need to rotate around MFD's local Z axis (in the plane of the screen)
            c.rotation.z = (elapsed * 2) % (Math.PI * 2);
          }
          if (c.userData.isWaypoint) {
            // Waypoint ring rotates
            c.rotation.y += 0.02;
            c.rotation.z = Math.sin(t * 0.8) * 0.1;
          }
          if (c.userData.isNeedle) {
            // Multiple needles — each one reflects a different simulated value
            const velNorm = Math.min(1, Math.max(0, (980 - (t < 4 ? 0 : Math.min(900, (t - 4) * 200))) / 1000));
            const altNorm = Math.max(0.05, 1 - t / 16);
            const shieldsNorm = 0.85 + Math.sin(t * 5) * 0.08;
            const tempNorm = 0.3 + (t > 4 && t < 7 ? 0.5 : 0.1) + Math.sin(t * 4) * 0.05;
            // Map by gauge color
            const color = c.userData.gaugeColor;
            let val;
            if (color === 0x4de8ff) val = velNorm;          // velocity (cyan)
            else if (color === 0xffd36b) val = altNorm;      // altitude (gold)
            else if (color === 0x5bffa1) val = tempNorm;     // engine temp (green)
            else if (color === 0xff6fb5) val = shieldsNorm;  // shields (pink)
            else val = 0.5;
            c.rotation.z = -Math.PI * 0.75 + val * Math.PI * 1.5;
          }
        });
      } else {
        // CHASE cam with damping for weight feel — show ship externally
        ship.visible = true;
        camera.position.lerp(targetPos, 0.08);
        smoothLook.lerp(targetLook, 0.08);
        camera.lookAt(smoothLook);
        cockpitGroup.visible = false;
      }

      // ─── PERSISTENT MOTION ──────────────────────────────────────────
      planetGroup.rotation.y += dt * 0.04;
      cloudShell.rotation.y += dt * 0.02;
      cityLightsGroup.children.forEach((cl, i) => {
        cl.scale.setScalar(0.7 + Math.sin(elapsed * 3 + cl.userData.phase) * 0.35);
      });
      starsFar.rotation.y += dt * 0.002;
      starsNear.rotation.y += dt * 0.004;

      // Tower emissives pulse (city-alive effect)
      towers.children.forEach((tw, i) => {
        const pulse = 0.7 + Math.sin(elapsed * 1.5 + i * 0.3) * 0.25;
        tw.children.forEach((part) => {
          if (part.material && part.userData.baseEmissive !== undefined) {
            part.material.emissiveIntensity = part.userData.baseEmissive * pulse;
          }
        });
      });

      // Billboard flicker
      billboards.children.forEach((b, i) => {
        const flicker = 0.7 + Math.sin(elapsed * 4 + b.userData.flickerPhase) * 0.3;
        b.material.opacity = 0.85 * flicker;
      });

      // Flying traffic — varied paths (orbital, linear, diagonal)
      trafficData.forEach((tr) => {
        if (tr.type === "orbital") {
          tr.angle += tr.speed * dt;
          tr.mesh.position.set(
            Math.cos(tr.angle) * tr.radius,
            tr.y + Math.sin(elapsed + tr.angle * 2) * 1.2,
            Math.sin(tr.angle) * tr.radius
          );
          tr.mesh.rotation.y = -tr.angle - Math.PI / 2 + (tr.speed < 0 ? Math.PI : 0);
        } else if (tr.type === "linear") {
          tr.progress += tr.speed * dt * tr.direction;
          if (tr.progress > 1.1) tr.progress = -0.1;
          if (tr.progress < -0.1) tr.progress = 1.1;
          const travel = (tr.progress - 0.5) * 220; // -110 to +110 in axis direction
          if (tr.axis === "x") {
            tr.mesh.position.set(travel, tr.y + Math.sin(elapsed * 1.5 + tr.lateral) * 0.8, tr.lateral);
            tr.mesh.rotation.y = tr.direction > 0 ? -Math.PI / 2 : Math.PI / 2;
          } else {
            tr.mesh.position.set(tr.lateral, tr.y + Math.sin(elapsed * 1.5 + tr.lateral) * 0.8, travel);
            tr.mesh.rotation.y = tr.direction > 0 ? Math.PI : 0;
          }
        } else { // diagonal
          tr.progress += tr.speed * dt * tr.direction;
          if (tr.progress > 1.1) tr.progress = -0.1;
          if (tr.progress < -0.1) tr.progress = 1.1;
          const r = (1 - tr.progress) * 90;  // far away → center
          const ang = tr.startAngle + tr.progress * 0.3;
          const ty = tr.y1 + (tr.y2 - tr.y1) * tr.progress;
          tr.mesh.position.set(Math.cos(ang) * r, ty, Math.sin(ang) * r);
          tr.mesh.rotation.y = -ang - Math.PI / 2;
          tr.mesh.rotation.x = (tr.y2 - tr.y1) * 0.01 * tr.direction;
        }
      });

      // Ground-level street traffic — zips around concentric rings low to ground
      streetData.forEach((c) => {
        c.angle += c.speed * dt;
        c.mesh.position.set(
          Math.cos(c.angle) * c.radius,
          c.y,
          Math.sin(c.angle) * c.radius
        );
        c.mesh.rotation.y = -c.angle - Math.PI / 2 + (c.speed < 0 ? Math.PI : 0);
      });

      // Tower searchlights — sweep the sky
      searchlightData.forEach((sl) => {
        const sweep = Math.sin(elapsed * sl.sweepSpeed + sl.sweepPhase) * 0.6;
        sl.group.rotation.y = sweep;
        sl.group.rotation.z = sl.tiltBase + Math.sin(elapsed * sl.sweepSpeed * 0.7 + sl.sweepPhase) * 0.2;
      });

      // Robot citizens — gentle bob + slow wander around the platform
      citizens.children.forEach((bot) => {
        bot.userData.baseAngle += bot.userData.wanderSpeed * dt;
        bot.position.x = Math.cos(bot.userData.baseAngle) * bot.userData.radius;
        bot.position.z = Math.sin(bot.userData.baseAngle) * bot.userData.radius;
        bot.position.y = Math.abs(Math.sin(elapsed * 2 + bot.userData.bobPhase)) * 0.12;
        bot.rotation.y = bot.userData.baseAngle + Math.PI / 2 + Math.sin(elapsed + bot.userData.bobPhase) * 0.3;
      });

      // Vault core slow rotation
      dataVault.children.forEach((part) => {
        if (part.userData.isVaultCore) {
          part.rotation.y += dt * 0.4;
          part.rotation.x = Math.sin(elapsed * 0.5) * 0.1;
        }
      });

      // Data rivers pulsing flow
      dataRivers.children.forEach((river, i) => {
        const flow = 0.4 + Math.abs(Math.sin(elapsed * 1.2 + river.userData.flowPhase)) * 0.5;
        river.material.opacity = flow;
      });

      // Data stream motion (procedural swirling)
      const dsPosAttr = dataStream.geometry.attributes.position;
      for (let i = 0; i < dsN; i++) {
        const d = dsData[i];
        d.angle += d.angSpeed * dt;
        d.y += d.ySpeed * dt;
        if (d.y > 45) d.y = 5;
        dsPosAttr.array[i * 3] = Math.cos(d.angle) * d.r;
        dsPosAttr.array[i * 3 + 1] = d.y + Math.sin(elapsed * 2 + d.phase) * 0.5;
        dsPosAttr.array[i * 3 + 2] = Math.sin(d.angle) * d.r;
      }
      dsPosAttr.needsUpdate = true;

      // Nav light strobe
      ship.children.forEach((c) => {
        if (c.userData.isNavLight) {
          const strobe = Math.sin(elapsed * 6) > 0.7 ? 1 : 0.3;
          c.material.opacity = strobe;
          c.material.transparent = true;
        }
        if (c.userData.isRunLight) {
          const pulse = 0.3 + Math.abs(Math.sin(elapsed * 3 + c.userData.phase)) * 0.7;
          c.material.opacity = pulse;
          c.material.transparent = true;
        }
      });

      // ─── LENS FLARE — anchored to sun direction, screen-space style ──
      // Compute sun position in camera view
      const sunDir = sun.position.clone().normalize();
      const flareTargetWorld = camera.position.clone().add(sunDir.clone().multiplyScalar(100));
      flareHalo.position.copy(flareTargetWorld);
      flareCore.position.copy(flareTargetWorld);
      // Ghosts offset toward screen center
      const toCenter = camera.position.clone().sub(flareTargetWorld).normalize();
      flareGhost1.position.copy(flareTargetWorld).add(toCenter.clone().multiplyScalar(15));
      flareGhost2.position.copy(flareTargetWorld).add(toCenter.clone().multiplyScalar(35));
      // Fade in cockpit/space acts, fade out when flying below horizon
      const flareFade = t < 4 ? 1 : (t < 7 ? lerp(1, 0.3, (t - 4) / 3) : 0.15);
      flareHalo.material.opacity = 0.4 * flareFade;
      flareCore.material.opacity = 0.9 * flareFade;
      flareGhost1.material.opacity = 0.35 * flareFade;
      flareGhost2.material.opacity = 0.3 * flareFade;

      // ─── RENDER ─────────────────────────────────────────────────────
      renderer.render(scene, camera);
      rafId = requestAnimationFrame(animate);
    }
    animate();

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener("resize", onResize);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
      scene.traverse((o) => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) {
          if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
          else o.material.dispose();
        }
      });
    };
  }, [avatarCfg]);

  return (
    <div style={styles.cinematicRoot}>
      <div ref={mountRef} style={{ position: "absolute", inset: 0 }} />

      {/* Cockpit HUD overlay — only shown during cockpit-cam acts (1-3) */}
      {cockpitMode && (
        <>
          {/* Canopy frame — subtle darkening at edges for cockpit feel */}
          <div style={styles.cockpitVignette} />
          {/* HUD corner readouts */}
          <div style={styles.hudTopLeft}>
            <div style={styles.hudLabel}>ALT</div>
            <div style={styles.hudValue}>{hud.altitude.toLocaleString()}m</div>
          </div>
          <div style={styles.hudTopRight}>
            <div style={styles.hudLabel}>VEL</div>
            <div style={styles.hudValue}>{hud.velocity} m/s</div>
          </div>
          <div style={styles.hudBotLeft}>
            <div style={styles.hudLabel}>LYF-1</div>
            <div style={styles.hudValueSmall}>CYBERIA · DESCENT</div>
          </div>
          <div style={styles.hudBotRight}>
            <div style={styles.hudLabel}>PHASE</div>
            <div style={styles.hudValue}>{hud.act} / 5</div>
          </div>
          {/* Center reticle */}
          <div style={styles.hudReticle}>
            <svg viewBox="0 0 100 100" width="100" height="100">
              <circle cx="50" cy="50" r="30" fill="none" stroke="#4de8ff" strokeWidth="0.5" opacity="0.6" />
              <circle cx="50" cy="50" r="2" fill="#4de8ff" opacity="0.8" />
              <line x1="50" y1="15" x2="50" y2="25" stroke="#4de8ff" strokeWidth="0.5" opacity="0.6" />
              <line x1="50" y1="75" x2="50" y2="85" stroke="#4de8ff" strokeWidth="0.5" opacity="0.6" />
              <line x1="15" y1="50" x2="25" y2="50" stroke="#4de8ff" strokeWidth="0.5" opacity="0.6" />
              <line x1="75" y1="50" x2="85" y2="50" stroke="#4de8ff" strokeWidth="0.5" opacity="0.6" />
            </svg>
          </div>
        </>
      )}

      {/* Cinematic letterbox — hidden during landing for a fully clear view */}
      {!landingMode && <div style={styles.cinematicLetterbox} />}
      {!landingMode && <div style={styles.cinematicLetterboxBottom} />}
      {subtitle && <div style={styles.cinematicSubtitle}>{subtitle}</div>}
      {skippable && (
        <button style={styles.skipBtn} onClick={onComplete}>SKIP ▸</button>
      )}
    </div>
  );
}

// AVATAR LAB — full customization with 3D live preview

function AvatarLab({ cfg, setCfg, playerName, onComplete }) {
  const mountRef = useRef(null);
  const avatarRef = useRef(null);
  const [tab, setTab] = useState("gender");

  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    // Platform under avatar
    const disc = new THREE.Mesh(

    scene.add(disc);

      new THREE.RingGeometry(0.6, 0.7, 48),
      new THREE.MeshBasicMaterial({ color: 0xff6fb5, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = -0.25;
    scene.add(ring);

    let avatar = buildAvatarMesh(cfg);
    scene.add(avatar);
    avatarRef.current = { scene, avatar, camera, renderer };

    let rafId;
    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();
      avatar.rotation.y += 0.008;
      avatar.position.y = Math.sin(t * 1.5) * 0.04;
      ring.rotation.z = t * 0.3;
      renderer.render(scene, camera);
      rafId = requestAnimationFrame(animate);
    }
    animate();

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener("resize", onResize);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
      scene.traverse((o) => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) {
          if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
          else o.material.dispose();
        }
      });
    };
  }, []); // mount once

  // Rebuild avatar when cfg changes
  useEffect(() => {
    if (!avatarRef.current) return;
    const { scene, avatar } = avatarRef.current;
    scene.remove(avatar);
    avatar.traverse((o) => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
        else o.material.dispose();
      }
    });
    const newAvatar = buildAvatarMesh(cfg);
    // Preserve rotation continuity
    newAvatar.rotation.y = avatar.rotation.y;
    scene.add(newAvatar);
    avatarRef.current.avatar = newAvatar;
  }, [cfg]);

  const tabs = [
    { id: "gender", label: "CHARACTER", icon: "🧑" },
    { id: "body", label: "BODY", icon: "👤" },
    { id: "skin", label: "SKIN", icon: "✋" },
    { id: "hair", label: "HAIR", icon: "💇" },
    { id: "outfit", label: "OUTFIT", icon: "👕" },
    { id: "extras", label: "EXTRAS", icon: "✨" },

  return (
    <div style={styles.labRoot}>
      <div style={styles.labHeader}>
        <div style={styles.labTitle}>GUARDIAN LAB</div>
        <div style={styles.labSubtitle}>Design your Cyberia Guardian, {playerName}</div>
      </div>

      <div style={styles.labStage}>
        <div ref={mountRef} style={styles.labCanvas} />
      </div>

      <div style={styles.labTabs}>
        {tabs.map((t) => (
          <button

            style={{
              ...styles.labTab,
              ...(tab === t.id ? styles.labTabActive : {}),

          >
            <div style={{ fontSize: 20 }}>{t.icon}</div>
            <div>{t.label}</div>
          </button>
        ))}
      </div>

      <div style={styles.labControls}>
        {tab === "gender" && (
          <LabSection label="Choose your character">
            <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
              {[
                { id: "boy", label: "BOY", icon: "👦" },
                { id: "girl", label: "GIRL", icon: "👧" },
              ].map((opt) => (
                <button
                  key={opt.id}
                  onClick={() => setCfg((c) => ({
                    ...c,
                    gender: opt.id,
                    // Smart defaults — user can override after
                    hairStyle: opt.id === "girl"
                      ? (c.hairStyle === "short" || c.hairStyle === "buzz" ? "long" : c.hairStyle)
                      : (c.hairStyle === "long" || c.hairStyle === "bun" ? "short" : c.hairStyle),
                  }))}
                  style={{
                    flex: 1,
                    padding: "22px 18px",
                    fontSize: 22,
                    fontWeight: 700,
                    fontFamily: "'Orbitron', sans-serif",
                    letterSpacing: "0.12em",
                    border: cfg.gender === opt.id ? "2px solid #4de8ff" : "2px solid rgba(77,232,255,0.25)",
                    borderRadius: 14,
                    background: cfg.gender === opt.id
                      ? "linear-gradient(180deg, rgba(77,232,255,0.2), rgba(77,232,255,0.05))"
                      : "rgba(10,18,48,0.55)",
                    color: cfg.gender === opt.id ? "#4de8ff" : "#cfe8ff",
                    cursor: "pointer",
                    transition: "all 0.2s",
                    boxShadow: cfg.gender === opt.id ? "0 0 20px rgba(77,232,255,0.35)" : "none",
                  }}
                >
                  <div style={{ fontSize: 46, marginBottom: 6 }}>{opt.icon}</div>
                  <div>{opt.label}</div>
                </button>
              ))}
            </div>
            <div style={{
              marginTop: 14, textAlign: "center", fontSize: 13,
              color: "rgba(207,232,255,0.65)", fontStyle: "italic"
            }}>
              Don't worry — you can change everything else next!
            </div>
          </LabSection>
        )}
        {tab === "body" && (
          <LabSection label="Body Type">
            <div style={styles.chipRow}>
              {BODY_TYPES.map((b) => (
                <button
                  key={b}
                  onClick={() => setCfg((c) => ({ ...c, body: b }))}
                  style={{ ...styles.chip, ...(cfg.body === b ? styles.chipOn : {}) }}
                >
                  {b}
                </button>
              ))}
            </div>
          </LabSection>
        )}

        {tab === "skin" && (
          <LabSection label="Skin Tone">
            <div style={styles.swatchRow}>
              {SKIN_TONES.map((s) => (
                <button
                  key={s.hex}
                  onClick={() => setCfg((c) => ({ ...c, skin: s.hex }))}
                  style={{
                    ...styles.swatch,
                    background: s.hex,
                    boxShadow: cfg.skin === s.hex ? `0 0 0 3px #fff, 0 0 20px ${s.hex}` : "none",
                    transform: cfg.skin === s.hex ? "scale(1.12)" : "scale(1)",
                  }}
                  aria-label={s.name}
                />
              ))}
            </div>
          </LabSection>
        )}

        {tab === "hair" && (
          <>
            <LabSection label="Style">
              <div style={styles.chipRow}>
                {HAIR_STYLES.map((s) => (
                  <button
                    key={s}
                    onClick={() => setCfg((c) => ({ ...c, hairStyle: s }))}
                    style={{ ...styles.chip, ...(cfg.hairStyle === s ? styles.chipOn : {}) }}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </LabSection>
            <LabSection label="Color">
              <div style={styles.swatchRow}>
                {HAIR_COLORS.map((c) => (
                  <button
                    key={c}
                    onClick={() => setCfg((prev) => ({ ...prev, hairColor: c }))}
                    style={{
                      ...styles.swatch,
                      background: c,
                      boxShadow: cfg.hairColor === c ? `0 0 0 3px #fff, 0 0 20px ${c}` : "none",
                      transform: cfg.hairColor === c ? "scale(1.12)" : "scale(1)",

        {tab === "outfit" && (
          <>
            <LabSection label="Style">
              <div style={styles.chipRow}>

                  <button
                    key={s}
                    onClick={() => setCfg((c) => ({ ...c, outfitStyle: s }))}
                    style={{ ...styles.chip, ...(cfg.outfitStyle === s ? styles.chipOn : {}) }}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </LabSection>
            <LabSection label="Color">
              <div style={styles.swatchRow}>
                {OUTFIT_COLORS.map((c) => (
                  <button
                    key={c}
                    onClick={() => setCfg((prev) => ({ ...prev, outfitColor: c }))}
                    style={{
                      ...styles.swatch,
                      background: c,
                      boxShadow: cfg.outfitColor === c ? `0 0 0 3px #fff, 0 0 20px ${c}` : "none",
                      transform: cfg.outfitColor === c ? "scale(1.12)" : "scale(1)",

      </div>

      <button style={styles.labConfirm} onClick={onComplete}>

    </div>
  );

function LabSection({ label, children }) {
