<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LYF · Cyberia · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050818; font-family: 'Space Grotesk', sans-serif; color: #cfe8ff; }
  #root { width: 100vw; height: 100vh; position: relative; }
  /* Loading screen that shows while Babel compiles */
  #loading {
    position: fixed; inset: 0; background: #050818;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.4s;
    font-family: 'Orbitron', sans-serif;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading .logo {
    font-size: 96px; font-weight: 900; letter-spacing: 0.12em;
    background: linear-gradient(90deg, #4de8ff, #ff6fb5, #ffd36b, #4de8ff);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: lyfFlowBoot 3s linear infinite;
    margin-bottom: 12px;
  }
  #loading .sub { font-size: 14px; color: #cfe8ff; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.7; margin-bottom: 36px; }
  #loading .spinner {
    width: 48px; height: 48px; border: 3px solid rgba(77,232,255,0.2);
    border-top-color: #4de8ff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  #loading .status { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; font-family: 'Space Grotesk', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes lyfFlowBoot { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

  /* Global keyframes used by the app */
  @keyframes lyfFlow { 0% { background-position: 0% 0; } 100% { background-position: 300% 0; } }
  @keyframes glowBreathe { 0%,100% { filter: drop-shadow(0 0 30px rgba(77,232,255,0.4)); } 50% { filter: drop-shadow(0 0 60px rgba(255,111,181,0.6)); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.85; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
</style>
</head>
<body>
<div id="loading">
  <div class="logo">LYF</div>

<script>
  // Update loading status as dependencies arrive
  const status = document.getElementById('loading-status');
  function setStatus(t) { if (status) status.textContent = t; }
  setStatus('Loading React & Three.js…');
  // Wait a frame so the browser actually paints the loading screen
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      setStatus('Compiling game…');
    });
  });
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
// THREE provided as UMD global

// Global math helpers
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// Audio assets folder. MP3s referenced by dialogue audioId are loaded from here.
// Relative path so the demo works from any deploy URL (file://, GitHub Pages, etc.)
const AUDIO_BASE_URL = "audio/";

// ═══════════════════════════════════════════════════════════════════════════
// VOICE / TEXT-TO-SPEECH ENGINE
// Uses the browser's built-in SpeechSynthesis API. Free, offline-capable
// after first load, and works in all modern browsers.
//
// Per-character profiles tune pitch/rate/voice so PIXEL, NOVA and CIPHER
// sound distinct. The system gracefully no-ops if speech is unavailable.
// ═══════════════════════════════════════════════════════════════════════════
const VoiceEngine = {
  muted: false,
  voices: [],
  ready: false,
  currentUtterance: null,
  currentAudio: null,

  // Voice profiles — chosen for personality fit:
  //   PIXEL: warm, energetic, slightly higher pitch (excited helper)
  //   NOVA:  medium-fast, witty, mid pitch (signal operator)
  //   CIPHER: calm, deliberate, lower pitch (wise vault keeper)
  //   NARRATOR / default: neutral
  //
  // preferKeywords are tried in order. We prioritize Apple's premium voices
  // (much higher quality than defaults) and Google's wavenet-quality voices.
  profiles: {
    PIXEL:    {
      pitch: 1.35, rate: 1.10,
      preferKeywords: [
        "samantha", "ava", "allison", "susan", "joanna", "karen", // Apple premium-tier female
        "google us english", "google uk english female",          // Google high-quality
        "microsoft zira", "microsoft jenny",                      // Windows decent female
        "female",                                                 // generic fallback
      ],
      gender: "female"
    },
    NOVA:     {
      pitch: 1.05, rate: 1.18,
      preferKeywords: [
        "tom", "alex", "fred", "aaron", "evan",                   // Apple premium-tier male
        "google uk english male", "google us english",            // Google
        "microsoft mark", "microsoft david",                      // Windows decent male
        "male",
      ],
      gender: "male"
    },
    CIPHER:   {
      pitch: 0.85, rate: 0.92,
      preferKeywords: [
        "daniel", "oliver", "thomas", "rishi",                    // Apple premium deeper male
        "google uk english male",
        "microsoft david", "microsoft mark",
        "male",
      ],
      gender: "male"
    },
    NARRATOR: {
      pitch: 1.0, rate: 1.0,
      preferKeywords: [
        "tom", "alex", "samantha", "ava",                         // Apple premium
        "google us english", "google uk english",
        "microsoft mark", "microsoft zira",
      ],
      gender: "any"
    },
  },

  init() {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    const load = () => {
      this.voices = window.speechSynthesis.getVoices() || [];
      this.ready = this.voices.length > 0;
    };
    load();
    // Voices load async on some browsers; listen for the event
    if (!this.ready) {
      window.speechSynthesis.addEventListener("voiceschanged", load);
    }
    // Restore mute state from localStorage if available
    try {
      const saved = window.localStorage?.getItem("lyf_muted");
      if (saved === "1") this.muted = true;
    } catch (e) { /* localStorage may be blocked */ }
  },

  // Find the best voice for a character, preferring English voices that
  // match the personality keywords. Premium/Enhanced voices are preferred
  // over defaults — these are dramatically higher quality on Apple devices.
  findVoice(character) {
    if (!this.voices || this.voices.length === 0) return null;
    const profile = this.profiles[character] || this.profiles.NARRATOR;
    // Filter to English voices first
    const englishVoices = this.voices.filter((v) =>
      v.lang && v.lang.toLowerCase().startsWith("en")
    );
    const pool = englishVoices.length > 0 ? englishVoices : this.voices;

    // Score each voice: keyword match + premium quality bonus
    const scored = pool.map((v) => {
      const name = (v.name || "").toLowerCase();
      let score = 0;
      // Keyword match — earlier in list = higher score
      for (let i = 0; i < profile.preferKeywords.length; i++) {
        if (name.includes(profile.preferKeywords[i].toLowerCase())) {
          score += (profile.preferKeywords.length - i) * 10;
          break;
        }
      }
      // Premium / Enhanced / Neural voices are MUCH better quality
      if (name.includes("premium") || name.includes("enhanced") || name.includes("neural")) {
        score += 50;
      }
      // Avoid known low-quality voices
      if (name.includes("espeak") || name.includes("compact")) {
        score -= 100;
      }
      // Avoid novelty voices (Cellos, Bells, etc. on macOS)
      const novelty = ["albert", "bahh", "bells", "boing", "bubbles", "cellos", "deranged", "good news", "hysterical", "jester", "organ", "superstar", "trinoids", "whisper", "wobble", "zarvox"];
      if (novelty.some(n => name.includes(n))) score -= 200;
      return { voice: v, score };
    });
    scored.sort((a, b) => b.score - a.score);
    // Return highest-scoring voice
    return scored[0]?.voice || pool[0] || null;
  },

  speak(text, character = "NARRATOR", onEnd = null, audioUrl = null) {
    if (this.muted) {
      if (onEnd) onEnd();
      return;
    }
    // Stop anything currently playing (audio or TTS)
    this.cancel();
    // Duck background music while voice plays
    if (typeof MusicEngine !== "undefined") MusicEngine.duck(0.25);
    const wrappedEnd = () => {
      if (typeof MusicEngine !== "undefined") MusicEngine.unduck();
      if (onEnd) onEnd();
    };
    // If an audioUrl is provided, try to play it first.
    // If it fails to load (404, network error, format unsupported), fall back to TTS.
    if (audioUrl) {
      this._playAudioWithFallback(audioUrl, text, character, wrappedEnd);
      return;
    }
    // No audio URL — go straight to TTS
    this._speakTTS(text, character, wrappedEnd);
  },

  // Try to play an MP3 / OGG / WAV file. On any failure (404, network, decode),
  // fall back to TTS speaking the same text.
  _playAudioWithFallback(audioUrl, fallbackText, character, onEnd) {
    if (typeof Audio === "undefined") {
      this._speakTTS(fallbackText, character, onEnd);
      return;
    }
    let fellBack = false;
    const fallback = (reason) => {
      if (fellBack) return;
      fellBack = true;
      // Log once but don't spam
      // (silent in production — fallback should be invisible to user)
      this._speakTTS(fallbackText, character, onEnd);
    };
    try {
      const audio = new Audio(audioUrl);
      audio.preload = "auto";
      audio.volume = 1.0;
      // Track this so cancel() can stop it
      this.currentAudio = audio;
      let ended = false;
      audio.onended = () => {
        if (ended) return;
        ended = true;
        if (this.currentAudio === audio) this.currentAudio = null;
        if (onEnd) onEnd();
      };
      audio.onerror = () => fallback("error");
      // Sometimes audio fails silently; set a load timeout
      const loadTimeout = setTimeout(() => {
        if (audio.readyState === 0) fallback("timeout");
      }, 2500);
      audio.oncanplaythrough = () => clearTimeout(loadTimeout);
      // Attempt playback. On modern browsers without prior interaction this
      // can throw NotAllowedError — fall back to TTS in that case.
      const playPromise = audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => fallback("play-rejected"));
      }
    } catch (e) {
      fallback("exception");
    }
  },

  _speakTTS(text, character, onEnd) {
    if (typeof window === "undefined" || !window.speechSynthesis) {
      if (onEnd) onEnd();
      return;
    }
    // Preprocess for TTS:
    // 1. Strip emoji and special characters
    // 2. Lowercase ALL-CAPS words (so "TAP" gets spoken, not "T-A-P")
    // 3. Expand common abbreviations
    let clean = text
      .replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F100}-\u{1F1FF}\u{2700}-\u{27BF}]/gu, "")
      .replace(/\b([A-Z]{2,})\b/g, (match) => {
        const keepAcronyms = ["NPC", "AI", "FBI", "USA", "URL"];
        if (keepAcronyms.includes(match)) return match;
        return match.toLowerCase();
      })
      .replace(/&/g, " and ")
      .replace(/\$(\d)/g, "$1 dollars")
      .replace(/(\d)%/g, "$1 percent")
      .replace(/\s+/g, " ")
      .trim();
    if (!clean) {
      if (onEnd) onEnd();
      return;
    }
    const utter = new SpeechSynthesisUtterance(clean);
    const profile = this.profiles[character] || this.profiles.NARRATOR;
    utter.pitch = profile.pitch;
    utter.rate = profile.rate;
    utter.volume = 1.0;
    const voice = this.findVoice(character);
    if (voice) utter.voice = voice;
    utter.onend = () => {
      this.currentUtterance = null;
      if (onEnd) onEnd();
    };
    utter.onerror = () => {
      this.currentUtterance = null;
      if (onEnd) onEnd();
    };
    this.currentUtterance = utter;
    try {
      window.speechSynthesis.speak(utter);
    } catch (e) {
      if (onEnd) onEnd();
    }
  },

  cancel() {
    // Stop any playing MP3
    if (this.currentAudio) {
      try {
        this.currentAudio.pause();
        this.currentAudio.currentTime = 0;
      } catch (e) { /* ignore */ }
      this.currentAudio = null;
    }
    // Stop any TTS speech
    if (typeof window !== "undefined" && window.speechSynthesis) {
      try {
        window.speechSynthesis.cancel();
      } catch (e) { /* ignore */ }
    }
    this.currentUtterance = null;
    // Unduck music since voice is no longer playing
    if (typeof MusicEngine !== "undefined") MusicEngine.unduck();
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.muted) this.cancel();
    try {
      window.localStorage?.setItem("lyf_muted", this.muted ? "1" : "0");
    } catch (e) { /* ignore */ }
    return this.muted;
  },

  isMuted() {
    return this.muted;
  },

  // Returns true if voice (audio or TTS) is currently playing.
  // Useful for queuing: callers can check this and decide whether to interrupt
  // or skip queueing a new line that would step on the current one.
  isPlaying() {
    if (this.currentAudio && !this.currentAudio.paused && !this.currentAudio.ended) return true;
    if (typeof window !== "undefined" && window.speechSynthesis) {
      if (window.speechSynthesis.speaking || window.speechSynthesis.pending) return true;
    }
    return !!this.currentUtterance;
  },
};

// Initialize once on module load
if (typeof window !== "undefined") {
  VoiceEngine.init();
}

// ═══════════════════════════════════════════════════════════════════════════
// MUSIC ENGINE
// Procedural music synthesized via the Web Audio API — original compositions
// inspired by John Williams (Star Wars) and Koji Kondo (Zelda), but written
// from scratch with original melodies and chord progressions.
//
// Each track has:
//   - bpm           — tempo
//   - key           — root note frequency (Hz)
//   - mode          — major/minor/lydian intervals
//   - chordProg     — chord progression (degrees) over the loop
//   - melody        — original melodic phrase, pentatonic-friendly
//   - bassPattern   — repeating bass figure
//   - drumPattern   — kick/hi-hat pattern (subtle, not aggressive)
//
// The composer sequences these into a seamless loop with crossfades between
// tracks when phase changes. MP3s in audio/music/ override procedural when
// they exist (same fallback pattern as voice).
// ═══════════════════════════════════════════════════════════════════════════
const MUSIC_BASE_URL = "audio/music/";

const MusicEngine = {
  ctx: null,                  // AudioContext (lazy)
  masterGain: null,           // overall volume + mute
  duckGain: null,             // ducks when voice plays (smoothed)
  reverbBus: null,            // wet reverb send (ConvolverNode)
  dryBus: null,               // dry signal pass-through
  preReverbGain: null,        // gain into reverb (~0.18)
  preDryGain: null,           // gain into dry path (~0.85)
  // Active track instance (null when nothing is playing).
  // Old tracks during crossfade are kept in `fadingOut` until they self-clean.
  active: null,               // { name, gainNode, loopTimer, cancelled, voicesByName }
  fadingOut: [],              // [{ name, gainNode, loopTimer, cancelled, fadeUntil }]
  currentTrack: null,         // name of the track that *should* be playing
  volume: 0.4,
  muted: false,
  ducking: false,
  duckTarget: 1.0,
  duckCurrent: 1.0,

  // ─── Music theory ────────────────────────────────────────────────────────
  semitone(base, n) { return base * Math.pow(2, n / 12); },
  modes: {
    major:  [0, 2, 4, 5, 7, 9, 11],
    minor:  [0, 2, 3, 5, 7, 8, 10],
    lydian: [0, 2, 4, 6, 7, 9, 11],
    dorian: [0, 2, 3, 5, 7, 9, 10],
  },
  freq(track, degree, octave = 0) {
    const intervals = this.modes[track.mode];
    const idx = ((degree - 1) % 7 + 7) % 7;
    const wraps = Math.floor((degree - 1) / 7);
    return this.semitone(track.key, intervals[idx] + (octave + wraps) * 12);
  },

  // ─── Tracks (compositions) ───────────────────────────────────────────────
  // Voices reference instrument presets defined further down.
  // Note shape: { deg, oct, beat, dur, vel? } — vel default 1.0
  tracks: {
    title: {
      bpm: 88, key: 220, mode: "major", loopBeats: 16,
      chordProg: [
        { deg: 1, oct: 0, beats: 4 },
        { deg: 5, oct: 0, beats: 4 },
        { deg: 6, oct: 0, beats: 4 },
        { deg: 4, oct: 0, beats: 4 },
      ],
      melody: [
        { deg: 5, oct: 1, beat: 0,    dur: 1.5 },
        { deg: 6, oct: 1, beat: 1.5,  dur: 0.5 },
        { deg: 5, oct: 1, beat: 2,    dur: 1   },
        { deg: 3, oct: 1, beat: 3,    dur: 1   },
        { deg: 2, oct: 1, beat: 4,    dur: 2   },
        { deg: 5, oct: 1, beat: 6,    dur: 1   },
        { deg: 6, oct: 1, beat: 7,    dur: 1   },
        { deg: 1, oct: 2, beat: 8,    dur: 1.5 },
        { deg: 7, oct: 1, beat: 9.5,  dur: 0.5 },
        { deg: 6, oct: 1, beat: 10,   dur: 1.5 },
        { deg: 5, oct: 1, beat: 11.5, dur: 0.5 },
        { deg: 3, oct: 1, beat: 12,   dur: 2   },
        { deg: 2, oct: 1, beat: 14,   dur: 1   },
        { deg: 1, oct: 1, beat: 15,   dur: 1   },
      ],
      bassPattern: [
        { offsetBeats: 0, degOffset: 0, oct: -2, dur: 2 },
        { offsetBeats: 2, degOffset: 4, oct: -2, dur: 2 },
      ],
      lead: "strings_warm",
      pad:  "strings_pad",
      bass: "cello_pizz",
    },

    cinematic: {
      bpm: 116, key: 293.66, mode: "major", loopBeats: 16,
      chordProg: [
        { deg: 1, oct: 0, beats: 4 },
        { deg: 4, oct: 0, beats: 4 },
        { deg: 5, oct: 0, beats: 4 },
        { deg: 1, oct: 0, beats: 4 },
      ],
      melody: [
        { deg: 5, oct: 0, beat: 0,    dur: 1   },
        { deg: 1, oct: 1, beat: 1,    dur: 1   },
        { deg: 3, oct: 1, beat: 2,    dur: 0.5 },
        { deg: 5, oct: 1, beat: 2.5,  dur: 0.5 },
        { deg: 6, oct: 1, beat: 3,    dur: 1   },
        { deg: 5, oct: 1, beat: 4,    dur: 1   },
        { deg: 4, oct: 1, beat: 5,    dur: 1   },
        { deg: 3, oct: 1, beat: 6,    dur: 1   },
        { deg: 2, oct: 1, beat: 7,    dur: 1   },
        { deg: 5, oct: 1, beat: 8,    dur: 1   },
        { deg: 6, oct: 1, beat: 9,    dur: 1   },
        { deg: 1, oct: 2, beat: 10,   dur: 2   },
        { deg: 7, oct: 1, beat: 12,   dur: 1   },
        { deg: 6, oct: 1, beat: 13,   dur: 1   },
        { deg: 5, oct: 1, beat: 14,   dur: 1   },
        { deg: 1, oct: 1, beat: 15,   dur: 1   },
      ],
      bassPattern: [
        { offsetBeats: 0, degOffset: 0, oct: -2, dur: 1 },
        { offsetBeats: 1, degOffset: 0, oct: -2, dur: 1 },
        { offsetBeats: 2, degOffset: 4, oct: -2, dur: 1 },
        { offsetBeats: 3, degOffset: 0, oct: -2, dur: 1 },
      ],
      lead: "brass_heroic",
      pad:  "strings_pad",
      bass: "cello_legato",
      subBass: true,           // octave-down doubling for that movie-trailer low end
    },

    mission1: {
      bpm: 128, key: 329.63, mode: "minor", loopBeats: 16,
      chordProg: [
        { deg: 1, oct: 0, beats: 4 },
        { deg: 6, oct: 0, beats: 4 },
        { deg: 3, oct: 0, beats: 4 },
        { deg: 7, oct: 0, beats: 4 },
      ],
      melody: [
        { deg: 1, oct: 1, beat: 0,    dur: 0.5 },
        { deg: 3, oct: 1, beat: 0.5,  dur: 0.5 },
        { deg: 5, oct: 1, beat: 1,    dur: 0.5 },
        { deg: 3, oct: 1, beat: 1.5,  dur: 0.5 },
        { deg: 1, oct: 1, beat: 2,    dur: 1   },
        { deg: 7, oct: 0, beat: 3,    dur: 1   },
        { deg: 6, oct: 1, beat: 4,    dur: 0.5 },
        { deg: 5, oct: 1, beat: 4.5,  dur: 0.5 },
        { deg: 3, oct: 1, beat: 5,    dur: 1   },
        { deg: 1, oct: 1, beat: 6,    dur: 2   },
        { deg: 3, oct: 1, beat: 8,    dur: 0.5 },
        { deg: 5, oct: 1, beat: 8.5,  dur: 0.5 },
        { deg: 7, oct: 1, beat: 9,    dur: 1   },
        { deg: 5, oct: 1, beat: 10,   dur: 1   },
        { deg: 3, oct: 1, beat: 11,   dur: 1   },
        { deg: 2, oct: 1, beat: 12,   dur: 1   },
        { deg: 1, oct: 1, beat: 13,   dur: 1   },
        { deg: 7, oct: 0, beat: 14,   dur: 2   },
      ],
      bassPattern: [
        { offsetBeats: 0,   degOffset: 0, oct: -2, dur: 0.5 },
        { offsetBeats: 0.5, degOffset: 0, oct: -2, dur: 0.5 },
        { offsetBeats: 1,   degOffset: 4, oct: -2, dur: 0.5 },

  // ─── Instruments ─────────────────────────────────────────────────────────
  // Each instrument is a function (track, freq, startTime, duration, velocity)
  // that schedules one or more oscillators with envelopes + filters to mimic
  // a real instrument. All output goes through `dest` (the track gain node).
  //
  // Why these matter: layering detuned oscillators + filtering + reverb is the
  // difference between "Game Boy bleep" and "small chamber ensemble." It's not
  // a real orchestra, but it's a real step up from monophonic synth.

  // Warm sustained strings (violas + violins doubled, soft attack)
  _strings_warm(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.085 * vel;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.18);                   // soft attack
    gain.gain.linearRampToValueAtTime(peak * 0.85, t0 + Math.min(0.6, dur * 0.4));
    gain.gain.linearRampToValueAtTime(peak * 0.7, t0 + dur - 0.15);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    // Low-pass filter for the rounded "bowed" timbre
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 2400;
    filt.Q.value = 0.6;
    // 3 detuned sawtooths = ensemble effect
    [-12, 0, 12].forEach((cents) => {
      const o = ctx.createOscillator();
      o.type = "sawtooth";
      o.frequency.value = freq * Math.pow(2, cents / 1200);
      o.connect(filt);
      o.start(t0);
      o.stop(t0 + dur + 0.05);
    });
    // Subtle vibrato on the upper voice
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 5;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = freq * 0.003;
    lfo.connect(lfoGain);
    filt.connect(gain);
    gain.connect(dest);
    lfo.start(t0);
    lfo.stop(t0 + dur + 0.05);
  },

  // Pad: very soft sustained strings, no attack transient — pure swell
  _strings_pad(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.045 * vel;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + Math.min(0.6, dur * 0.3));
    gain.gain.setValueAtTime(peak, t0 + dur - 0.4);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 1800;
    filt.Q.value = 0.4;
    [-15, -3, 3, 15].forEach((cents) => {
      const o = ctx.createOscillator();
      o.type = "sawtooth";
      o.frequency.value = freq * Math.pow(2, cents / 1200);
      o.connect(filt);
      o.start(t0);
      o.stop(t0 + dur + 0.05);
    });
    filt.connect(gain);
    gain.connect(dest);
  },

  // Heroic brass — bright, with quick attack, harmonically rich
  _brass_heroic(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.13 * vel;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.06);
    gain.gain.linearRampToValueAtTime(peak * 0.75, t0 + 0.3);
    gain.gain.setValueAtTime(peak * 0.7, t0 + Math.max(0.3, dur - 0.15));
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    // Brass uses BANDPASS for that "trumpet formant"
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 3200;
    filt.Q.value = 1.2;
    // Layered: square (fundamental + odd harmonics) + sawtooth (richness)
    [
      { type: "square",   detune: 0,   gain: 0.5 },
      { type: "sawtooth", detune: 4,   gain: 0.7 },
      { type: "sawtooth", detune: -4,  gain: 0.7 },
    ].forEach((v) => {
      const o = ctx.createOscillator();
      o.type = v.type;
      o.frequency.value = freq;
      o.detune.value = v.detune;
      const g = ctx.createGain();
      g.gain.value = v.gain;
      o.connect(g);
      g.connect(filt);
      o.start(t0);
      o.stop(t0 + dur + 0.05);
    });
    filt.connect(gain);
    gain.connect(dest);
  },

  // Staccato strings — short, articulated for action sections
  _strings_staccato(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.10 * vel;
    // Very short articulation regardless of nominal duration — short bow strokes
    const articDur = Math.min(dur * 0.85, 0.22);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + articDur);
    gain.gain.setValueAtTime(0, t0 + articDur);
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 2800;
    filt.Q.value = 0.7;
    [-7, 7].forEach((cents) => {
      const o = ctx.createOscillator();
      o.type = "sawtooth";
      o.frequency.value = freq * Math.pow(2, cents / 1200);
      o.connect(filt);
      o.start(t0);
      o.stop(t0 + articDur + 0.02);
    });
    filt.connect(gain);
    gain.connect(dest);
  },

  // Pizzicato cello — plucked, short with character
  _cello_pizz(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.16 * vel;
    const articDur = Math.min(dur * 0.7, 0.35);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + articDur);
    gain.gain.setValueAtTime(0, t0 + articDur);
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 1400;
    filt.Q.value = 1.0;
    const o1 = ctx.createOscillator();
    o1.type = "triangle";
    o1.frequency.value = freq;
    o1.connect(filt);
    o1.start(t0);
    o1.stop(t0 + articDur + 0.02);
    // Octave-up sawtooth for "pluck" brightness, very short
    const o2 = ctx.createOscillator();
    o2.type = "sawtooth";
    o2.frequency.value = freq * 2;
    const o2Gain = ctx.createGain();
    o2Gain.gain.setValueAtTime(0.4, t0);
    o2Gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.08);
    o2.connect(o2Gain);
    o2Gain.connect(filt);
    o2.start(t0);
    o2.stop(t0 + 0.1);
    filt.connect(gain);
    gain.connect(dest);
  },

  // Sustained cello (legato bowed bass)
  _cello_legato(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.14 * vel;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.1);
    gain.gain.linearRampToValueAtTime(peak * 0.8, t0 + dur - 0.15);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 1500;
    filt.Q.value = 0.8;
    [0, 8, -8].forEach((cents) => {
      const o = ctx.createOscillator();
      o.type = "sawtooth";
      o.frequency.value = freq * Math.pow(2, cents / 1200);
      o.connect(filt);
      o.start(t0);
      o.stop(t0 + dur + 0.05);
    });
    filt.connect(gain);
    gain.connect(dest);
  },

  // Harp — plucked, sparkling, decays naturally
  _harp(freq, t0, dur, vel, dest) {
    const ctx = this.ctx;
    const gain = ctx.createGain();
    const peak = 0.11 * vel;
    const decayDur = Math.min(dur, 1.6);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + decayDur);
    gain.gain.setValueAtTime(0, t0 + decayDur);
    const filt = ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = 3500;
    filt.Q.value = 0.4;
    // Triangle fundamental + sine octave-up for sparkle
    const o1 = ctx.createOscillator();
    o1.type = "triangle";
    o1.frequency.value = freq;
    o1.connect(filt);
    o1.start(t0);
    o1.stop(t0 + decayDur + 0.02);
    const o2 = ctx.createOscillator();
    o2.type = "sine";
    o2.frequency.value = freq * 2;
    const o2g = ctx.createGain();
    o2g.gain.setValueAtTime(0.3, t0);
    o2g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
    o2.connect(o2g);
    o2g.connect(filt);
    o2.start(t0);
    o2.stop(t0 + 0.5);
    filt.connect(gain);
    gain.connect(dest);
  },

  // ─── Reverb (synthesized impulse response) ──────────────────────────────
  // Generates a pseudo-random decaying noise burst that, when convolved with
  // the dry signal, simulates a small concert hall. Computed once at init.
  _makeReverbBuffer() {
    const ctx = this.ctx;
    if (!ctx) return null;
    const sampleRate = ctx.sampleRate;
    const seconds = 1.6;          // reverb tail length
    const length = Math.floor(seconds * sampleRate);
    const buffer = ctx.createBuffer(2, length, sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        // Exponential decay envelope on top of noise
        const env = Math.pow(1 - i / length, 2.5);
        data[i] = (Math.random() * 2 - 1) * env;
      }
    }
    return buffer;
  },

  // ─── Engine lifecycle ────────────────────────────────────────────────────
  init() {
    try {
      const v = window.localStorage?.getItem("lyf_music_volume");
      if (v !== null) this.volume = parseFloat(v);
      const m = window.localStorage?.getItem("lyf_music_muted");
      if (m === "1") this.muted = true;
    } catch (e) {}
  },

  ensureContext() {
    if (this.ctx) return this.ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      this.ctx = new AC();
      // Bus structure:
      //   per-track gain → splits to dryBus and reverbBus
      //   dryBus    → preDryGain   → duckGain → masterGain → destination
      //   reverbBus → ConvolverNode → preReverbGain → duckGain → masterGain → destination
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.muted ? 0 : this.volume;
      this.masterGain.connect(this.ctx.destination);
      this.duckGain = this.ctx.createGain();
      this.duckGain.gain.value = 1.0;
      this.duckGain.connect(this.masterGain);
      this.preDryGain = this.ctx.createGain();
      this.preDryGain.gain.value = 0.85;
      this.preDryGain.connect(this.duckGain);
      const conv = this.ctx.createConvolver();
      conv.buffer = this._makeReverbBuffer();
      this.preReverbGain = this.ctx.createGain();
      this.preReverbGain.gain.value = 0.20;
      conv.connect(this.preReverbGain);
      this.preReverbGain.connect(this.duckGain);
      this.dryBus = this.preDryGain;
      this.reverbBus = conv;
      // Smooth duck animation loop
      const tickDuck = () => {
        if (this.duckGain) {
          this.duckCurrent += (this.duckTarget - this.duckCurrent) * 0.08;
          try { this.duckGain.gain.value = this.duckCurrent; } catch (e) {}
        }
        requestAnimationFrame(tickDuck);
      };
      requestAnimationFrame(tickDuck);
    } catch (e) {
      this.ctx = null;
    }
    return this.ctx;
  },

  // ─── Public API ──────────────────────────────────────────────────────────
  play(trackName) {
    if (this.muted) {
      this.currentTrack = trackName;
      return;
    }
    // No-op if same track already playing (and actually producing sound)
    if (this.currentTrack === trackName && this.active && this._isActuallyPlaying()) return;
    this.currentTrack = trackName;
    // Try MP3 first (preserved from original implementation)
    const mp3Url = `${MUSIC_BASE_URL}${trackName}.mp3`;
    this._tryMp3OrProcedural(trackName, mp3Url);
  },

  _isActuallyPlaying() {
    if (this.currentAudio && !this.currentAudio.paused) return true;
    if (this.active && this.active.loopTimer) return true;
    return false;
  },

  _tryMp3OrProcedural(trackName, mp3Url) {
    if (typeof Audio === "undefined") {
      this._playProcedural(trackName);
      return;
    }
    let fellBack = false;
    const fallback = () => {
      if (fellBack) return;
      fellBack = true;
      this._playProcedural(trackName);
    };
    try {
      const audio = new Audio(mp3Url);
      audio.loop = true;
      audio.volume = 0;  // start silent, fade in after old track fades out
      this._fadeOutCurrent();
      this.currentAudio = audio;
      audio.onerror = () => fallback();
      const tm = setTimeout(() => {
        if (audio.readyState === 0) fallback();
      }, 1500);
      audio.oncanplaythrough = () => clearTimeout(tm);
      const p = audio.play();
      if (p && p.catch) p.catch(() => fallback());
      // Start fade-in after a short gap (lets old track exit cleanly)
      setTimeout(() => {
        const fadeSteps = 30;
        const target = this.volume;
        let step = 0;
        const fadeIn = setInterval(() => {
          step++;
          const ratio = step / fadeSteps;
          // Exponential-ish ease so fade feels natural
          const eased = ratio * ratio;
          if (audio === this.currentAudio) audio.volume = eased * target;
          if (step >= fadeSteps) clearInterval(fadeIn);
        }, 33); // ~1s total fade-in
      }, 600);
    } catch (e) {
      fallback();
    }
  },

  // Play procedural — fade old track out, brief gap, fade new track in.
  // The gap (200ms of silence + reverb tail) prevents the harsh
  // dual-key-overlap sound when crossfading between unrelated tracks.
  _playProcedural(trackName) {
    const ctx = this.ensureContext();
    if (!ctx) return;
    if (ctx.state === "suspended") {
      try { ctx.resume(); } catch (e) {}
    }
    const track = this.tracks[trackName];
    if (!track) return;

    // Fade out current cleanly first
    this._fadeOutCurrent();

    // New track has its own gain node — starts silent, fades in after a small gap
    const trackGain = ctx.createGain();
    trackGain.gain.value = 0;
    const fadeInStart = ctx.currentTime + 0.55;       // 550ms gap after old fade-out begins
    const fadeInEnd   = fadeInStart + 1.4;            // 1.4s fade-in (gentle, exponential-style)
    trackGain.gain.setValueAtTime(0, fadeInStart);
    // Use exponential-shaped ramp via small target ramps for natural-sounding swell
    // (true exponentialRamp can't reach 0; we approximate with two stages)
    trackGain.gain.linearRampToValueAtTime(0.18, fadeInStart + 0.5);
    trackGain.gain.linearRampToValueAtTime(0.55, fadeInStart + 0.95);
    trackGain.gain.linearRampToValueAtTime(1.0,  fadeInEnd);
    // Connect to both buses
    trackGain.connect(this.dryBus);
    trackGain.connect(this.reverbBus);

    const instance = {
      name: trackName,
      gainNode: trackGain,
      cancelled: false,
      loopTimer: null,
      // Notes start playing slightly into the fade-in so attacks have shape
      // when the gain reaches them. We accept some quietness on beat 1.
      startTime: fadeInStart + 0.15,
    };
    this.active = instance;
    this._scheduleLoop(track, instance);
  },

  _fadeOutCurrent() {
    if (!this.active) return;
    const ctx = this.ctx;
    const old = this.active;
    this.active = null;
    if (!ctx || !old.gainNode) {
      old.cancelled = true;
      if (old.loopTimer) clearInterval(old.loopTimer);
      return;
    }
    const now = ctx.currentTime;
    const fadeDuration = 0.5;  // shorter, snappier fade-out
    try {
      old.gainNode.gain.cancelScheduledValues(now);
      // Read current value robustly
      const currentVal = old.gainNode.gain.value;
      old.gainNode.gain.setValueAtTime(currentVal, now);
      // Exponential-ish curve via two-segment linear ramp
      old.gainNode.gain.linearRampToValueAtTime(currentVal * 0.4, now + fadeDuration * 0.4);
      old.gainNode.gain.linearRampToValueAtTime(0, now + fadeDuration);
    } catch (e) {}
    // Stop scheduling new loop iterations IMMEDIATELY — don't keep adding new notes
    // that we'd just fade out anyway. Existing already-scheduled notes (from the
    // last renderLoop call) will play through their envelopes naturally.
    old.cancelled = true;
    if (old.loopTimer) {
      clearInterval(old.loopTimer);
      old.loopTimer = null;
    }
    // Disconnect and free node after fade fully completes (+ reverb tail)
    setTimeout(() => {
      try { old.gainNode.disconnect(); } catch (e) {}
    }, (fadeDuration + 2.5) * 1000);  // extra time for reverb tail to die out
    this.fadingOut.push(old);
    // Cleanup old fading entries (keep array bounded)
    if (this.fadingOut.length > 8) {
      this.fadingOut = this.fadingOut.slice(-8);
    }
  },

  // Schedule the looping pattern. Re-scheduled by setInterval to keep going.
  _scheduleLoop(track, instance) {
    const ctx = this.ctx;
    if (!ctx) return;
    const beat = 60 / track.bpm;
    const loopDur = track.loopBeats * beat;

    const renderLoop = (startTime) => {
      if (instance.cancelled || this.active !== instance) return;
      // Lead melody
      const leadFn = this["_" + track.lead];
      if (leadFn) {
        for (const note of track.melody) {
          const freq = this.freq(track, note.deg, note.oct);
          const t0 = startTime + note.beat * beat;
          // Subtle humanization: ±8% velocity, ±15ms timing jitter
          const vel = (note.vel || 1) * (0.92 + Math.random() * 0.16);
          const jitter = (Math.random() - 0.5) * 0.03;
          leadFn.call(this, freq, t0 + jitter, note.dur * beat, vel, instance.gainNode);
        }
      }
      // Bass
      const bassFn = this["_" + track.bass];
      if (bassFn) {
        let chordStart = 0;
        for (const chord of track.chordProg) {
          for (const bn of track.bassPattern) {
            const freq = this.freq(track, chord.deg + bn.degOffset, chord.oct + bn.oct);
            const t0 = startTime + (chordStart + bn.offsetBeats) * beat;
            const vel = 0.92 + Math.random() * 0.16;
            bassFn.call(this, freq, t0, bn.dur * beat, vel, instance.gainNode);
            // Optional sub-bass: octave below for orchestral weight
            // (used by cinematic, victory — gives that movie-trailer low end)
            if (track.subBass) {
              const subFreq = this.freq(track, chord.deg + bn.degOffset, chord.oct + bn.oct - 1);
              bassFn.call(this, subFreq, t0, bn.dur * beat, vel * 0.6, instance.gainNode);
            }
          }
          chordStart += chord.beats;
        }
      }
      // Pad — spread voicing across two octaves for richness
      const padFn = this["_" + track.pad];
      if (padFn) {
        let chordStart = 0;
        for (const chord of track.chordProg) {
          const t0 = startTime + chordStart * beat;
          const padDur = chord.beats * beat;
          // Voicing: root in one octave, third + fifth in the next
          padFn.call(this, this.freq(track, chord.deg, chord.oct - 1), t0, padDur, 1.0, instance.gainNode);
          padFn.call(this, this.freq(track, chord.deg + 2, chord.oct), t0, padDur, 1.0, instance.gainNode);
          padFn.call(this, this.freq(track, chord.deg + 4, chord.oct), t0, padDur, 1.0, instance.gainNode);
          // Optional brass swell on chord changes — gives orchestral weight on
          // accented downbeats (used by cinematic and victory tracks)
          if (track.brassSwell && this._brass_heroic) {
            // Brass plays root + 5th, half the chord duration, for a "swell" feel
            const swellDur = Math.min(padDur * 0.7, 2.0);
            this._brass_heroic(this.freq(track, chord.deg, chord.oct), t0, swellDur, 0.55, instance.gainNode);
            this._brass_heroic(this.freq(track, chord.deg + 4, chord.oct), t0, swellDur, 0.5, instance.gainNode);
          }
          chordStart += chord.beats;
        }
      }
    };

    const firstStart = (instance && instance.startTime) || (ctx.currentTime + 0.05);
    renderLoop(firstStart);

    let nextStart = firstStart + loopDur;
    instance.loopTimer = setInterval(() => {
      if (instance.cancelled || this.active !== instance) return;
      renderLoop(nextStart);
      nextStart += loopDur;
    }, loopDur * 1000);
  },

  stop() {
    this.currentTrack = null;
    this._fadeOutCurrent();
    if (this.currentAudio) {
      const audio = this.currentAudio;
      this.currentAudio = null;
      // Fade out the audio element too
      const startVol = audio.volume;
      const fadeMs = 800;
      const startT = performance.now();
      const fade = () => {
        const k = Math.min(1, (performance.now() - startT) / fadeMs);
        try { audio.volume = startVol * (1 - k); } catch (e) {}
        if (k < 1) requestAnimationFrame(fade);
        else { try { audio.pause(); audio.currentTime = 0; } catch (e) {} }
      };
      fade();
    }
  },

  setVolume(v) {
    this.volume = Math.max(0, Math.min(1, v));
    try { window.localStorage?.setItem("lyf_music_volume", String(this.volume)); } catch (e) {}
    if (this.masterGain) this.masterGain.gain.value = this.muted ? 0 : this.volume;
    if (this.currentAudio) this.currentAudio.volume = this.volume;
  },

  toggleMute() {
    this.muted = !this.muted;
    try { window.localStorage?.setItem("lyf_music_muted", this.muted ? "1" : "0"); } catch (e) {}
    if (this.masterGain) this.masterGain.gain.value = this.muted ? 0 : this.volume;
    if (this.currentAudio) {
      if (this.muted) this.currentAudio.pause();
      else { try { this.currentAudio.play(); } catch (e) {} }
    }
    if (this.muted) {
      this.stop();
    } else if (this.currentTrack) {
      const t = this.currentTrack;
      this.currentTrack = null;
      this.play(t);
    }
    return this.muted;
  },

  isMuted() { return this.muted; },
  duck(amount = 0.3) { this.duckTarget = amount; },
  unduck() { this.duckTarget = 1.0; },
};

// Initialize music engine state from localStorage
if (typeof window !== "undefined") {
  MusicEngine.init();
  // Browsers block AudioContext until user interacts. Resume on first click/touch
  // and retry the current music track if needed.
  const resumeAudio = () => {
    if (MusicEngine.ctx && MusicEngine.ctx.state === "suspended") {
      try { MusicEngine.ctx.resume(); } catch (e) {}
    }
    if (MusicEngine.currentTrack && !MusicEngine._isActuallyPlaying() && !MusicEngine.muted) {
      // Retry the current track
      const t = MusicEngine.currentTrack;
      MusicEngine.currentTrack = null;
      MusicEngine.play(t);
    }
  };
  window.addEventListener("pointerdown", resumeAudio, { once: false });
  window.addEventListener("keydown", resumeAudio, { once: false });
}

// Canvas roundRect polyfill for older browsers
if (typeof CanvasRenderingContext2D !== "undefined" && !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === "number") r = [r, r, r, r];
    else if (Array.isArray(r) && r.length === 1) r = [r[0], r[0], r[0], r[0]];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    this.beginPath();
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}
